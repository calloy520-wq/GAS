name: Deploy to Google Apps Script

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Write clasp credentials
        run: echo "$CLASPRC" | base64 -d > "$HOME/.clasprc.json"
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON }}

      - name: Push & deploy
        env:
          NODE_OPTIONS: --dns-result-order=ipv4first
          DEPLOY_ID: AKfycbzFRQhKpbPeWDlkjm5nTbv4ngYQOG7Q6QJMw_1B-3BrCWSiFexZbjI6l5bvV-Q0glBf   # 既有網頁部署（/exec 網址不變，僅更新版本）
        run: |
          retry() {
            for i in 1 2 3 4 5; do
              "$@" && return 0
              echo "  ↳ attempt $i failed; retry in 5s..."; sleep 5
            done
            return 1
          }
          echo "── clasp push ──";   retry clasp push -f
          echo "── clasp deploy ──"; retry clasp deploy --deploymentId "$DEPLOY_ID" --description "auto-deploy"
