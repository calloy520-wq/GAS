name: Deploy to Google Apps Script

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Write clasp credentials
        run: echo "$CLASPRC" | base64 -d > "$HOME/.clasprc.json"
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON }}

      - name: Push to Apps Script
        env:
          NODE_OPTIONS: --dns-result-order=ipv4first
        run: |
          for i in 1 2 3 4 5; do
            echo "── push attempt $i ──"
            clasp push -f && exit 0
            echo "attempt $i failed; retrying in 5s..."
            sleep 5
          done
          echo "all attempts failed"; exit 1
