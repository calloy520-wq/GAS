  async function executeLifeskillGather(rollCount) {
      if (!lifeskillSelected) return;
      const btns = document.querySelectorAll('#lifeskill-roll-panel .btn');
      btns.forEach(b => b.disabled = true);
      document.getElementById('lifeskill-result-msg').innerHTML = `<span style="color:#816e54;">天道演化中...</span>`;

      try {
          const res = await gasRun({ action: "lifeskill_gather", pcId: pc.id, skill: lifeskillSelected, rollCount: rollCount });
          btns.forEach(b => b.disabled = false);

          if (!res.success) {
              document.getElementById('lifeskill-result-msg').innerHTML = `<span style="color:#ff6347;">${res.message || "這趟生活技能未能結算。"}</span>`;
              return;
          }

          if (res.statusString) {
              localStorage.setItem('kyushu_last_status', res.statusString);
              updateUI(res.statusString.split('§'));

  const HORSE_CONFIG = [
    { id: 1, name: "閃電週", tier: "強馬", payout: 3.5, color: "#ff6347" },
    { id: 2, name: "孤影鈴", tier: "強馬", payout: 3.5, color: "#4da6ff" },

    { id: 6, name: "米霸天", tier: "黑馬", payout: 7.5, color: "#b388ff" }
  ];
  const HORSE_RACE_GOAL = 30;

  function openRaceModal() {
      toggleActionDrawer();
      document.getElementById('horse-race-overlay').style.display = 'flex';
      document.getElementById('race-result-msg').innerHTML = "<span style='font-size:16px;'>請選定戰馬下注，賽事即將開始！</span><br><span style='font-size:12px; color:#aaa;'>單注限額：100 ~ 10,000 兩白銀</span>";

      const currentMoney = document.getElementById('ui-money').innerText || "0";
      document.getElementById('race-current-money').innerText = currentMoney;

      renderRaceTrack();
      renderRaceHorseButtons();
  }

  function renderRaceTrack() {
      const track = document.getElementById('race-track');
      track.innerHTML = HORSE_CONFIG.map(h => `
        <div style="display:flex; align-items:center; gap:8px;">
          <div style="width:64px; font-size:14px; font-weight:700; color:#e3e3e3; text-align:right;">${h.name}</div>
          <div style="flex:1; background:#1a1a1a; border:1px solid #555; border-radius:4px; height:18px; position:relative; overflow:hidden;">

  function renderRaceHorseButtons() {
      const container = document.getElementById('race-horse-buttons');
      container.innerHTML = HORSE_CONFIG.map(h => `
        <button class="btn" onclick="lockBtn(event, () => placeRaceBet(${h.id}))" style="border-color:${h.color}; border-width:2px; color:#e3e3e3; font-size:14px; font-weight:600; flex: 1 0 45%;">${h.name}<br><span style="font-size:11px; color:${h.color};">${h.tier} 1賠${h.payout}</span></button>
      `).join('');
  }

  function placeRaceBet(horseId) {
      const raceBtns = document.querySelectorAll('#race-horse-buttons .btn');
      raceBtns.forEach(b => b.disabled = true);

      const betInput = document.getElementById('race-bet-amount').value;
      const betAmount = parseInt(betInput);

      if (isNaN(betAmount) || betAmount < 100 || betAmount > 10000) {
          raceBtns.forEach(b => b.disabled = false);
          alert("大俠，天馬競速的規矩是：單次下注必須在「100 兩」至「10,000 兩」之間！");
          return;
      }

      const currentMoney = parseInt(document.getElementById('ui-money').innerText) || 0;
      if (currentMoney < betAmount) {
          raceBtns.forEach(b => b.disabled = false);
          alert("囊中羞澀！大俠，你身上的銀兩不夠啊，請先去賺點盤纏再來吧。");
          return;
      }

      renderRaceTrack();
      const betHorse = HORSE_CONFIG.find(h => h.id === horseId);
      document.getElementById('race-result-msg').innerHTML = `<span style="font-size:16px;">戰馬奔騰中... 你押了 <span style="color:#fff; font-weight:700;">${betAmount}</span> 兩於【<span style="color:${betHorse.color}; font-weight:700; text-shadow:0 0 3px #000;">${betHorse.name}</span>】</span>`;

      gasRun({ action: "play_horse_race", pcId: pc.id, horseId: horseId, betAmount: betAmount })
        .then(res => {
            if (!res.success) {
                raceBtns.forEach(b => b.disabled = false);
                alert(res.message);
                document.getElementById('race-result-msg').innerText = "天道異常，賭局作廢！";
                return;
            }
            animateRaceLog(res.log, () => {
                raceBtns.forEach(b => b.disabled = false);
                const resultColor = res.isWin ? '#32cd32' : '#ff6347';
                const resultLine = res.isWin
                  ? `🎉 「${res.winnerName}」率先衝線！恭喜中獎，贏得 ${res.winnings - betAmount} 兩白銀！`
                  : `💀 「${res.winnerName}」率先衝線。你的愛馬未能奪冠，輸了 ${betAmount} 兩。`;
                document.getElementById('race-result-msg').innerHTML =
                  `<span style="font-size:18px; font-weight:700; color:${resultColor};">${resultLine}</span><br><br><span style="font-size:16px; line-height:1.6; color:#e3e3e3;">${res.narration}</span>`;

                if (res.statusString) {
                    localStorage.setItem('kyushu_last_status', res.statusString);
                    updateUI(res.statusString.split('§'));
                    document.getElementById('race-current-money').innerText = res.statusString.split('§')[1];
                }
            });
        })
        .catch(err => {
            raceBtns.forEach(b => b.disabled = false);
            alert("天道阻礙，賭局無效！請檢查連線。");
            document.getElementById('race-result-msg').innerText = "連線中斷，賭局未成立。";
        });
  }

  function animateRaceLog(log, onDone) {
      let step = 0;
      const interval = setInterval(() => {
          const positions = log[step];
          HORSE_CONFIG.forEach((h, idx) => {
              const pct = Math.min(100, (positions[idx] / HORSE_RACE_GOAL) * 100);
              const bar = document.getElementById(`race-bar-${h.id}`);
              if (bar) bar.style.width = pct + "%";
          });
          step++;
          if (step >= log.length) {
              clearInterval(interval);
              if (onDone) onDone();
          }
      }, 220);
  }

async function sendMailFromPanel() {
  const target = document.getElementById('mail-target').value.trim();
  const content = document.getElementById('mail-content').value.trim();
  const attachItemId = document.getElementById('mail-attach').value;

  if (!target) { alert('請輸入收信人名號！'); return; }
  if (!content) { alert('傳音內容不能為空！'); return; }

  try {
    const res = await gasRun({ action: 'send_mail', pcId: pc.id, targetName: target, msg: content, attachItemId: attachItemId });

    if (res.success) {
      document.getElementById('mail-target').value = '';
      document.getElementById('mail-content').value = '';

      const story = document.getElementById('story');
      story.insertAdjacentHTML('beforeend',
        `<div class="msg-player" style="border-color:#1e90ff; color:#1e90ff;"><b>【傳音】：</b>你以玉簡傳音，向『${target}』寄出了一封信${attachItemId ? '(附帶物品)' : ''}。</div>`);

      // NPC 已即時回信，重載信箱就看得到；真人玩家則靜默送達

  } catch (e) {
    alert('天道阻斷，傳音失敗。');
  }
}

// 核心：包裝任何 async 函數，執行期間自動鎖住按鈕
async function withButtonLock(btnEl, asyncFn) {
  if (!btnEl || btnEl.disabled) return; // 已鎖住就直接擋回
  
  const originalText = btnEl.innerHTML;
  const originalStyle = btnEl.style.cssText;
  
  btnEl.disabled = true;
  btnEl.style.opacity = '0.5';
  btnEl.style.cursor = 'not-allowed';
  
  try {
    await asyncFn();
  } finally {
    // 無論成功失敗都解鎖
    btnEl.disabled = false;
    btnEl.innerHTML = originalText;
    btnEl.style.cssText = originalStyle;
    btnEl.disabled = false; // cssText 覆蓋後再補一次保險
  }
}

// 給 onclick 用的語法糖：lockBtn(event, async () => { ... })
function lockBtn(event, asyncFn) {
  const btn = event.currentTarget || event.target;
  withButtonLock(btn, asyncFn);
}

  container.innerHTML = factions.map((f, idx) => {

    const statusIcon = f.status === '崛起' ? '📈' : f.status === '衰落' ? '📉' : '⚖️';

function switchFactionTab(tab) {
  currentFactionTab = tab;
  const mineBtn = document.getElementById('tab-my-faction');
  const allBtn = document.getElementById('tab-all-faction');
  const rankBtn = document.getElementById('tab-ranking');
  const minePanel = document.getElementById('panel-my-faction');
  const allPanel = document.getElementById('panel-all-faction');
  const rankPanel = document.getElementById('panel-ranking');

  // 全部重置
  [mineBtn, allBtn, rankBtn].forEach(btn => {
    if (btn) { btn.style.borderBottomColor = 'transparent'; btn.style.color = '#816e54'; btn.style.fontWeight = 'normal'; }
  });
  [minePanel, allPanel, rankPanel].forEach(panel => {
    if (panel) panel.style.display = 'none';
  });

  if (tab === 'mine') {
    mineBtn.style.borderBottomColor = '#d4af37'; mineBtn.style.color = '#d4af37'; mineBtn.style.fontWeight = 'bold';
    minePanel.style.display = 'block';
  } else if (tab === 'all') {
    allBtn.style.borderBottomColor = '#d4af37'; allBtn.style.color = '#d4af37'; allBtn.style.fontWeight = 'bold';
    allPanel.style.display = 'block';
  } else if (tab === 'ranking') {
    rankBtn.style.borderBottomColor = '#d4af37'; rankBtn.style.color = '#d4af37'; rankBtn.style.fontWeight = 'bold';
    rankPanel.style.display = 'block';
    loadRanking();
  }
}

async function loadRanking() {
  const container = document.getElementById('ranking-content');
  container.innerHTML = '<p style="text-align:center; color:#816e54; font-style:italic;">感應天下英豪中...</p>';
  
  try {
    const res = await gasRun({ action: 'get_ranking', pcId: pc.id });

      container.innerHTML = '<p style="text-align:center; color:#816e54; padding:20px;">天下尚無英豪現世。</p>';
      return;
    }

    const myName = pc.name;
    const medalMap = { 0: '👑', 1: '🥈', 2: '🥉' };

    container.innerHTML = res.data.map((r, idx) => {
      const isMe = r.name === myName;
      const medal = medalMap[idx] || `${idx + 1}.`;
      const bgColor = isMe ? 'rgba(212,175,55,0.1)' : 'rgba(51,34,17,0.03)';
      const borderColor = isMe ? '#d4af37' : 'rgba(51,34,17,0.15)';

      return `
        <div style="background:${bgColor}; border:1px solid ${borderColor}; border-radius:6px; padding:10px; margin-bottom:8px; display:flex; align-items:center; gap:10px;">
          <div style="font-size:18px; min-width:30px; text-align:center;">${medal}</div>
          <div style="flex:1;">
            <div style="display:flex; align-items:center; margin-bottom:3px;">
              <span style="font-size:14px; color:#8b5a2b; font-weight:bold;">${escapeHtml(r.name)}</span>
              ${playerTag}${meTag}
            </div>
            <div style="font-size:11px; color:#816e54;">

async function requestPromotion() {

      story.insertAdjacentHTML('beforeend', `<div class="msg-ai" style="border-left: 4px solid #2e8b57; background:rgba(46,139,87,0.05);"><b>【宗門晉升】</b><br>${res.message}</div>`);

function showRegisterNpcModal(name, npcContext = '') {
  const cardId = 'reg-' + Date.now();
  const story = document.getElementById('story');
  story.insertAdjacentHTML('beforeend', `
    <div id="${cardId}" style="background:rgba(70,130,180,0.1); border:1px solid #4682b4; 
      border-radius:8px; padding:15px; margin:5px 0; text-align:center;">
      <div style="color:#4682b4; font-weight:bold; margin-bottom:10px;">
        「${name}」尚未收錄於眾生冊
      </div>
      <select id="sex-${cardId}" class="std-select" 
        style="width:120px; margin-bottom:12px; padding:6px;">
        <option value="女">女</option>
        <option value="男">男</option>
        <option value="異">異</option>
        <option value="獸">獸</option>
      </select>
      <div style="display:flex; gap:10px; justify-content:center;">
        <button class="btn" style="border-color:#4682b4; color:#4682b4; padding:6px 16px;"
          id="reg-btn-${cardId}">
          📋 天道補全並登記
        </button>
        <button class="btn" style="border-color:#666; color:#666; padding:6px 16px;"
          onclick="document.getElementById('${cardId}').remove()">
          略過
        </button>
      </div>
    </div>
  `);
  // 用 addEventListener 綁定，完全避開字串拼接問題
  document.getElementById(`reg-btn-${cardId}`).addEventListener('click', function() {
    const sex = document.getElementById(`sex-${cardId}`).value;
    doRegisterNpc(name, sex, cardId, npcContext);
  });
  story.scrollTop = story.scrollHeight;
}

async function doRegisterNpc(name, sex, cardId, npcContext = '') {
  document.getElementById(cardId)?.remove();

  // 🔴 一進來就鎖住輸入，堵住「收錄空窗期」玩家搶先發話導致雙觸發
  const input = document.getElementById('u-in');
  const sendBtn = document.getElementById('send-btn');
  if (input) input.disabled = true;
  if (sendBtn) sendBtn.disabled = true;

  const story = document.getElementById('story');
  story.insertAdjacentHTML('beforeend', 
    `<div class="msg-player" style="color:#4682b4; border-color:#4682b4;">
      <b>【天道感應】：</b>正在補全「${name}」的命格資料...
    </div>`
  );
  story.scrollTop = story.scrollHeight;

  try {
    const res = await gasRun({
      action: "manual_npc",
      pcId: pc.id,
      npcName: name,
      npcSex: sex,
      npcRel: "萍水相逢",
      currentLoc: document.getElementById('ui-loc').innerText,
      npcContext: npcContext || lastAiContext.slice(0, 300)  // 🔴 優先用存好的，沒有才用當前
    });

    if (res.success) {
      story.insertAdjacentHTML('beforeend',
        `<div class="msg-player" style="color:#2e8b57; border-color:#2e8b57;">
          <b>【登記完成】：</b>「${name}」已收錄入眾生冊，可從【身邊眾生】中找到她。
        </div>`
      );
      await syncData(true);
      // send() 內部開頭會再鎖一次、結束時在 finally 解鎖，銜接得上，全程不留空窗
      send(`【系統動作：玩家與「${name}」正式結識，請描寫初次見面的場景。★絕對禁止輸出位置的stat_changes，玩家位置鎖定不可移動！】`, true);
    } else {
      alert(res.message || "登記失敗。");
      // 🔴 失敗時要自己解鎖，否則輸入欄會永久卡死
      if (input) input.disabled = false;
      if (sendBtn) sendBtn.disabled = false;
    }
  } catch(e) {
    alert("天道阻礙，登記失敗。");
    if (input) input.disabled = false;
    if (sendBtn) sendBtn.disabled = false;
  }
}

function openCreateFactionModal() {
  closeSystemModal('faction-overlay');
  document.getElementById('new-faction-name').value = "";
  document.getElementById('new-faction-motto').value = "";
  document.getElementById('create-faction-overlay').style.display = 'flex';
}

async function submitCreateFaction() {
  const fName = document.getElementById('new-faction-name').value.trim();
  const fAlign = document.getElementById('new-faction-align').value;
  const fMotto = document.getElementById('new-faction-motto').value.trim();
  
  if (!fName) { alert("宗門不可無名！"); return; }
  
  // 1. 驗證家底 (5萬兩)
  const currentMoney = parseInt(document.getElementById('ui-money').innerText) || 0;
  if (currentMoney < 50000) { 
    alert("囊中羞澀！開宗立派需打點各方、佈置大陣，至少需要 50,000 兩白銀。"); 
    return; 
  }

  // 2. 驗證境界 (通玄以上)
  const currentRealm = document.getElementById('ui-realm').innerText;
  const realmList = window.KYUSHU_REALM ? window.KYUSHU_REALM.REALMS : ["凡人", "引氣", "凝罡", "通玄", "罡氣", "意動", "心象", "登峰", "返璞", "天人"];
  if (realmList.indexOf(currentRealm) < realmList.indexOf("通玄")) {
    alert("修為不足！未達「通玄」境，何以服眾？強行開宗立派只是找死。");
    return;
  }
  
  // 取得當前母區域，準備在旁邊開闢空間
  const currentLoc = document.getElementById('ui-loc').innerText.split('-')[0].trim();
  
  document.getElementById('create-faction-overlay').style.display = 'none';
  const story = document.getElementById('story');
  story.insertAdjacentHTML('beforeend', `<div class="msg-player" style="border-color:#d4af37; color:#d4af37;"><b>【系統】：</b>正在發送英雄帖，準備於「${currentLoc}」開闢洞天福地，正式立派...</div>`);
  story.scrollTop = story.scrollHeight;

  try {
    const res = await gasRun({
      action: "create_faction", 
      pcId: pc.id, 
      factionName: fName, 
      align: fAlign, 
      motto: fMotto,
      baseLoc: currentLoc
    });
    
    if (res.success) {
      alert(`恭喜大能！【${fName}】正式成立！`);
      if (res.statusString) {
        localStorage.setItem('kyushu_last_status', res.statusString);
        updateUI(res.statusString.split('§'));
      }
      
      story.insertAdjacentHTML('beforeend', `<div class="msg-ai" style="border-left: 4px solid #d4af37; background:rgba(212,175,55,0.05);"><b>【天下震動】</b><br>你耗資五萬兩白銀，以無上修為在「${currentLoc}」開闢了獨立的宗門秘境，正式創立了【${fName}】，自封為一代宗主！</div>`);
      story.scrollTop = story.scrollHeight;
      
      // 默默丟給天道 AI，讓它幫忙寫一段武林人士的震驚反應
      send(`【系統動作：(純敘事) 玩家以通玄境以上的大能修為，在「${currentLoc}」周邊開闢了獨立秘境作為駐地，正式創立了陣營為「${fAlign}」的【${fName}】。請天道以旁觀者或說書人的口吻，簡短描寫天下群雄對這位新晉宗主與新勢力崛起的敬畏與震驚。★絕對禁止輸出 stat_changes。】`, true);
    } else {
      alert("創立失敗：" + res.message);
    }
  } catch(e) {
    alert("天道阻礙，立派失敗。");
  }
}
function switchEpicTab(tab) {
  currentEpicTab = tab;
  const histBtn = document.getElementById('tab-epic-history');
  const statBtn = document.getElementById('tab-epic-stats');
  const histPanel = document.getElementById('panel-epic-history');
  const statPanel = document.getElementById('panel-epic-stats');

  if (tab === 'history') {
    histBtn.style.borderBottomColor = '#800080'; histBtn.style.color = '#800080'; histBtn.style.fontWeight = 'bold';
    statBtn.style.borderBottomColor = 'transparent'; statBtn.style.color = '#816e54'; statBtn.style.fontWeight = 'normal';
    histPanel.style.display = 'block'; statPanel.style.display = 'none';
  } else {
    statBtn.style.borderBottomColor = '#800080'; statBtn.style.color = '#800080'; statBtn.style.fontWeight = 'bold';
    histBtn.style.borderBottomColor = 'transparent'; histBtn.style.color = '#816e54'; histBtn.style.fontWeight = 'normal';
    histPanel.style.display = 'none'; statPanel.style.display = 'block';
  }
}

// 🌌 神識星圖引擎邏輯 (終極數學修正版)
// ==========================================
let mapTransform = { scale: 1, x: 0, y: 0 };
let currentActiveParent = null;
let centerPx = 0, centerPy = 0; 

function openVisualMap() {
  document.getElementById('explore-overlay').style.display = 'none';
  document.getElementById('map-visual-overlay').style.display = 'block';
  if (categorizedMapData) {
    renderVisualMap(categorizedMapData);
    initMapControls(); 
  }
}

function closeVisualMap() {
  document.getElementById('map-visual-overlay').style.display = 'none';
  document.getElementById('explore-overlay').style.display = 'flex'; 
  document.getElementById('map-info-card').style.bottom = '-200px'; 
}

function renderVisualMap(data) {
  const canvas = document.getElementById('map-canvas');
  canvas.innerHTML = '';
  
  const rawLoc = document.getElementById('ui-loc').innerText || "";
  const currentLoc = rawLoc.replace(/九州-/g, "").split('-')[0].trim(); 
  
  centerPx = 0; centerPy = 0; 
  let foundPlayer = false; 

  for (let category in data) {
    const regions = data[category];
    let glowColor = category === "宗門" ? "#4682b4" : category === "險地" ? "#a52a2a" : category === "勝境" ? "#e91e63" : "#d4af37";

    Object.keys(regions).forEach(parentName => {
      const parentData = regions[parentName];
      const cleanParentName = parentName.replace(/九州-/g, "").split('-')[0].trim(); 
      const coords = parentData.coord ? parentData.coord.split(',') : [0, 0];
      // 放大倍率 25px，並將 Y 軸反轉以符合網頁座標
      const px = parseInt(coords[0]) * 25; 
      const py = -(parseInt(coords[1]) * 25);

      if (currentLoc === cleanParentName) {
         centerPx = px;
         centerPy = py;
         foundPlayer = true; 
      }

      const pNode = document.createElement('div');
      pNode.className = 'map-node-parent' + (currentLoc === cleanParentName ? ' player-here' : '');
      pNode.style.left = `${px}px`; pNode.style.top = `${py}px`;
      pNode.style.boxShadow = `0 0 15px ${glowColor}, inset 0 0 8px rgba(255,255,255,0.8)`;
      if (category === "宗門") pNode.style.background = glowColor;

      const badge = parentData.count > 0 ? `<div class="npc-badge">${parentData.count}</div>` : '';
      pNode.innerHTML = `<div class="map-label">${parentName}</div>${badge}`;
      
      pNode.subNodes = []; 

      pNode.onclick = (e) => {
        e.stopPropagation();
        if (currentActiveParent && currentActiveParent !== pNode) {
          currentActiveParent.classList.remove('active');
          if (currentActiveParent.subNodes) {
             currentActiveParent.subNodes.forEach(n => n.classList.remove('show'));
          }
        }
        pNode.classList.toggle('active');
        const isActive = pNode.classList.contains('active');
        currentActiveParent = isActive ? pNode : null;
        pNode.subNodes.forEach(n => isActive ? n.classList.add('show') : n.classList.remove('show'));
        showInfoCard(parentName, parentData.desc);
      };
      
      canvas.appendChild(pNode);

      if (parentData.subs && parentData.subs.length > 0) {
        const radius = 60; const angleStep = (Math.PI * 2) / parentData.subs.length;
        parentData.subs.forEach((sub, index) => {
          const subX = px + Math.cos(index * angleStep) * radius;
          const subY = py + Math.sin(index * angleStep) * radius;
          const sNode = document.createElement('div');
          sNode.className = 'map-node-sub';
          sNode.style.left = `${subX}px`; sNode.style.top = `${subY}px`;
          const sBadge = sub.count > 0 ? `<div class="npc-badge" style="background:#4682b4;">${sub.count}</div>` : '';
          sNode.innerHTML = `<div class="map-label" style="font-size:11px; color:#aaa;">${sub.name.split('-')[1] || sub.name}</div>${sBadge}`;
          
          sNode.onclick = (e) => { e.stopPropagation(); showInfoCard(sub.name, sub.desc); };
          canvas.appendChild(sNode);
          
          pNode.subNodes.push(sNode); 
        });
      }
    });
  }

  // 🔴 依照要求：如果地圖找不到玩家，安靜地待在 (0,0) 的無名小鎮
  if (!foundPlayer) {
    centerPx = 0; 
    centerPy = 0; 
  }
}

function showInfoCard(locName, desc) {
  document.getElementById('map-card-title').innerText = locName;
  document.getElementById('map-card-desc').innerText = desc || "未知區域";
  document.getElementById('map-card-btn').onclick = () => { 
    closeVisualMap(); 
    document.getElementById('explore-overlay').style.display = 'none'; 
    travelTo(locName, 0); 
  };
  document.getElementById('map-info-card').style.bottom = '20px';
}

document.getElementById('map-visual-overlay').addEventListener('click', () => {
  if (currentActiveParent) {
    currentActiveParent.classList.remove('active');
    if (currentActiveParent.subNodes) {
      currentActiveParent.subNodes.forEach(n => n.classList.remove('show'));
    }
  }
  document.getElementById('map-info-card').style.bottom = '-200px';
  currentActiveParent = null;
});

function initMapControls() {
  const overlay = document.getElementById('map-visual-overlay');
  const canvas = document.getElementById('map-canvas');
  let isDragging = false, startX, startY, initialPinchDist = null;
  
  const updateTransform = () => {
    mapTransform.scale = Math.max(0.4, Math.min(mapTransform.scale, 3.0)); 
    canvas.style.transform = `translate(${mapTransform.x}px, ${mapTransform.y}px) scale(${mapTransform.scale})`;
  };
  
  // 🔴 抓到蟲了！修正數學：因為 CSS 已經 top:50%; left:50%;，所以不需要再加螢幕寬度了！
  mapTransform.scale = 1; 
  mapTransform.x = -centerPx; // 直接把玩家座標反推回來
  mapTransform.y = -centerPy; // 直接把玩家座標反推回來
  updateTransform();

  overlay.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX - mapTransform.x; startY = e.clientY - mapTransform.y; });
  overlay.addEventListener('mousemove', (e) => { if (isDragging) { mapTransform.x = e.clientX - startX; mapTransform.y = e.clientY - startY; updateTransform(); }});
  overlay.addEventListener('mouseup', () => isDragging = false);
  overlay.addEventListener('wheel', (e) => { e.preventDefault(); mapTransform.scale += e.deltaY > 0 ? -0.1 : 0.1; updateTransform(); });

  overlay.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX - mapTransform.x; startY = e.touches[0].clientY - mapTransform.y; }
    else if (e.touches.length === 2) { isDragging = false; initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
  });
  overlay.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) { mapTransform.x = e.touches[0].clientX - startX; mapTransform.y = e.touches[0].clientY - startY; updateTransform(); }
    else if (e.touches.length === 2 && initialPinchDist) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      mapTransform.scale += (dist - initialPinchDist) * 0.005; initialPinchDist = dist; updateTransform();
    }
  }, { passive: false });
  overlay.addEventListener('touchend', () => { isDragging = false; initialPinchDist = null; });
}
</script>
