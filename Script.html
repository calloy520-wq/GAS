<script>
  // ==========================================
  // 🔴 前端 XSS 防護：任何「可能來自其他玩家輸入」的文字，渲染進 innerHTML 前都要過這層轉義
  //   (自己打的字後端也會清過，但跨玩家可見的內容——飛書內容、傳聞、排行榜暱稱等——多一層保險)
  // ==========================================
  function escapeHtml(str) {
    if (str === null || str === undefined) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
  // ==========================================
  // 🔴 核心通訊層：封裝 google.script.run 成 Promise，完美替換 fetch
  // ==========================================
  function gasRun(payload) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(responseRaw => {
          try {
            const data = (typeof responseRaw === 'string') ? JSON.parse(responseRaw) : responseRaw;
            resolve(data);
          } catch (e) {
            console.error("【天道解析異常】:", responseRaw);
            reject(e);
          }
        })
        .withFailureHandler(err => {
          console.error("【天道連線中斷】:", err);
          reject(err);
        })
        .handleGameAction(payload);
    });
  }

  // ==========================================
  // 全域變數狀態 (新增目標綁定器)
  // ==========================================
  let pc = JSON.parse(localStorage.getItem('kyushu_v27'));
  let currentStatusTargetId = pc ? pc.id : ""; 
  let currentStatusTargetName = pc ? pc.name : "";
  let localNPCs = [];
  let nearbyLocations = []; 
  let giftTargetNPC = null;
  let useItemTargetNPC = null;
  let historyPushed = false;
  let categorizedMapData = null;
  let sellMode = false; // 🔴 變賣模式旗標
  
  const _RC = window.KYUSHU_REALM || {}; 
const REALMS = _RC.REALMS || ["凡人", "引氣", "凝罡", "通玄", "罡氣", "意動", "心象", "登峰", "返璞", "天人"];
const REALM_MODIFIERS = _RC.REALM_MODIFIERS || {"凡人":1.0, "引氣":1.3, "凝罡":1.6, "通玄":2.0, "罡氣":2.5, "意動":3.2, "心象":4.0, "登峰":8.0, "返璞":20.0, "天人":50.0};
const REALM_LIMITS = _RC.REALM_LIMITS || {"凡人":20, "引氣":25, "凝罡":30, "通玄":40, "罡氣":50, "意動":65, "心象":80, "登峰":120, "返璞":160, "天人":200};

  const NPC_ACTIONS = {
    '贈禮': { prompt: '請描寫玩家掏出物品示好的過程...' }
  };

 window.onload = () => {
    document.documentElement.style.setProperty('--story-scale', parseFloat(localStorage.getItem('kyushu_story_font_scale')) || 1);
    document.addEventListener('click', (e) => {
      const drawer = document.getElementById('action-drawer');
      const trigger = document.getElementById('plus-trigger');
      if (drawer.style.display === 'grid' && !drawer.contains(e.target) && e.target !== trigger) {
        toggleActionDrawer();
      }
    });

    if (pc && pc.name) {
  const nameInput = document.getElementById('s-name');
  if (nameInput) {
    nameInput.value = pc.name;
  }
  document.head.insertAdjacentHTML("beforeend", `<style>
    .loc-link { color: #2e8b57; border-bottom: 1px dashed #2e8b57; cursor: pointer; font-weight: bold; }
    .loc-link:hover { background: rgba(46,139,87,0.2); }
    #recent-loc-bar::-webkit-scrollbar { display: none; }
  </style>`);
  renderRecentLocs();
}


    document.getElementById('story').addEventListener('click', function(e) {
      const interactTarget = e.target.closest('[data-interact]');
      if (interactTarget) {
        openInteractMenu(interactTarget.getAttribute('data-interact'));
        return;
      }
      
      // 🔴 插入這段：攔截「遠方之人」的點擊
      const remoteTarget = e.target.closest('[data-remote]');
      if (remoteTarget) {
        const npcName = remoteTarget.getAttribute('data-remote');
        openRemoteNpcAction(npcName); // 呼叫遠端互動選單
        return;
      }

      const registerTarget = e.target.closest('[data-register]');
      if (registerTarget) {
        const npcName = registerTarget.getAttribute('data-register');
        const npcContext = registerTarget.getAttribute('data-context') || '';
        showRegisterNpcModal(npcName, npcContext);
        return;
      }

      const locTarget = e.target.closest('[data-loc]');
      if (locTarget) {
        const locName = locTarget.getAttribute('data-loc');
        
        // 🔴 專屬防護：只有點擊故事對話中的綠色地名，才會跳出確認！
        if (confirm(`確定要啟程前往「${locName}」嗎？`)) {
          travelTo(locName, 0);
        }
        return;
      }
    });
  };

  function setupHistoryPrevention() {
    if (!historyPushed) {
      window.history.pushState({ page: 'kyushu_game' }, null, '');
      window.addEventListener('popstate', handlePopState);
      historyPushed = true;
    }
  }

  function handlePopState(e) {
    document.getElementById('exit-confirm-overlay').style.display = 'flex';
    window.history.pushState({ page: 'kyushu_game' }, null, '');
  }

  function cancelExit() {
    document.getElementById('exit-confirm-overlay').style.display = 'none';
  }

  function confirmExit() {
    window.removeEventListener('popstate', handlePopState);
    window.history.back();
  }

  function toggleFullScreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(err => {
        alert(`無法進入全螢幕: ${err.message}`);
      });
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
    }
  }
  
  function setBackLockBtnUI(locked) {
    const btn = document.getElementById('back-lock-btn');
    if (!btn) return;
    btn.innerText = locked ? '🔒 已鎖' : '🔓';
    btn.style.background = locked ? '#660000' : '#1a1a1a';
    btn.style.borderColor = locked ? '#ff4444' : '#555';
    btn.style.color = locked ? '#ff6666' : '#555';
  }
  function toggleBackLock() {
  const locked = localStorage.getItem('kyushu_back_locked') === 'true';
  localStorage.setItem('kyushu_back_locked', String(!locked));
  setBackLockBtnUI(!locked);
  }
  function toggleActionDrawer() {
    const drawer = document.getElementById('action-drawer');
    const trigger = document.getElementById('plus-trigger');
    if (drawer.style.display === 'grid') {
      drawer.style.display = 'none'; trigger.classList.remove('active');
    } else {
      drawer.style.display = 'grid'; trigger.classList.add('active');
    }
  }
  

  function updateRecentLocations(newLoc) {
  if (!newLoc || newLoc === "--" || newLoc === "未知區域") return;
  let recents = JSON.parse(localStorage.getItem('kyushu_recent_locs') || "[]");
  if (recents[0] === newLoc) return;
  recents = recents.filter(loc => loc !== newLoc);
  recents.unshift(newLoc);
  if (recents.length > 5) recents = recents.slice(0, 5);
  localStorage.setItem('kyushu_recent_locs', JSON.stringify(recents));
  renderRecentLocs(recents);
}

function renderRecentLocs(recents = null) {
  if (!recents) recents = JSON.parse(localStorage.getItem('kyushu_recent_locs') || "[]");
  const bar = document.getElementById('recent-loc-bar');
  if (!bar) return;
  if (recents.length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  bar.innerHTML = `<span style="font-size:11px; color:#666; margin-right:2px; font-weight:bold;">👣 捷徑：</span>` +
    recents.map(loc => {
      const shortName = loc.split('-')[1] || loc;
      return `<button class="btn" style="padding:2px 8px; font-size:12px; border-color:#2e8b57; color:#2e8b57; background:rgba(46,139,87,0.05); white-space:nowrap;" onclick="travelTo('${loc}', 0)">${shortName}</button>`;
    }).join('');
}
  // 🔴 替換調用 openStatus
  // 找到這段並替換 case 'settings' 的內容：
  function triggerDrawerAction(actionType) {
    toggleActionDrawer();
    switch(actionType) {
      case 'sync': syncData(); break;
      case 'inventory': openSystemModal('inventory-overlay'); break;
      case 'quest': openSystemModal('quest-overlay'); break;
      case 'explore': toggleExplore(); break;
      case 'npc': refreshAndOpenNpcList(); break;
      case 'bond': toggleBondModal(); break;
      case 'status': openStatus(); break;
      
      // 🔴 修改這行！讓它去呼叫專屬的設定選單函數
      case 'settings': openSettingsMenu(); break; 
    }
  }
  
  // ==========================================
  // 🔴 系統設定：AI 選項開關邏輯
  // ==========================================
  
  // 1. 讀取玩家的偏好記憶 (預設為 true 開啟)
  let enableAiOptions = localStorage.getItem('kyushu_options_toggle') !== 'false'; 

  // 2. 打開設定選單時，同步開關的視覺狀態
  function openSettingsMenu() {
      const toggle = document.getElementById('setting-opt-toggle');
      if (toggle) toggle.checked = enableAiOptions;
      highlightFontScaleBtn(parseFloat(localStorage.getItem('kyushu_story_font_scale')) || 1);
      document.getElementById('settings-overlay').style.display = 'flex';
  }

  // 對話字體大小：套用並記憶玩家偏好的縮放比例
  function setStoryFontScale(scale) {
      document.documentElement.style.setProperty('--story-scale', scale);
      localStorage.setItem('kyushu_story_font_scale', scale);
      highlightFontScaleBtn(scale);
  }
  function highlightFontScaleBtn(scale) {
      document.querySelectorAll('.font-scale-btn').forEach(b => {
          const active = parseFloat(b.dataset.scale) === parseFloat(scale);
          b.style.background = active ? 'var(--gold-accent)' : '#1a1a1a';
          b.style.color = active ? '#1a1a1a' : 'var(--gold-accent)';
      });
  }

  // 3. 玩家切換開關時，立刻記憶並隱藏/顯示選項
  function toggleAiOptions(el) {
      enableAiOptions = el.checked;
      localStorage.setItem('kyushu_options_toggle', enableAiOptions);
      
      // 立刻對畫面上的選項區塊施加隱形術
      const optContainer = document.getElementById('options-container');
      if (optContainer) {
          optContainer.style.display = enableAiOptions ? 'flex' : 'none';
      }
  }

  // 4. 網頁剛載入時 (保險起見)，也檢查一次要不要隱藏
  document.addEventListener('DOMContentLoaded', () => {
      const optContainer = document.getElementById('options-container');
      if (optContainer) {
          optContainer.style.display = enableAiOptions ? 'flex' : 'none';
      }
  });

  // 🔴 補上這個缺失的關閉函數，修練按鈕就會復活了！
  function closeCultivateMenu() {
      document.getElementById('cultivate-modal').style.display = 'none';
  }

  async function openSystemModal(modalId) {
    const modal = document.getElementById(modalId);
    if (!modal) return;
    modal.style.display = 'flex';
    
    const contentId = modalId === 'quest-overlay' ? 'quest-content' : 'inventory-content';
    const actionType = modalId === 'quest-overlay' ? 'quests' : 'inventory';
    const container = document.getElementById(contentId);

    container.innerHTML = `<p style="text-align:center; color:#816e54; font-style:italic;">正向天道感應資料中...</p>`;
    try {
      const result = await gasRun({ action: actionType, pcId: pc.id });

      if (result.success && result.data && result.data.length > 0) {

        // 🔴 動態渲染行囊容量標題
        if (actionType === 'inventory') {
            const invTitle = document.querySelector('#inventory-overlay h2');
            if (invTitle) {
                const currentCount = result.data.length;
                const maxCount = result.max || 50;
                const color = currentCount >= maxCount ? '#ff4d4d' : '#2e8b57';
                invTitle.innerHTML = `🎒 我的行囊 <span style="color:${color}; font-size:16px;">(${currentCount}/${maxCount})</span>`;
            }
        }

        function getEqName(id) {
          let text = document.getElementById(id)?.innerText || "";
          let match = text.match(/\[\s*(.*?)\s*\]/);
          return match ? match[1].trim() : "";
        }
        const eqNames = [
          getEqName("eq-weapon"), getEqName("eq-armor"), 
          getEqName("eq-acc1"), getEqName("eq-acc2")
        ].filter(n => n && n !== "(空)");

        let htmlOutput = result.data.map(item => {
          if (actionType === 'quests') {
             // 🛡️ 對任務名稱進行安全化洗滌，防止單雙引號炸裂
             let safeName = item.name.replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/\n/g, "\\n");

             if (item.status === "進行中") {
               return `
                <div class="npc-card" style="border-left: 3px solid #9C27B0; padding-left: 10px; margin-bottom:12px; background:rgba(156,39,176,0.02);">
                  <b style="color: #9C27B0;">[進行中] ${item.name}</b><br>
                  <small style="color: #553311; display:block; margin-bottom:4px;">目標：${item.target}</small>
                  <small style="color: #2e8b57; font-weight:bold; display:block; margin-bottom:8px;">💰 預定報酬：${item.money} 兩白銀 ${item.item && item.item !== "無" ? `/ 🎁 獎品：${item.item}` : ''}</small>
                  <div style="display:flex; gap:8px;">
                    <button class="btn" style="padding:2px 10px; font-size:11px; border-color:#9C27B0; color:#9C27B0;" onclick="lockBtn(event, () => handleQuestAction('execute', '${safeName}'))">執行任務</button>
                    <button class="btn" style="padding:2px 10px; font-size:11px; border-color:#666; color:#666;" onclick="lockBtn(event, () => handleQuestAction('abandon', '${safeName}'))">放棄</button>
                  </div>
                </div>`;
             } else if (item.status === "逾期失敗") {
               return `
                <div class="npc-card" style="border-left: 3px solid #888; padding-left: 10px; margin-bottom:12px; background:rgba(136,136,136,0.05); border-radius:4px;">
                  <b style="color: #888;">⌛ [逾期失敗] ${item.name}</b><br>
                  <small style="color: #553311; display:block; margin-bottom:4px;">目標：${item.target}</small>
                  <small style="color: #888; font-weight:bold; display:block; margin-bottom:8px;">天命已逝，未能在期限內完成。</small>
                  <div style="display:flex; gap:8px;">
                    <button class="btn" style="padding:2px 10px; font-size:11px; border-color:#555; color:#555;" onclick="lockBtn(event, () => handleQuestAction('delete', '${safeName}'))">抹除紀錄</button>
                  </div>
                </div>`;
             } else {
               return `
                <div class="npc-card" style="border-left: 3px solid #daa520; padding-left: 10px; margin-bottom:12px; background:rgba(218,175,32,0.05); border-radius:4px;">
                  <b style="color: #8b5a2b;">✨ [已完成] ${item.name}</b><br>
                  <small style="color: #553311; display:block; margin-bottom:4px;">目標：${item.target}</small>
                  <small style="color: #b8860b; font-weight:bold; display:block; margin-bottom:8px;">🎁 未領取報酬：${item.money} 兩銀 ${item.item && item.item !== "無" ? `/ 「${item.item}」` : ''}</small>
                  <div style="display:flex; gap:8px;">
                    <button class="btn" style="padding:4px 14px; font-size:12px; border-color:#daa520; color:#daa520; background:rgba(218,175,32,0.15); font-weight:bold;" onclick="lockBtn(event, () => handleQuestAction('claim', '${safeName}'))">💰 領賞</button>
                    <button class="btn" style="padding:2px 10px; font-size:11px; border-color:#555; color:#555;" onclick="lockBtn(event, () => handleQuestAction('delete', '${safeName}'))">抹除紀錄</button>
                  </div>
                </div>`;
             }
          } else { // 🌟 完美的 else 區塊對齊
            const isGiftMode = (giftTargetNPC !== null);
            const isSellMode = sellMode;
            const isUseOnNpcMode = (useItemTargetNPC !== null);
            const isEquipped = eqNames.includes(item.name.trim());

            if ((isGiftMode || isSellMode) && isEquipped) return "";
            if (isUseOnNpcMode && !["丹藥", "恢復道具"].includes(item.type)) return "";

            let actionButtonsHtml = "";
            let equippedTag = "";

            if (isEquipped) {
               equippedTag = `<span style="color:#8b5a2b; font-weight:bold; font-size:12px; margin-left:8px;">[★ 裝備中]</span>`;
               actionButtonsHtml = `<span style="color:#816e54; font-size:11px; font-style:italic;">(已裝備於身，無法操作)</span>`;
            } else {
               if (isSellMode) {
                 if (item.type === "定情信物") {
                   actionButtonsHtml = `<span style="color:#816e54; font-size:11px; font-style:italic;">(定情信物，無法變賣)</span>`;
                 } else {
                   actionButtonsHtml = `<button class="btn" style="padding:2px 10px; font-size:11px; border-color:#daa520; color:#daa520;" onclick="handleSellAction('${item.id}', '${item.name.replace(/'/g, "\\'")}')">💰 賣出</button>`;
                 }
               } else if (isGiftMode) {
                 actionButtonsHtml = `<button class="btn" style="padding:2px 10px; font-size:11px; border-color:#daa520; color:#daa520;" onclick="handleGiftAction('${item.id}', '${item.name.replace(/'/g, "\\'")}', '${item.type}')">贈送給 ${giftTargetNPC}</button>`;
               } else if (isUseOnNpcMode) {
                 actionButtonsHtml = `<button class="btn" style="padding:2px 10px; font-size:11px; border-color:#e91e63; color:#e91e63;" onclick="lockBtn(event, () => handleUseItemOnNpcAction('${item.id}', '${item.name.replace(/'/g, "\\'")}'))">💊 用在 ${useItemTargetNPC}</button>`;
               } else {
                   actionButtonsHtml = `
                   <button class="btn" style="padding:2px 10px; font-size:11px; border-color:#4682b4; color:#4682b4;" onclick="lockBtn(event, () => handleItemAction('inspect', '${item.id}', '${item.name.replace(/'/g, "\\'")}', '${item.type}'))">🔍 端詳</button>
                   <button class="btn" style="padding:2px 10px; font-size:11px; border-color:#e91e63; color:#e91e63;" onclick="lockBtn(event, () => handleItemAction('consume', '${item.id}', '${item.name.replace(/'/g, "\\'")}', '${item.type}'))">💥 使用</button>
                   <button class="btn" style="padding:2px 10px; font-size:11px; border-color:#b8860b; color:#b8860b;" onclick="lockBtn(event, () => handleStoreToWarehouse('${item.id}', '${item.name.replace(/'/g, "\\'")}'))">📦 存入倉庫</button>
                   <button class="btn" style="padding:2px 10px; font-size:11px; border-color:#800; color:#800;" onclick="lockBtn(event, () => handleItemAction('discard', '${item.id}', '${item.name.replace(/'/g, "\\'")}', '${item.type}'))">丟棄</button>`;
                 }
            }

            return `
              <div class="npc-card" style="border-left: 3px solid #2e8b57; padding-left: 10px; margin-bottom:12px;">
                <b style="color: #2e8b57;">${item.name}</b> <span style="font-size:11px; color:#666;">(${item.type})</span>${equippedTag}<br>
                <small style="color: #553311; display:block; margin-bottom:8px;">描述：${item.desc}</small>
                ${item.stats ? `<small style="color: #8b5a2b; display:block; margin-bottom:8px; font-weight:bold;">✨ ${item.stats}</small>` : ''}
                <div style="display:flex; gap:8px;">${actionButtonsHtml}</div>
              </div>`;
          }
        }).join("");

        if (htmlOutput.trim() === "") {
           container.innerHTML = `<p style="text-align:center; color:#816e54; padding: 20px;">行囊中沒有可操作的物品。</p>`;
        } else {
           container.innerHTML = htmlOutput;
        }

      } else {
        container.innerHTML = `<p style="text-align:center; color:#816e54; padding: 20px;">空空如也，尚未感應到因果聯繫。</p>`;
      }
    } catch (e) {
      container.innerHTML = `<p style="text-align:center; color:red; padding: 20px;">天道阻塞：無法連結伺服器</p>`;
    }
  }

  async function refreshAndOpenNpcList() {
    toggleActionDrawer();
    document.getElementById('npc-overlay').style.display = 'flex';
    document.getElementById('npc-content').innerHTML = "<p style='text-align:center; color:#816e54;'>正在感應天地...同步眾生氣息...</p>";

    try {
        await syncData(true); 
        renderNpcList();      
    } catch (e) {
        document.getElementById('npc-content').innerHTML = "<p style='text-align:center; color:red;'>天道感應失敗。</p>";
    }
  }

  async function openNpcInventoryModal(npcName) {
     const modal = document.getElementById('npc-inventory-overlay');
     modal.style.display = 'flex';
     const container = document.getElementById('npc-inventory-content');
     container.innerHTML = `<p style="text-align:center; color:#816e54;">正在暗中以神識打探「${npcName}」...</p>`;

     try {
       const data = await gasRun({ action: "inspect_npc", targetName: npcName, pcId: pc.id });
       
       if (data.success && data.data && data.data.length > 0) {
          container.innerHTML = data.data.map(item => `
            <div class="npc-card" style="border-left: 3px solid #4682b4; padding-left: 10px; margin-bottom:12px;">
              <b style="color: #4682b4;">${item.name}</b> <span style="font-size:11px; color:#666;">(${item.type})</span><br>
              <small style="color: #553311; display:block; margin-bottom:8px;">描述：${item.desc}</small>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <!-- 🔴 修正：把 item.id 傳入 attemptSteal -->
                <button class="btn" style="padding:2px 10px; font-size:11px; border-color:#800080; color:#800080;"
                  onclick="attemptSteal('${item.id}', '${item.name.replace(/'/g, "\\'")}', '${npcName}')">✋ 妙手空空 (偷竊)</button>
                <button class="btn" style="padding:2px 10px; font-size:11px; border-color:#2e8b57; color:#2e8b57;"
                  onclick="lockBtn(event, () => handleRequestItem('${item.id}', '${item.name.replace(/'/g, "\\'")}', '${npcName}'))">📥 索要</button>
                <button class="btn" style="padding:2px 10px; font-size:11px; border-color:#a52a2a; color:#a52a2a;"
                  onclick="lockBtn(event, () => handleRequestDiscard('${item.id}', '${item.name.replace(/'/g, "\\'")}', '${npcName}'))">🗑️ 要求丟棄</button>
              </div>
            </div>
          `).join("");
       } else {

}

  async function openCraftMenu() {
      toggleActionDrawer();

      modal.style.display = 'flex';

      listEl.innerHTML = '<div style="color:#816e54; text-align: center;">正在翻找行囊...</div>';
      document.getElementById('craft-intent').value = ""; 
      
      try {
          // 1. 取得目前已裝備的物品名稱
          function getEqName(id) {
              let text = document.getElementById(id)?.innerText || "";
              let match = text.match(/\[\s*(.*?)\s*\]/);
              return match ? match[1].trim() : "";
          }
          const eqNames = [
              getEqName("eq-weapon"), getEqName("eq-armor"), 
              getEqName("eq-acc1"), getEqName("eq-acc2")
          ].filter(n => n && n !== "(空)");

          const res = await gasRun({ action: "inventory", pcId: pc.id });
          if (res.success && res.data.length > 0) {
              // 2. 過濾掉所有已經裝備在身上的法寶與武器
              const availableItems = res.data.filter(item => !eqNames.includes(item.name.trim()));
              
              if (availableItems.length > 0) {
                  listEl.innerHTML = availableItems.map(item => `
                      <label style="display:flex; align-items:center; gap:10px; margin-bottom:10px; cursor:pointer; padding:4px; background:rgba(255,255,255,0.02); border-radius:4px;">

                          <span style="font-size:11px; color:#816e54;">(${item.type})</span>
                      </label>
                  `).join("");
              } else {
                  listEl.innerHTML = '<div style="color:#816e54; text-align: center; padding:20px;">行囊中的物品皆已裝備在身，無多餘素材可煉。</div>';
              }
          } else {
              listEl.innerHTML = '<div style="color:#816e54; text-align: center; padding:20px;">行囊空空如也，無物可煉。</div>';
          }
      } catch (e) {
          listEl.innerHTML = '<div style="color: red; text-align: center;">天道感應失敗</div>';

  function handleCraftCheck(checkbox) {

      if (checkedBoxes.length > 5) {
          checkbox.checked = false;
          alert("開爐極限為 5 樣素材，強行投入恐引發炸爐！");

  async function executeCraft() {
      const checkedBoxes = document.querySelectorAll('#craft-materials-list input[type="checkbox"]:checked');
      if (checkedBoxes.length === 0) {
          alert("必須至少投入一樣素材，否則無法開爐！");
          return;
      }

      const method = document.getElementById('craft-method').value;
      const intent = document.getElementById('craft-intent').value.trim();
      if (!intent) {
          alert("煉製神物必須心存意圖，請輸入你想做什麼！");
          return;
      }

      const materials = [];
      checkedBoxes.forEach(cb => {
          materials.push({ id: cb.value, name: cb.getAttribute('data-name'), type: cb.getAttribute('data-type') });
      });

      document.getElementById('craft-overlay').style.display = 'none';

      const matNames = materials.map(m => m.name).join('、');
      const story = document.getElementById('story');
      story.insertAdjacentHTML('beforeend', `<div class="msg-player"><b>【系統】：</b>啟動了「${method}」陣法，將行囊中的「${matNames}」投入爐火之中。心中的意圖：「${intent}」。</div>`);
      story.scrollTop = story.scrollHeight;
      const loadId = "L" + Date.now();
      story.insertAdjacentHTML('beforeend', `<div id="${loadId}" class="loading-text">天道演化中...</div>`);
      story.scrollTop = story.scrollHeight;

      try {
          const res = await gasRun({ action: "craft_item", pcId: pc.id, method: method, intent: intent, materials: materials });
          document.getElementById(loadId)?.remove();
          if (res.success) {
              let t = (res.text || "").replace(/\\r\\n/g, '\n').replace(/\\n/g, '\n');
              t = t.replace(/\n{2,}/g, "<br><br>").replace(/\n/g, "<br><br>");
              story.insertAdjacentHTML('beforeend', `<div class="msg-ai" style="border-left:4px solid #e91e63;"><b>【煉成・${res.rarity || ""}】</b>${t}<br><span style="color:#e91e63;">✨ 獲得「${res.itemName}」！</span></div>`);
              story.scrollTop = story.scrollHeight;
              syncData(true);
          } else {
              alert(res.message || "煉成失敗。");
          }
      } catch (e) {
          document.getElementById(loadId)?.remove();
          alert("天道阻礙，煉成失敗。");
      }
  }


  async function handleQuestAction(action, questName) {
    if (action === 'claim') {
      closeSystemModal('quest-overlay');
      const story = document.getElementById('story');
      const isFactionQuest = questName.startsWith("【宗門】");
      story.innerHTML += `<div class="msg-player"><b>【系統】：</b>正在${isFactionQuest ? "回報宗門" : "向聽風閣閣主提交"}「${questName}」的憑證，申領賞銀與天珍...</div>`;
      story.scrollTop = story.scrollHeight;
      
      try {
        const res = await gasRun({ action: "claim_quest_reward", pcId: pc.id, questName: questName });
        alert(res.message);
        if (res.success && res.statusString) {
          // 瞬間覆寫狀態與 UI (錢包秒跳動)
          localStorage.setItem('kyushu_last_status', res.statusString);
          updateUI(res.statusString.split('§'));
          
          // 🟢 改走輕量敘事：純交差場面，不需要場景脈絡
          let promptMsg = `【純敘事】我成功繳交並領取了天命任務「${questName}」的報酬。請以說書人口吻，生動描繪我功成領賞、圓滿交差的場面，簡短即可。`;
          narrate(promptMsg);
        }
      } catch(e) {
        alert("天道阻塞，領賞因果受阻。");
      }
      return;
    }
    
    if (action === 'abandon' || action === 'delete') {
      const confirmStr = action === 'abandon' ? `確定放棄天命「${questName}」嗎？` : `確定要抹除「${questName}」的因果紀錄嗎？`;
      if (!confirm(confirmStr)) return;
      closeSystemModal('quest-overlay');
      try {
        await gasRun({ action: "abandon_quest", pcId: pc.id, questName: questName });

        document.getElementById('story').innerHTML += `<div class="msg-player"><b>【系統】：</b>${msgStr}</div>`;
        syncData(true);
      } catch(e) {}
    } else {
      closeSystemModal('quest-overlay');
      send(`【系統動作：玩家對天命「${questName}」進行執行任務依照玩家個性特徵，直接完成任務。】`, true);
    }

  // ==========================================

  // ==========================================
  function renderMapCategories() {
    const container = document.getElementById('explore-content');
    if (!categorizedMapData || Object.keys(categorizedMapData).length === 0) {
      container.innerHTML = "<p style='text-align:center; color:#816e54;'>天下大亂，輿圖已毀。</p>";
      return;
    }

    // 🔴 新增：在最上方插入「展開神識」的大按鈕
    let html = `
      <div style="margin-bottom: 20px; border-bottom: 1px dashed rgba(212,175,55,0.3); padding-bottom: 15px;">
        <button class="btn" style="width: 100%; border-color:#d4af37; color:#d4af37; background:rgba(212,175,55,0.1); padding: 15px; font-size: 16px; font-weight: bold; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; gap: 8px;" onclick="openVisualMap()">
          🌌 展開神識 ‧ 俯瞰九州全貌
        </button>
      </div>
    `;

    html += `<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">`;
    const iconMap = { "大城市": "🏙️", "鄉鎮": "🏡", "險地": "💀", "勝境": "🌸", "宗門": "⛩️" };

    for (let category in categorizedMapData) {
      const icon = iconMap[category] || "🗺️";
      const count = Object.keys(categorizedMapData[category]).length;
      const totalPeople = Object.values(categorizedMapData[category]).reduce((sum, r) => sum + (r.count || 0), 0);
      const peopleBadge = totalPeople > 0 ? `<span style="font-size:11px; color:#e91e63;">👥${totalPeople}人</span>` : '';
      html += `<button class="btn" style="border-color:#d4af37; color:#d4af37; padding: 15px 5px; font-size: 15px; display:flex; flex-direction:column; align-items:center; gap:6px;" onclick="renderMapLocationsByCategory('${category}')">
      <span style="font-size:26px;">${icon}</span>
      <span>${category} <small style="color:#888; font-size:11px;">(${count}區)</small></span>
      ${peopleBadge}
      </button>`;
    }
    html += `</div>`;
    container.innerHTML = html;
  }

  // ==========================================
  // 2. 渲染特定類別下的區域與分支 (地圖第二、三層)
  // ==========================================
  function renderMapLocationsByCategory(category) {
    const container = document.getElementById('explore-content');
    const regions = categorizedMapData[category];

    // 1. 頂部標題區
    let html = `
      <div style="text-align:center; margin-bottom: 20px; border-bottom: 2px solid #4682b4; padding-bottom: 10px;">
        <h3 style="color:#4682b4; margin:0; font-size: 18px;">【 ${category} 】</h3>
        <button class="btn" style="border-color:#888; color:#888; padding: 2px 12px; font-size: 11px; margin-top: 8px;" onclick="renderMapCategories()">🔙 返回分類目錄</button>
      </div>`;

    // 2. 遍歷每一個母區域
    Object.keys(regions).forEach(parentName => {
    const parentData = regions[parentName];
    const parentPeopleTag = parentData.count > 0 
        ? `<span style="font-size:11px; color:#e91e63;">👥${parentData.count}人</span>` 
        : '';

    html += `<div style="color:#4682b4; font-size: 15px; font-weight:bold; margin: 20px 0 5px 5px; border-bottom: 1px solid #4682b4; padding-bottom: 2px;">${parentName}</div>`;
    
    html += `
    <div class="npc-card" style="margin-bottom: 8px; border-left: 3px solid #4682b4; padding: 10px; background: rgba(70, 130, 180, 0.1);">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="display:flex; align-items:center; gap:6px;">
          <b style="color: #4682b4; font-size: 14px;">${parentName} (中心)</b>
          ${parentPeopleTag}
        </div>
        <button class="btn" style="padding: 4px 10px; font-size: 11px; background: #4682b4; color: #fff; border:none;" onclick="travelTo('${parentName}', 0)">傳送</button>
      </div>
      <div style="color:#886633; font-size:11px; margin-top:5px; line-height:1.4;">${parentData.desc}</div>
    </div>`;

});

  async function travelTo(targetName, distance) {
    // 👇 把原本的 toggleExplore(); 刪掉，改成這行強制隱藏！
    document.getElementById('explore-overlay').style.display = 'none';

    // 🔴 優化：清理選項，防止玩家在移動中點擊過期選項
    const optContainer = document.getElementById('options-container');
    if (optContainer) optContainer.innerHTML = '<span style="color:#666; font-size:12px;">正在穿梭天地...</span>';
    const story = document.getElementById('story');
    story.insertAdjacentHTML('beforeend', `<div class="msg-player"><b>【系統】：</b>正前往「${targetName}」...</div>`);
    story.scrollTop = story.scrollHeight;

    try {
      // 呼叫後端移動
      const data = await gasRun({ action: "move", pcId: pc.id, target: targetName });
      
      if (data.success) {
        // 1. 同步狀態 (UI 與 LocalStorage)
        if (data.statusString) {
            localStorage.setItem('kyushu_last_status', data.statusString); 
            updateUI(data.statusString.split('§'));
        }

        // 2. 🔴 關鍵優化：直接使用後端傳回的 mapDesc，這是最準確的景色描述
        const locDesc = data.mapDesc || "四下靜謐。";

        // 3. 顯示結果
        story.insertAdjacentHTML('beforeend', `<div class="msg-ai"><b>【抵達 ${targetName}】：</b><br><span>${locDesc}</span></div>`);
        
        // 4. 清理 loading 提示
        if (optContainer) optContainer.innerHTML = '';
        story.scrollTop = story.scrollHeight;
      } else {
        alert("天道阻礙：" + data.message);
      }
    } catch(e) { 
        console.error("移動時發生錯誤:", e); 
        if (optContainer) optContainer.innerHTML = '';
    }
  }

  async function openGiveMoneyPrompt(npcName) {
    const currentMoney = parseInt(document.getElementById('ui-money').innerText) || 0;
    const amountInput = prompt(`你要給予「${npcName}」多少銀兩？\n(當前身上擁有：${currentMoney} 兩)`);
    
    if (amountInput === null) return; // 玩家點擊取消

    const amount = parseInt(amountInput);
    if (isNaN(amount) || amount <= 0) {
      alert("大俠，給予的銀兩數量必須是正整數！");
      return;
    }

    if (amount > currentMoney) {
      alert("囊中羞澀！你身上的銀兩不足以支付此等數目。");
      return;
    }

    const story = document.getElementById('story');
    story.insertAdjacentHTML('beforeend', `<div class="msg-player" style="border-color:#daa520; color:#daa520;"><b>【給予銀兩】：</b>你從袖中掏出 ${amount} 兩白銀，遞交到「${npcName}」手中...</div>`);
    story.scrollTop = story.scrollHeight;

    try {
      // 呼叫後端 Router_Action.gs 映射的 give_money 路由
      const res = await gasRun({ action: "give_money", pcId: pc.id, targetName: npcName, amount: amount });
      
      if (res.success) {
        // 1. 數據同步：立刻刷寫本地快照與 UI 面板（銀兩秒變動）
        if (res.statusString) {
          localStorage.setItem('kyushu_last_status', res.statusString);
          updateUI(res.statusString.split('§'));
        }
        
        // 2. 歷史紀錄渲染
        story.insertAdjacentHTML('beforeend', `<div class="msg-ai" style="border-left:4px solid #daa520; background:rgba(218,165,32,0.05);"><b>【銀貨兩訖】</b><br>${res.message}</div>`);
        story.scrollTop = story.scrollHeight;

        // 3. 對接 LLM 核心：發送純敘事指令，讓 AI 根據 NPC 個性演繹收錢或打賞的反應
        let promptMsg = `【系統動作：(純敘事) 玩家成功給予了「${npcName}」共 ${amount} 兩白銀。系統底層已結算完畢。★強制天條：絕對不可輸出任何 stat_changes 欄位以避免重複扣款！請完全以說書人口吻與『${npcName}』的性格特徵、當前好感，生動描寫她收下這筆白銀後的表情、肢體微動作與台詞反應。】`;
        send(promptMsg, true);
        
      } else {
        alert(res.message);
      }
    } catch (e) {
      alert("天道阻礙，銀兩未能成功送達。");
    }
  }

  async function interactNpc(actName, npcName, targetLoc, isExact) {
      const currentLoc = document.getElementById('ui-loc').innerText;
      const currentRoot = currentLoc.split('-')[0];
      const targetRoot = targetLoc.split('-')[0];

      if (actName === '移動') {
          closeNpcList();
          let moveContext = currentRoot === targetRoot ? 
              `玩家『試圖』在城內移動前往「${targetLoc}」尋找「${npcName}」。` : 
              `玩家『試圖』長途跋涉前往「${targetLoc}」尋找「${npcName}」。`;
          send(`【系統動作：${moveContext} 請生動描寫移動與抵達的過程，並【務必】在 JSON 的 stat_changes 中修改自己的「位置」為「${targetLoc}」。】`, true);
          return;
      }

      if (actName === '交談') {
          closeNpcList();
          send(`【系統動作：玩家走上前與「${npcName}」進行友好對話。請根據對方的性格與當前好感度，給予生動的劇情回應。】`, true);
          return;
      }

      // 🔴 絕對防呆的組隊/解散邏輯 (保證不會溜去呼叫 AI)
      // 🔴 絕對防呆的組隊/解散邏輯 (保證不會溜去呼叫 AI)
      // 🔴 絕對防呆的組隊/解散邏輯 (零延遲先斬後奏版)
      if (actName === '組隊') {
         const nData = localNPCs.find(n => n.name === npcName);
         if (!nData) return;
         const isAlreadyParty = nData.isParty;
         const busyWith = nData.busyWith;

         // 1. 請離隊伍
         if (isAlreadyParty) {
            if (!confirm(`確定要將「${npcName}」請離隊伍嗎？\n(她將會留在原地，不再跟隨)`)) return;
            
            // 🔴 零延遲：瞬間修改前端記憶並重繪畫面！
            nData.isParty = false;
            renderNpcList(); 

            const story = document.getElementById('story');
            story.innerHTML += `<div class="msg-player" style="border-color:#888; color:#888;"><b>【系統】：</b>與「${npcName}」解散了同行隊伍。</div>`;
            story.scrollTop = story.scrollHeight;
            
            // 🔴 背景偷偷發送給天道，不用等它回應！
            gasRun({ action: "dismiss_party", pcId: pc.id, npcName: npcName });
            return; 
         }

         // 2. 邀請入隊
         if (busyWith) {
             alert(`「${npcName}」正與『${busyWith}』同行中，無法邀請！`);
             return;
         }
         
         const currentPartyCount = localNPCs.filter(n => n.isParty).length;
         if (currentPartyCount >= 5) { alert("同道隊伍已滿（上限 5 人）！請先將其他同道請離。"); return; }
         if (!isExact) { alert(`必須在同一地點才能邀請「${npcName}」結伴同行。`); return; }

         // 🔴 零延遲：瞬間修改前端記憶並重繪畫面！
         nData.isParty = true;
         renderNpcList();

         const story = document.getElementById('story');
         story.innerHTML += `<div class="msg-player" style="border-color:#1e90ff; color:#1e90ff;"><b>【系統】：</b>「${npcName}」接受了邀請，正式加入隊伍。</div>`;
         story.scrollTop = story.scrollHeight;
         
         // 🔴 背景偷偷發送給天道，只有在報錯時才把標籤改回來
         gasRun({ action: "join_party", pcId: pc.id, npcName: npcName }).then(res => {
             if (!res.success) {
                 nData.isParty = false; // 萬一後端失敗，把標籤拔掉
                 renderNpcList();
                 alert(res.message);
             }
         });
         return; 
      }

      if (actName === '留言') {
          const msg = prompt(`你想對玩家「${npcName}」說些什麼？\n(同地點為傳音入密，跨地點為飛鴿傳書)`);
          if (!msg) return;
          closeNpcList();
          // 🔴 修正：改呼叫新的 send_mail API (不帶附件)
          gasRun({ action: "send_mail", pcId: pc.id, targetName: npcName, msg: msg, attachItemId: "" })
            .then(res => {
                if (res.success) {
                    let sendMethod = isExact ? "當面傳音入密" : "飛鴿留書";
                    send(`【系統動作：玩家對另一名玩家「${npcName}」使用${sendMethod}，內容：「${msg}」。請以武俠風格生動描寫送出訊息的過程。】`, true);
                } else {
                    alert(res.message);
                }
            })
            .catch(err => alert("天道干擾，訊息發送失敗！"));
          return;
      }

      if (actName === '切磋') {
          if (!isExact) { alert(`必須在同一地點才能與「${npcName}」切磋。`); return; }
          closeNpcList();
          const customName = localStorage.getItem("kyushu_skillName");
          const customDesc = localStorage.getItem("kyushu_skillDesc");
          send(`【系統動作：玩家向「${npcName}」發起點到為止的切磋邀請。】`, true, { 
              targetName: npcName, 
              type: "spar",
              customSkillName: customName ? customName : null,
              customSkillDesc: customDesc ? customDesc : null
          });
          return;
      }

      if (actName === '贈禮') {
         if (!isExact) { alert(`必須在同一地點才能贈禮給「${npcName}」。`); return; }
         giftTargetNPC = npcName; 
         openSystemModal('inventory-overlay'); 
         closeNpcList();
         return;
      }

      if (actName === '窺探') {
         if (!isExact) { alert(`必須在同一地點才能使用神識窺探「${npcName}」。`); return; }
         openNpcInventoryModal(npcName);
         closeNpcList();
         return;
      }

      
      
      let moveContext = "";
      if (!isExact) {
        moveContext = currentRoot === targetRoot ? `玩家『試圖』在城內移動前往「${targetLoc}」尋找「${npcName}」並進行【${actName}】。` : `玩家『試圖』長途跋涉前往「${targetLoc}」尋找「${npcName}」並進行【${actName}】。`;
      } else {
        moveContext = `玩家對「${npcName}」進行【${actName}】。`;
      }

      let combatData = null;
      const actionGuidance = NPC_ACTIONS[actName] ? NPC_ACTIONS[actName].prompt : "";
      const finalMsg = `【系統動作：${moveContext} 請天道嚴格審視玩家當前處境是否能自由行動。若能，${actionGuidance}】`;
      send(finalMsg, true, combatData);
  }

  function updateUI(s) {
    // 🔴 視覺防護鎖解除：讓逆天改命的按鈕永遠顯示！
    // 點擊後，後端 GAS 會親自無情審查「好感 100 + 已傾心 + 綠液」
    ['fate-btn-pref', 'fate-btn-trait', 'fate-btn-back', 'fate-btn-intent'].forEach(id => {
        const btn = document.getElementById(id);
        if (btn) btn.style.display = 'block'; // 永遠打開！
    });

    // 🔴 防呆助手... 
    const setUI = (id, val, def = "--") => {
        const el = document.getElementById(id);
        if (el) el.innerText = val || def;
    };

    // 1. 基礎屬性更新
    setUI('ui-status', s[0]);
    setUI('ui-money', s[1]);
    setUI('ui-trait', s[2]);
    setUI('ui-loc', s[3]);
    if (currentStatusTargetId === pc.id) updateRecentLocations(s[3]);
    setUI('ui-pref', s[4]);
    setUI('ui-hp', s[5]);
    setUI('ui-mp', s[6]);
    setUI('ui-str', s[7]);
    setUI('ui-con', s[8]);
    setUI('ui-agi', s[9]);
    setUI('ui-int', s[10]);
    setUI('ui-luk', s[11]);
    setUI('ui-realm', s[16], "凡人");
    
    // 2. 門派勢力 (新增欄位，防呆檢查)
    if (s.length >= 24) {
        setUI('ui-faction', s[19], "無門派");
        setUI('ui-rank', s[20], "散人");
        setUI('ui-align', s[21], "絕對中立");
        setUI('ui-back', s[23], "江湖散人");
    }
    if (s.length >= 26) {
        setUI('ui-intent', s[25], "尚未暴露的可愛弱點");
    }
    if (s.length >= 28) {
        renderLifeskillStatus(s[27]);
    }
    // 地點標題
    const headerEl = document.getElementById('header-loc');
    if (headerEl) headerEl.innerText = s[3] ? "📍 " + s[3] : "未知區域";

    // 3. 裝備欄位
    const eqMap = { "eq-weapon": s[12], "eq-armor": s[13], "eq-acc1": s[14], "eq-acc2": s[15] };
    Object.keys(eqMap).forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            const val = eqMap[id] ? eqMap[id].trim() : "";
            el.innerText = val ? `[ ${val} ]` : "[ (空) ]";
            el.className = val ? "eq-filled" : "eq-empty";
        }
    });

    // 4. 雙修解析邏輯
    if (s.length >= 18) {
        const memoryStr = (s[17] || "").replace(/@@@/g, '|');
        
        const renderTags = (str, color) => {
            if (!str || str === "無") return `<span style="color:#816e54; font-style:italic;">純白如紙...</span>`;
            return str.split('、').map(tag => 
                `<span style="display:inline-block; background:rgba(${color},0.15); border:1px solid rgba(${color},0.5); padding:2px 8px; border-radius:12px; margin:2px 4px 2px 0; font-size:12px; color:rgb(${color});">${tag}</span>`
            ).join('');
        };

        const skEl = document.getElementById('ui-skills');

// 🔴 重構的 handleItemAction (分離「端詳」與「消耗」，杜絕 AI 算錯帳)
// ==========================================
async function handleItemAction(action, itemId, itemName, itemType) {
  if (action === 'discard') {
    if (!confirm(`確定要將「${itemName}」棄置於荒野之中嗎？`)) return;
    closeSystemModal('inventory-overlay');
    try {
      await gasRun({ action: "discard_item", pcId: pc.id, itemName: itemId }); 
      syncData(true);
    } catch(e) { 
      console.error("丟棄失敗", e); 
    }
  }
  else if (action === 'inspect') {
    // 🔍 【端詳把玩】：純看劇情，不扣物品
    closeSystemModal('inventory-overlay');
    const promptMsg = `【系統動作：玩家從行囊中拿出了「${itemName}」(類型:${itemType}) 仔細端詳與把玩。請天道生動描寫物品的外觀細節、靈力波動，若是書信秘籍則揭露內容。★此為觀察動作，嚴禁輸出 items_used 或 items_lost！】`;
    send(promptMsg, true);
  }
  else if (action === 'consume') {
    // 💥 【消耗施放】：只要點了就是用掉，絕對扣除！
    if (itemType === "丹藥" || itemType === "恢復道具") {
      // 1. 丹藥與補血藥：維持原本的底層無情結算
      closeSystemModal('inventory-overlay');
      consumeItemViaGAS(itemId);
    }
    else {
      // 2. 其他雜物/符咒/暗器：輕量直連，GAS 直接扣除，AI 只負責寫特效
      closeSystemModal('inventory-overlay');
      try {
        const res = await gasRun({ action: "use_item_self", pcId: pc.id, itemId: itemId, itemName: itemName });
        if (res.success) { narrate(res.aiPrompt); syncData(true); }
        else alert(res.message || "使用失敗。");
      } catch (e) { alert("連線失敗，使用失敗。"); }
    }
  }
}

async function checkName(event) {

    return;
  }
  
  try {

    if (res.exists) {
       const oldPc = JSON.parse(localStorage.getItem('kyushu_v27') || "null");

      pc = { id: res.pcId, name: name, sex: res.sex };

// ==========================================

  async function narrate(promptText) {
    const story = document.getElementById('story');
    const loadId = "L" + Date.now();
    story.insertAdjacentHTML('beforeend', `<div id="${loadId}" class="loading-text">天道演化中...</div>`);
    story.scrollTop = story.scrollHeight;

    try {
      const isNsfw = document.getElementById('nsfw-mode-toggle')?.checked || false;
      const res = await gasRun({ action: "narrate_only", pcId: pc.id, promptText: promptText, isNsfw: isNsfw });
      document.getElementById(loadId)?.remove();

      if (res.success && res.text) {
        let t = res.text.replace(/\\r\\n/g, '\n').replace(/\\n/g, '\n');
        t = t.replace(/\n{2,}/g, "<br><br>").replace(/\n/g, "<br><br>");
        story.insertAdjacentHTML('beforeend', `<div class="msg-ai"><b>【天道演化】</b>${t}</div>`);
        localStorage.setItem('kyushu_story', story.innerHTML);
        story.scrollTop = story.scrollHeight;
      }
    } catch (e) {
      document.getElementById(loadId)?.remove();
      console.error("輕量敘事失敗:", e);
    }
  }

  // ==========================================
  // 🟢 連擊戰報專用輕量敘事：narrate() 同等成本，但會把同地參戰NPC名字轉成可點擊超連結，
  // 讓玩家能直接點名字繼續連擊，不需要 AI 額外生成 options
  // ==========================================
  async function narrateCombatResult(promptText, touchedNames, knockedOut) {
    const story = document.getElementById('story');
    const optContainer = document.getElementById('options-container');
    if (optContainer) optContainer.innerHTML = '';
    const loadId = "L" + Date.now();
    story.insertAdjacentHTML('beforeend', `<div id="${loadId}" class="loading-text">天道演化中...</div>`);
    story.scrollTop = story.scrollHeight;

    try {
      const isNsfw = document.getElementById('nsfw-mode-toggle')?.checked || false;
      const res = await gasRun({ action: "multi_attack_narrate", pcId: pc.id, promptText: promptText, isNsfw: isNsfw, touchedNames: touchedNames, knockedOut: knockedOut });
      document.getElementById(loadId)?.remove();

      if (res.success && res.text) {
        let cleanText = res.text.replace(/\\r\\n/g, '\n').replace(/\\n/g, '\n');
        let displayText = cleanText.replace(/\n{2,}/g, "<br><br>").replace(/\n/g, "<br><br>");

        // 🔴 同地參戰NPC一律是「實際在場」，直接做成可點擊超連結，方便繼續連擊
        if (touchedNames && touchedNames.length > 0) {
          const escapeRegExp = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const uniqueNames = [...new Set(touchedNames)].filter(n => n && n.length >= 2);
          if (uniqueNames.length > 0) {
            uniqueNames.sort((a, b) => b.length - a.length);
            const combinedRegex = new RegExp(uniqueNames.map(escapeRegExp).join('|'), 'g');
            displayText = displayText.replace(combinedRegex, matched => `<span class="npc-link" data-interact="${matched}">${matched}</span>`);
          }
        }

        story.insertAdjacentHTML('beforeend', `<div class="msg-ai"><b>【天道演化】</b>${displayText}</div>`);
        lastAiContext = cleanText;

        localStorage.setItem('kyushu_story', story.innerHTML);
        story.scrollTop = story.scrollHeight;
      }
    } catch (e) {
      document.getElementById(loadId)?.remove();
      console.error("戰鬥敘事失敗:", e);
    }
  }

  async function send(customMsg, isSilent = false, combatData = null) {
    const input = document.getElementById('u-in');

    const nsfwToggle = document.getElementById('nsfw-mode-toggle');
    const isNsfw = nsfwToggle ? nsfwToggle.checked : false;

    // 🟢 多目標動作標籤：[攻擊/下毒/媚藥 XXX]敘述... 走專屬 GAS 裁決路徑，數值不交給AI自由心證
    if (!combatData && /\[(攻擊|下毒|媚藥).+?\]/.test(msg)) {
      return handleMultiAttack(msg);
    }

    if (/^[1-4]$/.test(msg) && currentOptions.length >= parseInt(msg)) {
      const optIndex = parseInt(msg) - 1;
      msg = currentOptions[optIndex]; 
    }
    
    currentOptions = []; 
    input.value = ""; input.disabled = true;
    btn.disabled = true;
    const story = document.getElementById('story');
    const optContainer = document.getElementById('options-container');
    if (optContainer) optContainer.innerHTML = '';

    if (!isSilent && !msg.includes("【系統】")) {
      story.insertAdjacentHTML('beforeend', `<div class="msg-player"><span class="msg-name">${escapeHtml(pc.name)}</span><span class="msg-text">${escapeHtml(msg)}</span></div>`);
      story.scrollTop = story.scrollHeight;
    }
    
    const loadId = "L" + Date.now();
    story.insertAdjacentHTML('beforeend', `<div id="${loadId}" class="loading-text">天道演化中...</div>`);
    story.scrollTop = story.scrollHeight;
    
    try {
      const backLocked = localStorage.getItem('kyushu_back_locked') === 'true';
const data = await gasRun({ action: "play", pcId: pc.id, message: msg, combatData: combatData, isNsfw: isNsfw, lastContext: lastAiContext, backLocked: backLocked });
      

      document.getElementById(loadId)?.remove();

      console.log("🔴AI原始文字:", JSON.stringify(data.text));

      // 🔴 直接接收後端傳來的狀態字串，不再依賴 AI 的文字解析
      if (data.statusString) {
          localStorage.setItem('kyushu_last_status', data.statusString);
          updateUI(data.statusString.split('§'));
      }
      

      // 🔴 昏迷 NPC 處決確認：統一以打掃戰場卡片列出
      renderBattlefieldCleanup(data.knockedOut);
      if (data.justRevived) {
  setTimeout(() => {
    send(`【系統動作：玩家從重傷中甦醒，躺在小醫仙藥鋪的病榻上，身旁是忙碌的藥童。請重新描寫甦醒場景並給出符合當下情境的選項。】`, true);
  }, 1500);
}
      
      if (data.recruited && data.recruited.length > 0) {
        data.recruited.forEach(recruitedNPC => {
          story.insertAdjacentHTML('beforeend', `<div class="msg-player" style="align-self:center; border-radius:8px; background:rgba(212,175,55,0.1); border:1px solid #d4af37; color:#d4af37; font-size:13px; text-align:center;">（「${recruitedNPC}」正式加入您的隊伍）</div>`);
        });
      }
      
      let cleanText = data.text.split('[')[0];
      
      // 🔴 絕對安全版換行修復：只抓取 AI 偶爾解析錯誤的字面 "\n" 或 "\r\n"，將其轉為真實換行。
      // 絕對不動任何標點符號，保證對話引號與排版 100% 完整！
      cleanText = cleanText.replace(/\\r\\n/g, '\n').replace(/\\n/g, '\n');

      let displayText = cleanText;

      // 🟢 統一連結引擎：眾生／提及人物／地名彙整成一份候選清單，
      // 依名稱長度排序後單次掃描取代，避免子字串名稱互相啃食對方剛插入的 HTML。
      const linkCandidates = [];
      const pushCandidate = (name, html) => {
        if (name && !linkCandidates.find(c => c.name === name)) {
          linkCandidates.push({ name, html });
        }
      };

      if (localNPCs && localNPCs.length > 0) {
    localNPCs.forEach(npc => {
      if (npc.name && npc.name.length >= 2) {
        if (npc.isExact) {
          // 真正同地（含分支）→ 金色，可同地互動
          pushCandidate(npc.name, `<span class="npc-link" data-interact="${npc.name}">${npc.name}</span>`);
        } else {
          // 在名單但不在同地（高好感牽掛之人）→ 紫色遠方之人
          pushCandidate(npc.name, `<span class="npc-link" style="color:#9C27B0; border-bottom:1px dashed #9C27B0; cursor:pointer;" data-remote="${npc.name}">${npc.name}</span>`);
        }
      }
    });
  }

      // 🔴 三段式判定：區分「虛無之人」與「遠方之人」
      if (data.mentionedNames && data.mentionedNames.length > 0) {
        const allKnown = data.allKnownNames || []; // 從後端取得的全九州名單
        const contextSnap = lastAiContext.slice(0, 300).replace(/"/g, '&quot;');

        data.mentionedNames.forEach(name => {
          if (name && name.length >= 2 && !localNPCs.find(n => n.name === name)) {
            if (allKnown.includes(name)) {
              // 🌟 狀態 2：遠方之人 (資料庫有，但不在現場) -> 顯示為紫色
              pushCandidate(name, `<span class="npc-link" style="color:#9C27B0; border-bottom:1px dashed #9C27B0; cursor:pointer;" data-remote="${name}">${name}</span>`);
            } else {
              // 🌟 狀態 3：虛無之人 (資料庫完全沒有) -> 顯示為藍色，觸發登入眾生
              pushCandidate(name, `<span class="npc-link" style="color:#4682b4; border-bottom:1px dashed #4682b4; cursor:pointer;" data-register="${name}" data-context="${contextSnap}">${name}</span>`);
            }
          }
        });
      }

      if (data.allMapNames && data.allMapNames.length > 0) {
        [...new Set(data.allMapNames)].forEach(locName => {
          if (displayText.includes(locName)) {
            pushCandidate(locName, `<span class="loc-link" data-loc="${locName}">${locName}</span>`);
          }
        });
      }

      if (linkCandidates.length > 0) {
        // 長名優先比對，子字串短名不會搶在前面，徹底杜絕巢狀/截斷 HTML
        linkCandidates.sort((a, b) => b.name.length - a.name.length);
        const htmlByName = new Map(linkCandidates.map(c => [c.name, c.html]));
        const escapeRegExp = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const combinedRegex = new RegExp(linkCandidates.map(c => escapeRegExp(c.name)).join('|'), 'g');
        displayText = displayText.replace(combinedRegex, matched => htmlByName.get(matched) || matched);
      }
// 👆 完美版結束

let plainTextContext = cleanText;
      
      if (data.options && Array.isArray(data.options) && data.options.length > 0) {
        currentOptions = data.options;
        let optionsHtml = `<div style="color: var(--gold-accent); font-weight: bold; border-bottom: 1px dashed rgba(212, 175, 55, 0.3); padding-bottom: 6px; margin-bottom: 8px;">【命運的抉擇】</div>`;
        optionsHtml += `<div class="options-grid">`;
        plainTextContext += `\n\n【命運的抉擇】\n`; 
        data.options.forEach(optText => {
          optionsHtml += `<button class="btn-option" onclick="send('${optText.replace(/'/g, "\\'")}', true)">${optText}</button>`;
          plainTextContext += optText + `\n`; 
        });
        optionsHtml += `</div>`;
        if (optContainer) optContainer.innerHTML = optionsHtml;
      } else {
        if (optContainer) optContainer.innerHTML = '';
      }
      
      lastAiContext = plainTextContext;
      // 🔴 效能優化：改用 insertAdjacentHTML
      story.insertAdjacentHTML('beforeend', `<div class="msg-ai"><b>【天道演化】</b>${displayText.trim().replace(/\n{2,}/g, "<br><br>").replace(/\n/g, "<br><br>")}</div>`);
      localStorage.setItem('kyushu_story', story.innerHTML);
      setTimeout(() => { story.scrollTop = story.scrollHeight; }, 50);
      
    } catch(e) { 
      document.getElementById(loadId)?.remove(); alert("連結斷絕，天道無應。");
    } finally { 
      input.disabled = false; btn.disabled = false; story.scrollTop = story.scrollHeight;
      // 🔴 PC 端專屬優化：發送完畢後自動對焦輸入框
      if (!/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
        input.focus();
      }
    }
  }

function spareNpc(npcName, cardId) {
  document.getElementById(cardId)?.remove();
  gasRun({ action: "spare_npc", pcId: pc.id, npcName: npcName }).catch(e => {});
  const story = document.getElementById('story');
  story.insertAdjacentHTML('beforeend',
    `<div class="msg-player" style="border-color:#2e8b57; color:#2e8b57;"><b>【系統】：</b>你收手放過了「${npcName}」，留他一條生路。</div>`);
  story.scrollTop = story.scrollHeight;
  syncData(true);
}

function insertActionTag(actionType, npcName) {
  const input = document.getElementById('u-in');
  const countSel = document.getElementById('combo-count-select');
  const count = countSel ? (parseInt(countSel.value, 10) || 1) : 1;
  for (let i = 0; i < count; i++) {
    input.value += `[${actionType}${npcName}]`;
  }
  input.focus();
}

async function handleMultiAttack(rawMsg) {
  const input = document.getElementById('u-in');
  const btn = document.getElementById('send-btn');
  const story = document.getElementById('story');
  input.value = ""; input.disabled = true;
  btn.disabled = true;

  story.insertAdjacentHTML('beforeend',
    `<div class="msg-player"><span class="msg-name">${pc.name}</span><span class="msg-text">${rawMsg}</span></div>`);
  story.scrollTop = story.scrollHeight;

  const loadId = "L" + Date.now();
  story.insertAdjacentHTML('beforeend', `<div id="${loadId}" class="loading-text">天道演化中...</div>`);
  story.scrollTop = story.scrollHeight;

  try {
    const res = await gasRun({ action: "multi_attack", pcId: pc.id, rawInput: rawMsg });
    document.getElementById(loadId)?.remove();

    if (!res.success) {
      input.disabled = false; btn.disabled = false;
      alert(res.message || "攻擊未能結算。");
      return;
    }

    if (res.statusString) {
      localStorage.setItem('kyushu_last_status', res.statusString);
      updateUI(res.statusString.split('§'));
    }

    (res.results || []).forEach(r => {
      if (r.skipped) {
        const skipMsg = r.reason === "no_item" ? `（行囊中找不到合適的藥材，無法對「${r.targetName}」動手）`
          : r.reason === "already_down" ? `（「${r.targetName}」已昏迷倒地，未再追擊）`
          : `（「${r.targetName}」查無此人在場，此招落空）`;
        story.insertAdjacentHTML('beforeend',
          `<div style="text-align:center; color:#888; font-size:12px; margin:4px 0;">${skipMsg}</div>`);
      } else {
        renderCombatReport({ actionType: r.actionType, playerName: pc.name, npcName: r.targetName, pRoll: r.pRoll, pMod: r.pMod, pScore: r.pScore, nRoll: r.nRoll, nMod: r.nMod, nScore: r.nScore, playerWins: r.playerWins, damage: r.damage, critFlavor: r.critFlavor, isStalemate: r.isStalemate, isDodge: r.isDodge });
      }
    });
    story.scrollTop = story.scrollHeight;

    // 一次列出本次連擊中所有昏迷對象，統一打掃戰場
    renderBattlefieldCleanup(res.knockedOut);

    input.disabled = false; btn.disabled = false;

    // 把已裁定的結果（含玩家自己的招式敘述）餵給 AI 描寫(輕量路徑，帶地點/因果/角色資料)
    narrateCombatResult(res.aiPrompt, res.touchedNames, res.knockedOut);

    // 玩家中途被打趴送藥鋪
    if (res.justRevived) {
      setTimeout(() => {
        send(`【系統動作：玩家從重傷中甦醒，躺在小醫仙藥鋪的病榻上。請描寫甦醒場景並給出選項。】`, true);
      }, 1500);
    }
  } catch (e) {
    document.getElementById(loadId)?.remove();
    input.disabled = false; btn.disabled = false;
    alert("天道阻礙，攻擊未能結算。");
  }
}

function renderCombatReport(c) {
  if (!c) return;
  const story = document.getElementById('story');
  let critBadge = "";
  if (c.critFlavor === "player_crit") critBadge = `<div style="color:#d4af37; font-weight:bold;">🎯 你·大成功！</div>`;
  else if (c.critFlavor === "npc_crit") critBadge = `<div style="color:#a52a2a; font-weight:bold;">🛡️ ${c.npcName}·大成功！</div>`;
  else if (c.critFlavor === "player_fumble") critBadge = `<div style="color:#a52a2a; font-weight:bold;">💥 你·大失敗！</div>`;
  else if (c.critFlavor === "npc_fumble") critBadge = `<div style="color:#d4af37; font-weight:bold;">💥 ${c.npcName}·大失敗！</div>`;

  const winColor = c.isStalemate ? "#888" : (c.playerWins ? "#2e8b57" : "#a52a2a");
  const actionType = c.actionType || "攻擊";
  let winText, bottomLine;
  if (actionType === "攻擊" && c.isStalemate) {
    winText = c.isDodge ? `${c.npcName} 堂堂正正避開` : `擊中卻被卸力`;
    bottomLine = `⚖️ 棋逢對手，${winText}，未傷`;
  } else if (actionType === "攻擊") {
    winText = c.playerWins ? `你擊中 ${c.npcName}` : `${c.npcName} 反擊得手`;
    bottomLine = `⚔️ ${winText}，造成 ${c.damage} 點傷害`;
  } else {
    winText = c.playerWins ? `${actionType}成功！「${c.npcName}」已中招` : `${actionType}失敗，被「${c.npcName}」識破`;
    bottomLine = `${actionType === "下毒" ? "🧪" : "🌸"} ${winText}`;
  }

  story.insertAdjacentHTML('beforeend', `
    <div style="background:rgba(0,0,0,0.04); border:1px solid ${winColor}; border-radius:8px; padding:12px; margin:5px 0; font-size:13px;">
      <div style="display:flex; justify-content:space-around; text-align:center; margin-bottom:8px;">
        <div>
          <div style="font-weight:bold; color:#333;">${c.playerName}</div>
          <div style="font-size:20px; color:#4682b4;">🎲 ${c.pRoll}</div>
          <div style="font-size:11px; color:#888;">+${c.pMod} = <b>${c.pScore}</b></div>
        </div>
        <div style="align-self:center; color:#888; font-weight:bold;">VS</div>
        <div>
          <div style="font-weight:bold; color:#333;">${c.npcName}</div>
          <div style="font-size:20px; color:#a52a2a;">🎲 ${c.nRoll}</div>
          <div style="font-size:11px; color:#888;">+${c.nMod} = <b>${c.nScore}</b></div>
        </div>
      </div>
      ${critBadge}
      <div style="text-align:center; color:${winColor}; font-weight:bold; margin-top:6px;">${bottomLine}</div>
    </div>
  `);
  story.scrollTop = story.scrollHeight;
}

// 🩸 打掃戰場：一次列出本回合所有昏迷對象，各自獨立的 處決/放過 按鈕
function renderBattlefieldCleanup(npcNames) {
  if (!npcNames || npcNames.length === 0) return;
  const story = document.getElementById('story');
  const groupId = 'sweep-' + Date.now();
  const rows = npcNames.map((name, idx) => {
    const rowId = `${groupId}-${idx}`;
    return `
    <div id="${rowId}" style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px dashed rgba(128,0,0,0.2);">
      <span style="font-weight:bold; color:#800;">「${name}」已重傷昏迷</span>
      <div style="display:flex; gap:8px;">
        <button class="btn" style="border-color:#800; color:#800; padding:4px 12px; font-size:12px;" onclick="confirmExecute('${name}', '${rowId}')">⚔️ 處決</button>
        <button class="btn" style="border-color:#2e8b57; color:#2e8b57; padding:4px 12px; font-size:12px;" onclick="spareNpc('${name}', '${rowId}')">🕊️ 放過</button>
      </div>
    </div>`;
  }).join('');

  story.insertAdjacentHTML('beforeend', `
    <div style="background: rgba(128,0,0,0.07); border: 1px solid #800; border-radius: 8px; padding: 12px; margin: 5px 0;">
      <div style="color:#800; font-weight:bold; margin-bottom:8px; text-align:center;">⚠️ 打掃戰場：以下對象已倒地不起</div>
      ${rows}
    </div>
  `);
  story.scrollTop = story.scrollHeight;
}

  async function executeCultivate() {

    let cultCount = parseInt(localStorage.getItem('kyushu_cult_count') || "0");
    if (localStorage.getItem('kyushu_cult_date') !== today) cultCount = 0;

        alert("今日靈氣已枯竭，精神疲憊，無法再強行修練。請明日再來！");

    closeCultivateMenu();

        // 🔴 直接呼叫全屬性修練，不再帶入任何參數
        const res = await gasRun({ action: "cultivate", pcId: pc.id });
        
        if (res.success) {
            cultCount++;

            localStorage.setItem('kyushu_cult_count', cultCount);
            
            localStorage.setItem('kyushu_last_status', res.statusString);

  }

  async function saveMartial() {
  const val = document.getElementById('martial-input').value.trim();
  if (/\d/.test(val)) {
    alert("武學描述不能包含數字！");
    return;
  }
  if (!val || val.length < 10) {
    alert("武學描述至少需要10字！");
    return;
   }
  try {
    const res = await gasRun({
      action: "update_fate",
      pcId: pc.id,
      targetId: pc.id,
      fateType: "martial",
      fateValue: val
    });
    if (res.success) {
      alert("武學已記入命格！");
      closeCultivateMenu();
    } else {
      alert(res.message);
    }
  } catch(e) {
    alert("天道阻礙，武學未能記錄。");
  }
}

  async function restAndHeal() {
  try {
    const data = await gasRun({ action: "rest", pcId: pc.id });
    if (data.success && data.statusString) {
      localStorage.setItem('kyushu_last_status', data.statusString); 
      updateUI(data.statusString.split('§'));
      const locStr = data.loc ? `在『${data.loc}』` : "就地";
      let coreMsg = "";
      if (data.healedNames && data.healedNames.length > 1) {
        coreMsg = `我與隊友『${data.healedNames.join("、")}』${locStr}盤膝休養，氣血已然補滿`;
      } else {
        coreMsg = `我${locStr}盤膝休養，氣血已然補滿`;
      }
      let injuryHint = data.wasInjured ? "，先前的傷勢也已大致痊癒" : "（先前並無重傷，純粹是調息養氣，請勿描寫成大難痊癒）";
      let bystanderHint = (data.bystanderNames && data.bystanderNames.length > 0)
        ? `現場還有『${data.bystanderNames.join("、")}』在旁，他們並未一同休養，敘事請合理帶到他們的存在或反應，不要視而不見。`
        : "現場除了休養者外沒有其他人物，請勿憑空捏造路人或對話對象。";
      const promptMsg = `【純敘事】${coreMsg}${injuryHint}。${bystanderHint}請生動描繪吐納調息的畫面，地點與在場人物務必與上述設定一致。`;
      narrate(promptMsg);
    } else {
      alert(data.message || "休養失敗。");
    }
  } catch (e) {
    alert("天道阻礙，無法休養。");
  }
}

      ];

      let html = '<div style="display:grid; gap:15px;">';
      let anyCanHarvest = false;

      facilities.forEach(fac => {
          let timeInfo = "";
          const activeTask = tasks.find(t => t.facility === fac.name);
          
          if (activeTask) {
              const timePassed = Date.now() - activeTask.lastHarvest;
              const hours = Math.floor(timePassed / (60 * 60 * 1000));
              if (hours < fac.reqHours) {
                  timeInfo = `<span style="color:#aaa;">⏳ 匯聚中... (需滿 ${fac.reqHours} 小時)</span>`;
              } else {
                  const displayYield = Math.min(Math.floor(hours / fac.rate), fac.max);
                  timeInfo = `<span style="color:${fac.borderColor};">🎁 已產出 ${displayYield} ${fac.unit}</span>`;
                  anyCanHarvest = true;
              }
          } else {
              timeInfo = `<span style="color:${fac.borderColor};">🎁 滿溢狀態 (可收取)</span>`;
              anyCanHarvest = true;
          }

          html += `
          <div style="background: ${fac.bg}; border: 1px solid ${fac.borderColor}; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; box-shadow: inset 0 0 30px rgba(0,0,0,0.5);">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; border-bottom: 1px dashed ${fac.borderColor}; padding-bottom: 8px;">
                  <b style="color: ${fac.borderColor}; font-size:20px; letter-spacing: 2px;">${fac.icon} ${fac.name}</b>
                  <div style="font-size:14px; font-weight:bold;">${timeInfo}</div>
              </div>
              <div style="font-size:13px; color:#aaa; line-height: 1.5;">${fac.desc}</div>
          </div>`;
      });

      html += '</div>';

      // 拔除個別按鈕，改為統一在底部顯示一鍵收成按鈕

  // ==========================================
  // 🏡 我的家(整合仙府資源 + 居所 + 裝潢)
  // ==========================================
  let currentHomeData = null;

  function openHomeMenu() {
    toggleActionDrawer();
    document.getElementById('home-overlay').style.display = 'flex';
    switchHomeTab('resource'); // 預設開資源頁
  }

  function switchHomeTab(tab) {
    const tabs = {
      resource: ['tab-home-resource', 'panel-home-resource'],
      dwelling: ['tab-home-dwelling', 'panel-home-dwelling'],
      decor: ['tab-home-decor', 'panel-home-decor'],
      warehouse: ['tab-home-warehouse', 'panel-home-warehouse']
    };
    // 重置所有
    Object.values(tabs).forEach(([btnId, panelId]) => {
      const btn = document.getElementById(btnId);
      const panel = document.getElementById(panelId);
      if (btn) { btn.style.borderBottomColor = 'transparent'; btn.style.color = '#816e54'; btn.style.fontWeight = 'normal'; }
      if (panel) panel.style.display = 'none';
    });
    // 點亮當前
    const [activeBtn, activePanel] = tabs[tab];
    const btn = document.getElementById(activeBtn);
    const panel = document.getElementById(activePanel);
    if (btn) { btn.style.borderBottomColor = '#c8843c'; btn.style.color = '#c8843c'; btn.style.fontWeight = 'bold'; }
    if (panel) panel.style.display = 'block';

    if (tab === 'resource') loadHomeResource();
    else if (tab === 'warehouse') loadHomeWarehouse();
    else loadHomeDwellingAndDecor(tab);
  }

  // ---------- 倉庫頁 ----------

    const container = document.getElementById('home-warehouse-content');
    container.innerHTML = '<p style="text-align:center; color:#816e54;">正在感應倉庫氣息...</p>';

      if (!res.success) { container.innerHTML = `<p style="text-align:center; color:red;">${res.message}</p>`; return; }

        container.innerHTML = `<p style="text-align:center; color:#816e54; padding:20px;">倉庫空空如也。(0/${res.max})</p>`;

          <div class="npc-card" style="border-left: 3px solid #b8860b; padding-left: 10px; margin-bottom:12px;">

  // renderEstate 的可指定容器版(內容跟原本一樣)
  function renderEstateInto(tasks, container) {
    const facilities = [
      { name: "聚寶金蟾", icon: "🐸", desc: "會隨著時間自動幫你收集銀兩。(每 1 小時 +1 兩，單日上限 24 兩)", bg: "linear-gradient(135deg, rgba(218,165,32,0.2) 0%, rgba(0,0,0,0.8) 100%)", borderColor: "#daa520", reqHours: 1, unit: "兩白銀", max: 24, rate: 1 },
      { name: "掌天小瓶", icon: "🏺", desc: "吸收月華天精，凝聚出蘊含無上生機的翠綠靈液。(每 12 小時 +1 滴，單日上限 2 滴)", bg: "linear-gradient(135deg, rgba(0,255,127,0.1) 0%, rgba(0,0,0,0.8) 100%)", borderColor: "#00ff7f", reqHours: 12, unit: "滴綠液", max: 2, rate: 12 },
      { name: "天地丹爐", icon: "🔥", desc: "引動地脈之火，穩定煉製出【造化】九轉金丹。(每 12 小時 +1 顆，單日上限 2 顆)", bg: "linear-gradient(135deg, rgba(178,34,34,0.2) 0%, rgba(0,0,0,0.8) 100%)", borderColor: "#b22222", reqHours: 12, unit: "顆金丹", max: 2, rate: 12 }
    ];

    let html = '<div style="display:grid; gap:15px;">';
    let anyCanHarvest = false;

    facilities.forEach(fac => {
      let timeInfo = "";
      const activeTask = tasks.find(t => t.facility === fac.name);
      if (activeTask) {
        const timePassed = Date.now() - activeTask.lastHarvest;
        const hours = Math.floor(timePassed / (60 * 60 * 1000));
        if (hours < fac.reqHours) {
          timeInfo = `<span style="color:#aaa;">⏳ 匯聚中... (需滿 ${fac.reqHours} 小時)</span>`;
        } else {
          const displayYield = Math.min(Math.floor(hours / fac.rate), fac.max);
          timeInfo = `<span style="color:${fac.borderColor};">🎁 已產出 ${displayYield} ${fac.unit}</span>`;
          anyCanHarvest = true;
        }
      } else {
        timeInfo = `<span style="color:${fac.borderColor};">🎁 滿溢狀態 (可收取)</span>`;
        anyCanHarvest = true;
      }
      html += `
      <div style="background: ${fac.bg}; border: 1px solid ${fac.borderColor}; padding: 15px; border-radius: 12px; box-shadow: inset 0 0 30px rgba(0,0,0,0.5);">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; border-bottom: 1px dashed ${fac.borderColor}; padding-bottom: 8px;">
              <b style="color: ${fac.borderColor}; font-size:20px; letter-spacing: 2px;">${fac.icon} ${fac.name}</b>
              <div style="font-size:14px; font-weight:bold;">${timeInfo}</div>
          </div>
          <div style="font-size:13px; color:#aaa; line-height: 1.5;">${fac.desc}</div>
      </div>`;
    });
    html += '</div>';
    html += `
      <button class="btn" style="width:100%; margin-top:20px; border-color:#d4af37; color:${anyCanHarvest ? '#d4af37' : '#555'}; font-size: 20px; font-weight:bold; padding: 15px; opacity: ${anyCanHarvest ? '1' : '0.5'}; background: linear-gradient(to bottom, rgba(212,175,55,0.2), rgba(0,0,0,0.8));" onclick="${anyCanHarvest ? 'lockBtn(event, harvestHomeResource)' : ''}" ${anyCanHarvest ? '' : 'disabled'}>
          ✨ 一鍵收成 ✨
      </button>`;
    container.innerHTML = html;
  }

  // 🟢 共用：找出對玩家已傾心、且目前不在 excludeLoc 的 NPC 候選清單(招待/邀請用)
  function getSoulboundCandidates(excludeLoc) {
    return (localNPCs || []).filter(n =>
      !n.isPC &&
      (n.relVal || 0) >= 100 &&
      String(n.relTag || '').includes('(已傾心)') &&
      String(n.loc || '').trim() !== String(excludeLoc || '').trim()
    );
  }

        </div>`;

    const parent = res.homeLoc.split('-')[0];

      residentsHtml = res.residents.map(r => {
        const tag = r.isParty

      inviteHtml = `

          <select id="home-invite-select" class="std-select" style="width:100%; box-sizing:border-box;">
            ${candidates.map(c => `<option value="${c.name}">${c.name}（目前：${c.loc || '行蹤不明'}）</option>`).join("")}
          </select>
          <button class="btn" style="width:100%; margin-top:8px; border-color:#e91e63; color:#e91e63; font-weight:bold; padding:8px 0;" onclick="lockBtn(event, submitHomeInviteGuest)">💌 邀來家裡坐</button>

      inviteHtml = `<p style="text-align:center; color:#816e54; font-size:12px; margin-top:10px;">尚無已傾心之人可邀。</p>`;
    }

    el.innerHTML = `

        <div style="font-size:12px; color:#816e54; margin-top:4px;">📍 ${parent}</div>

        ${inviteHtml}

        <div style="font-size:14px; color:#666;">尚無家園可佈置。</div>

  async function submitCreateHome() {
    const name = document.getElementById('new-home-name').value.trim();
    if (!name) { alert("家不可無名！"); return; }
    const money = parseInt(document.getElementById('ui-money').innerText) || 0;
    if (money < 1000) { alert("囊中羞澀！建造家園至少需要 1000 兩白銀。"); return; }
    try {
      const res = await gasRun({ action: "home_create", pcId: pc.id, homeName: name });
      if (res.success) {
        if (res.statusString) { localStorage.setItem('kyushu_last_status', res.statusString); updateUI(res.statusString.split('§')); }
        const story = document.getElementById('story');
        story.insertAdjacentHTML('beforeend', `<div class="msg-ai" style="border-left:4px solid #c8843c; background:rgba(200,132,60,0.05);"><b>【安身立命】</b><br>${res.message}</div>`);
        story.scrollTop = story.scrollHeight;
        loadHomeDwellingAndDecor('dwelling');
      } else { alert(res.message); }
    } catch (e) { alert("天道阻礙，建家失敗。"); }
  }

  async function submitMoveHome() {
    const curParent = (document.getElementById('ui-loc').innerText || "").split('-')[0];
    if (!confirm(`確定花費 500 兩，將家園遷至你目前所在的「${curParent}」嗎？\n(家中暫居與同行之人會一併隨遷)`)) return;
    const money = parseInt(document.getElementById('ui-money').innerText) || 0;
    if (money < 500) { alert("盤纏不足 500 兩，無法遷址。"); return; }
    try {
      const res = await gasRun({ action: "home_move", pcId: pc.id });
      if (res.success) {
        if (res.statusString) { localStorage.setItem('kyushu_last_status', res.statusString); updateUI(res.statusString.split('§')); }
        const story = document.getElementById('story');
        story.insertAdjacentHTML('beforeend', `<div class="msg-ai" style="border-left:4px solid #b8860b; background:rgba(184,134,11,0.05);"><b>【喬遷之喜】</b><br>${res.message}</div>`);
        story.scrollTop = story.scrollHeight;
        loadHomeDwellingAndDecor('dwelling');
      } else { alert(res.message); }
    } catch (e) { alert("天道阻礙，搬家失敗。"); }
  }

  async function submitHomeInviteGuest() {
    const sel = document.getElementById('home-invite-select');
    if (!sel || !sel.value) { alert("尚無可邀請的對象。"); return; }
    const npcName = sel.value;
    try {
      const res = await gasRun({ action: "home_invite_guest", pcId: pc.id, npcName: npcName });
      if (res.success) {
        loadHomeDwellingAndDecor('dwelling');
      } else { alert(res.message); }
    } catch (e) { alert("天道阻礙，邀請失敗。"); }

  async function saveHomeDecor() {
    const desc = document.getElementById('home-decor-input').value.trim();
    try {
      const res = await gasRun({ action: "home_decorate", pcId: pc.id, desc: desc });
      if (res.success) {
        if (currentHomeData) currentHomeData.homeDesc = res.homeDesc;
        alert("家園佈置已更新！回家時便能看見。");
        renderHomeDwelling(currentHomeData);
        renderHomeDecor(currentHomeData);
      } else { alert(res.message); }
    } catch (e) { alert("天道阻礙，佈置失敗。"); }
  }

  async function doShopBusiness() {
    const btn = document.getElementById('shop-biz-btn');
    if (!btn || btn.disabled) return;
    const isNsfw = document.getElementById('nsfw-mode-toggle')?.checked || false;
    const outputEl = document.getElementById('shop-biz-output');
    outputEl.innerHTML = '<p style="text-align:center; color:#816e54; font-size:12px;">客人正絡繹往來...</p>';
    btn.disabled = true;
    try {
      const res = await gasRun({ action: "shop_business", pcId: pc.id, isNsfw: isNsfw });
      if (res.success) {
        outputEl.innerHTML = `<div style="font-size:13px; color:#553311; line-height:1.6; padding:10px; background:rgba(200,132,60,0.05); border-radius:6px;">${res.text}</div>`;
        startShopBizCooldown(btn);
      } else {
        outputEl.innerHTML = `<p style="text-align:center; color:#816e54; font-size:12px;">${res.message}</p>`;
        btn.disabled = false;
      }
    } catch (e) {
      outputEl.innerHTML = '<p style="text-align:center; color:red; font-size:12px;">天道阻礙，營業失敗。</p>';
      btn.disabled = false;
    }
  }

  function startShopBizCooldown(btn) {
    if (!btn) return;
    let remain = 20;
    btn.disabled = true;
    btn.style.opacity = '0.5';
    btn.innerText = `⏳ 緩口氣 (${remain}s)`;
    const timer = setInterval(() => {
      remain--;
      if (remain <= 0) {
        clearInterval(timer);
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.innerText = '🛎️ 營業';
      } else {
        btn.innerText = `⏳ 緩口氣 (${remain}s)`;
      }
    }, 1000);
  }

  function openCasinoMenu() {
      toggleActionDrawer();
      document.getElementById('casino-overlay').style.display = 'flex';
      document.getElementById('dice-result-msg').innerHTML = "請下注，買定離手！<br><span style='font-size:12px; color:#888;'>單注限額：100 ~ 10,000 兩白銀</span>";
      
      // 🔴 打開賭坊的瞬間，立刻抓取身上的銀兩並顯示！
      const currentMoney = document.getElementById('ui-money').innerText || "0";
      document.getElementById('casino-current-money').innerText = currentMoney;
  }

  const DICE_ROTATIONS = {
    1: "rotateX(0deg) rotateY(0deg)",
    2: "rotateX(90deg) rotateY(0deg)",
    3: "rotateX(0deg) rotateY(-90deg)",
    4: "rotateX(0deg) rotateY(90deg)",
    5: "rotateX(-90deg) rotateY(0deg)",
    6: "rotateX(0deg) rotateY(180deg)"
  };

  function placeBet(betType) {
      // 🔒 防護機制：先把所有賭博按鈕鎖住，防止玩家連點重複扣錢
      const casinoBtns = document.querySelectorAll('#casino-overlay .btn');
      casinoBtns.forEach(b => b.disabled = true);

      const betInput = document.getElementById('bet-amount').value;
      const betAmount = parseInt(betInput);
      
      // 防呆驗證 1：下注金額限制
      if (isNaN(betAmount) || betAmount < 100 || betAmount > 10000) {
          casinoBtns.forEach(b => b.disabled = false);
          alert("大俠，長樂坊的規矩是：單次下注必須在「100 兩」至「10,000 兩」之間！");
          return;
      }

      // 防呆驗證 2：檢查盤纏夠不夠
      const currentMoney = parseInt(document.getElementById('ui-money').innerText) || 0;
      if (currentMoney < betAmount) {
          casinoBtns.forEach(b => b.disabled = false); 
          alert("囊中羞澀！大俠，你身上的銀兩不夠啊，請先去賺點盤纏再來吧。");
          return;
      }

      // 啟動骰子狂轉動畫
      document.getElementById('dice-1').classList.add('rolling');
      document.getElementById('dice-2').classList.add('rolling');
      document.getElementById('dice-3').classList.add('rolling');
      document.getElementById('dice-result-msg').innerHTML = `莊家搖骰中... 你押了 <span style="color:#fff;">${betAmount}</span> 兩【<span style="color:#ff4500;">${betType}</span>】`;

      // 呼叫 GAS 後端算結果
      gasRun({ action: "play_dice", pcId: pc.id, betType: betType, betAmount: betAmount })
        .then(res => {
            // 🔓 收到後端結果，立刻解鎖所有按鈕
            casinoBtns.forEach(b => b.disabled = false);
            
            if (!res.success) {
                alert(res.message);
                stopDiceAnimation();
                document.getElementById('dice-result-msg').innerText = "天道異常，賭局作廢！";
                return;
            }
            
            // 呼叫定格與顯示結果
            showDiceResult(res);
            
            // 🔴 結算完畢後，瞬間更新右上角狀態與賭桌上的銀兩數字
            if (res.statusString) {
                localStorage.setItem('kyushu_last_status', res.statusString); 
                updateUI(res.statusString.split('§'));
                
                // 抽出最新的銀兩數值更新到賭桌上
                document.getElementById('casino-current-money').innerText = res.statusString.split('§')[1];
            }
        })
        .catch(err => {
            // 🔓 萬一天道斷線，也要解鎖按鈕
            casinoBtns.forEach(b => b.disabled = false);
            alert("天道阻礙，賭局無效！請檢查連線。");
            stopDiceAnimation();
            document.getElementById('dice-result-msg').innerText = "連線中斷，賭局未成立。";
        });
  }

  function stopDiceAnimation() {
      document.getElementById('dice-1').classList.remove('rolling');
      document.getElementById('dice-2').classList.remove('rolling');
      document.getElementById('dice-3').classList.remove('rolling');
  }

  function showDiceResult(data) {
      const [d1, d2, d3] = data.diceResult; 
      const cube1 = document.getElementById('dice-1');
      const cube2 = document.getElementById('dice-2');
      const cube3 = document.getElementById('dice-3');
      
      // 移除旋轉動畫
      stopDiceAnimation();

      // 強制套用對應的 3D 角度定格
      cube1.style.transform = DICE_ROTATIONS[d1];
      cube2.style.transform = DICE_ROTATIONS[d2];
      cube3.style.transform = DICE_ROTATIONS[d3];

      // 延遲 0.8 秒顯示結算文字，製造開獎的刺激感
      setTimeout(() => {
          const formattedMsg = data.message.replace(/\n/g, '<br>');
          document.getElementById('dice-result-msg').innerHTML = formattedMsg;
      }, 800);
  }
