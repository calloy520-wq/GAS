<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<base target="_top">
<style>
  :root{--ink:#f0e9dc;--soft:#b6a892;--gold:#f4c34e;--gold-d:#c8971f;--line:#5a4a35;
    --panel:#33291f;--panel2:#3d3125;--good:#7cc36a;--good-d:#4f9e42;--hp:#e5556a;
    --t1:#3a3357;--t2:#6d5a6e;--d-bg:#15111c;--d-panel:#2f273f;--d-line:#43385a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{color:var(--ink);font-family:"Baloo 2","Segoe UI Rounded","Hiragino Maru Gothic ProN","Noto Sans TC",system-ui,sans-serif;
    background:linear-gradient(180deg,var(--t1),var(--t2) 45%,#2a211a);min-height:100dvh}
  #app{max-width:520px;margin:0 auto;min-height:100dvh;position:relative;background:linear-gradient(180deg,var(--t1),var(--t2) 45%,#2a211a)}
  /* 電腦寬螢幕：兩側不再空蕩，做成置中「遊戲機台」框 */
  @media(min-width:760px){
    body{background:radial-gradient(120% 90% at 50% -10%,#4a3a63 0%,#241c2e 55%,#160f18 100%)}
    body::before{content:'🏰　⚔️　🛡️　🗡️　🍺　🏹　✨　🐉';position:fixed;inset:0;z-index:0;
      font-size:70px;line-height:2.4;letter-spacing:34px;color:#fff;opacity:.035;overflow:hidden;
      word-break:break-word;padding:20px;pointer-events:none;user-select:none}
    #app{box-shadow:0 0 0 1px var(--line),0 18px 60px rgba(0,0,0,.55);border-radius:16px;
      margin:16px auto;min-height:calc(100dvh - 32px);overflow:hidden;position:relative;z-index:1}
    .bar{border-radius:16px 16px 0 0}
    /* 桌機把彈窗改成置中卡片，不再貼底 */
    .modal{align-items:center}
    .sheet{max-width:600px;border-radius:20px;max-height:88dvh}
  }
  /* 更大螢幕：整個機台放大、設施多欄（用 #app 提高優先序，壓過後面的基礎規則）*/
  @media(min-width:1000px){
    #app{max-width:920px}
    #app .pad{padding:18px 20px 90px}
    #app .signs{grid-template-columns:repeat(4,1fr)}
    #app .scene{height:240px}
    #app h1{font-size:26px}
  }
  h1{font-size:22px;text-align:center;margin:6px 0 2px}
  .lead{text-align:center;color:#f0d6ad;font-size:12.5px;margin:0 0 12px;opacity:.9}
  .pad{padding:14px 12px 30px}

  .bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;padding:9px 12px;
    background:rgba(20,16,12,.72);backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
  .bar .t{font-weight:800;font-size:15px} .bar .t small{color:var(--soft);font-weight:600;font-size:11px}
  .spacer{flex:1}
  .pill{display:flex;align-items:center;gap:4px;background:#1c1712;border:1px solid var(--line);
    border-radius:11px;padding:4px 9px;font-weight:800;font-variant-numeric:tabular-nums;font-size:13px}

  input,select{font-family:inherit}
  .inp{width:100%;padding:12px;border-radius:11px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:15px}
  .inp:focus{outline:none;border-color:var(--gold)}

  .btn{border:none;border-radius:13px;padding:13px;font-weight:800;font-size:15px;color:#fff;cursor:pointer;font-family:inherit;
    box-shadow:0 4px 0 rgba(0,0,0,.35);width:100%}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.35)}
  .btn.gold{background:linear-gradient(180deg,var(--gold),var(--gold-d));color:#3a2600}
  .btn.ok{background:linear-gradient(180deg,var(--good),var(--good-d))}
  .btn.re{background:linear-gradient(180deg,#8a6fd0,#6a4cae)}
  .btn.dim{background:#4a3b2a} .btn[disabled]{opacity:.45}
  .btn.sm{padding:9px 12px;font-size:13px;width:auto;box-shadow:0 3px 0 rgba(0,0,0,.35)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
  .glab{font-size:11px;color:var(--soft);font-weight:700;letter-spacing:1px;margin:0 2px 7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:7px 11px;font-size:13px;font-weight:700;cursor:pointer}
  .chip.on{background:linear-gradient(180deg,#f4c34e,#d09a1f);color:#3a2600;border-color:#f4c34e}
  .chip:active{transform:scale(.96)}

  .abil{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
  .ab{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:7px 4px;text-align:center}
  .ab b{font-size:17px;display:block} .ab .mm{color:var(--soft);font-size:11px} .ab small{color:var(--soft);font-size:10.5px}

  .pbox{width:min(56vw,220px);aspect-ratio:1/1;margin:0 auto;border-radius:16px;overflow:hidden;position:relative;
    border:3px solid var(--gold-d);background:#2a2118;box-shadow:0 8px 22px rgba(0,0,0,.4)}
  .pbox img{width:100%;height:100%;object-fit:cover;display:block}
  .pbox .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;
    color:#ffe0a8;font-size:13px;text-align:center;font-weight:700}
  .ring{width:32px;height:32px;border:4px solid #ffffff33;border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .bldg{position:relative;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
    border-radius:15px;padding:12px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.28)}
  .bldg:active{transform:translateY(2px)}
  .bldg .ico{font-size:30px} .bldg .nm{font-weight:800;font-size:15px;margin-top:4px} .bldg .ds{color:var(--soft);font-size:11px;margin-top:1px}
  .bldg.wide{grid-column:1/3;background:linear-gradient(180deg,#4a2c3a,#331c26);border-color:#7a3c52}
  .badge{position:absolute;top:8px;right:8px;background:var(--hp);color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:9px}

  /* 主城場景（手繪打底＋AI 背景疊加） */
  .scene{position:relative;height:178px;overflow:hidden;border-bottom:2px solid var(--gold-d);
    background:linear-gradient(180deg,#332e52 0%,#6d5a6e 46%,#c77b43 82%,#eaa659 100%)}
  .scene .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .9s ease}
  .scene .bg.on{opacity:1}
  .scene .sun{position:absolute;left:50%;top:33%;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:50%;
    background:radial-gradient(circle,#fff1c9,#f6b45a 72%);box-shadow:0 0 46px 14px rgba(246,170,80,.5)}
  .scene .star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.75}
  .scene .sil{position:absolute;left:0;right:0;bottom:0;text-align:center;font-size:46px;line-height:1;letter-spacing:-4px;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.4));opacity:.95}
  .scene .title{position:absolute;left:0;right:0;bottom:10px;text-align:center;color:#fff;z-index:3;
    font-weight:800;font-size:20px;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.75)}
  .scene .title small{display:block;font-size:11px;font-weight:600;color:#ffe6c0;letter-spacing:1px;opacity:.92;text-shadow:0 1px 4px rgba(0,0,0,.7)}

  /* 招牌式建築 */
  .signs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .sign{position:relative;background:linear-gradient(180deg,#8a5a34,#5e3a21);border:2px solid #3f2814;border-radius:13px;
    padding:12px 10px 13px;cursor:pointer;text-align:center;box-shadow:0 5px 0 #3a2413, inset 0 1px 0 rgba(255,220,170,.22)}
  .sign:active{transform:translateY(2px);box-shadow:0 3px 0 #3a2413, inset 0 1px 0 rgba(255,220,170,.22)}
  .sign::before,.sign::after{content:'';position:absolute;top:-7px;width:2px;height:7px;background:#3f2814}
  .sign::before{left:24px}.sign::after{right:24px}
  .sign .ico{font-size:29px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.45))}
  .sign .nm{font-weight:800;font-size:15px;margin-top:3px;color:#ffe9c9}
  .sign .ds{color:#e7c6a0;font-size:10.5px;margin-top:1px}
  .sign .badge{background:var(--hp)}
  .sign.gate{grid-column:1/-1;background:linear-gradient(180deg,#5a2f3f,#361c26);border-color:#7a3c52;box-shadow:0 5px 0 #2a1620}
  .sign.gate .nm{color:#ffd0dd}
  .sign.sea{grid-column:1/-1;background:linear-gradient(180deg,#1f5478,#123249);border-color:#2e6a94}
  .sign.sea .nm{color:#bfe4ff}
  /* 底部分頁快捷列 */
  .tabbar{position:sticky;bottom:0;z-index:15;display:flex;gap:2px;padding:6px 6px calc(6px + env(safe-area-inset-bottom));
    background:rgba(20,16,12,.82);backdrop-filter:blur(6px);border-top:1px solid var(--line);margin:0 -12px -30px}
  .tabbar .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 2px;border-radius:10px;cursor:pointer;color:var(--soft);font-size:10px;font-weight:700}
  .tabbar .tab .ti{font-size:20px}
  .tabbar .tab:active{transform:scale(.94)}
  @media(min-width:1000px){.tabbar{margin:0 -20px -90px;padding:9px 12px}.tabbar .tab{font-size:12px}.tabbar .tab .ti{font-size:24px}}
  .omap{position:relative;width:100%;aspect-ratio:1/1.02;border-radius:16px;overflow:hidden;border:2px solid #2a4a6a;
    background:radial-gradient(120% 90% at 28% 18%,#356690,#173753 58%,#0e2438);box-shadow:inset 0 0 46px rgba(0,0,0,.55)}
  .omap .wv{position:absolute;inset:0;opacity:.10;background-image:repeating-linear-gradient(30deg,#fff 0 1px,transparent 1px 22px)}
  .oport{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;cursor:pointer;width:70px;z-index:2}
  .oport .pin{font-size:27px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.65))}
  .oport .pn{font-size:10px;font-weight:800;color:#fff;text-shadow:0 1px 3px #000;white-space:nowrap;background:rgba(0,0,0,.4);padding:0 5px;border-radius:6px;margin-top:1px}
  .oport.here .pin{filter:drop-shadow(0 0 7px #f4c34e) drop-shadow(0 0 2px #f4c34e)}
  .oport.here .pn{background:#c8971f;color:#3a2600}
  .oship{position:absolute;transform:translate(-50%,-150%);font-size:22px;filter:drop-shadow(0 2px 3px #000);pointer-events:none;z-index:3}

  .u{display:flex;gap:10px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:9px;margin-bottom:8px}
  .u .av{width:44px;height:44px;border-radius:10px;object-fit:cover;background:#241d14;flex:none;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
  .u .av img{width:100%;height:100%;object-fit:cover}
  .u .info{flex:1;min-width:0} .u .info b{font-size:14.5px} .u .info small{display:block;color:var(--soft);font-size:11.5px;line-height:1.5}
  .u .tag{font-size:10px;font-weight:800;padding:1px 7px;border-radius:8px;background:#0006;color:var(--soft)}
  .hpbar{height:6px;border-radius:4px;background:#0007;overflow:hidden;margin-top:4px}
  .hpbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--hp),#ff8a99)}

  .modal{position:fixed;inset:0;z-index:40;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55)}
  .modal.show{display:flex}
  .sheet{width:100%;max-width:520px;max-height:90dvh;overflow-y:auto;background:linear-gradient(180deg,#2e251b,#241c14);
    border:1px solid var(--line);border-radius:20px 20px 0 0;padding:14px 12px calc(20px + env(safe-area-inset-bottom))}
  .sheet h2{margin:2px 0 2px;font-size:19px} .sheet .sub{color:var(--soft);font-size:12.5px;margin:0 0 12px}
  .close{float:right;background:#4a3b2a;border:none;color:var(--ink);width:32px;height:32px;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer}
  .note{color:var(--soft);font-size:12px;text-align:center;margin:10px 0 2px}
  .rowbtns{display:flex;gap:8px;margin-top:6px}

  .rep-floor{background:var(--d-panel);border:1px solid var(--d-line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
  .rep-floor .fh{font-weight:800;font-size:14px;margin-bottom:3px}
  .rep-floor .fl{color:#c9bfe0;font-size:12px;line-height:1.6}
  .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#241c14;border:1px solid var(--gold-d);
    color:var(--ink);padding:10px 16px;border-radius:12px;font-weight:700;font-size:13px;z-index:80;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  details{margin-top:8px;color:var(--soft);font-size:12px}
  details pre{white-space:pre-wrap;word-break:break-word;background:#241d14;padding:8px;border-radius:8px;border:1px solid var(--line)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="modal" id="pmodal"><div class="sheet" id="psheet"></div></div>
<div class="toast" id="toast"></div>

<script>
// ============ 前端資料（顯示用；戰鬥仍以後端為準）============
var COMBAT={
  fighter:{nm:'戰士',ico:'⚔️',atk:'str',hd:10,dmg:[1,8],skill:'猛擊',blurb:'血厚攻高的前線支柱'},
  paladin:{nm:'聖騎士',ico:'🛡️',atk:'str',hd:10,dmg:[1,8],skill:'神聖斬',blurb:'能扛能奶的重甲騎士'},
  rogue:{nm:'盜賊',ico:'🗡️',atk:'dex',hd:8,dmg:[1,6],skill:'偷襲',blurb:'高暴擊高閃避的收割者'},
  ranger:{nm:'遊俠',ico:'🏹',atk:'dex',hd:10,dmg:[1,8],skill:'瞄準連射',blurb:'穩定輸出的遠程獵手'},
  wizard:{nm:'法師',ico:'🔮',atk:'int',hd:6,dmg:[1,6],skill:'火球術',blurb:'脆皮但一發清場'},
  cleric:{nm:'牧師',ico:'✨',atk:'wis',hd:8,dmg:[1,6],skill:'聖光',blurb:'能打能奶的定海神針'}
};
var SUPPORT={
  bard:{nm:'吟遊詩人',ico:'🎵',hd:8,dmg:[1,6],desc:'全隊攻擊檢定 +2'},
  merchant:{nm:'商人',ico:'💰',hd:6,dmg:[1,4],desc:'金幣與掉落率 +40%'},
  scholar:{nm:'學者',ico:'📖',hd:6,dmg:[1,4],desc:'經驗 +35%、自動鑑定'},
  medic:{nm:'醫者',ico:'⛑️',hd:8,dmg:[1,6],desc:'每層自動治療全隊 12%'},
  diviner:{nm:'占卜師',ico:'🍀',hd:6,dmg:[1,4],desc:'全隊暴擊+10%、避陷阱'}
};
var RACES={
  human:{nm:'人類',ico:'🧑',grow:{str:1,dex:1,con:1,int:1,wis:1,cha:1},perk:'全屬性 +1'},
  elf:{nm:'精靈',ico:'🧝',grow:{dex:2,int:1},perk:'敏捷+2 智力+1'},
  darkelf:{nm:'黑暗精靈',ico:'🌑',grow:{dex:2,cha:1},perk:'敏捷+2 魅力+1'},
  beast:{nm:'獸耳',ico:'🐾',grow:{str:2,con:1},perk:'力量+2 體質+1'},
  dragon:{nm:'龍族',ico:'🐲',grow:{str:2,cha:1},perk:'力量+2 魅力+1'},
  demon:{nm:'魔族',ico:'😈',grow:{cha:2,int:1},perk:'魅力+2 智力+1'},
  angel:{nm:'天使',ico:'😇',grow:{wis:2,cha:1},perk:'睿知+2 魅力+1'},
  vampire:{nm:'吸血鬼',ico:'🧛',grow:{cha:2,dex:1},perk:'魅力+2 敏捷+1'}
};
var RACE_KEYS=['human','elf','darkelf','beast','dragon','demon','angel','vampire']; // 與立繪種族選項同序
var SKILLS={perception:{nm:'察覺',ab:'wis'},stealth:{nm:'隱匿',ab:'dex'},athletics:{nm:'運動',ab:'str'},medicine:{nm:'醫療',ab:'int'},survival:{nm:'求生',ab:'wis'},sleight:{nm:'巧手',ab:'dex'},persuasion:{nm:'交涉',ab:'cha'}};
var CLASS_SKILLS={fighter:['athletics','survival'],paladin:['athletics','persuasion'],rogue:['stealth','sleight'],ranger:['survival','perception'],wizard:['perception','medicine'],cleric:['medicine','persuasion'],bard:['persuasion','sleight'],merchant:['persuasion','sleight'],scholar:['perception','medicine'],medic:['medicine','survival'],diviner:['perception','survival']};
var RACE_SKILLS={human:['persuasion'],elf:['perception'],darkelf:['stealth'],beast:['survival'],dragon:['athletics'],demon:['persuasion'],angel:['medicine'],vampire:['stealth']};
function charSkills(job,race){var s={};(CLASS_SKILLS[job]||[]).forEach(function(k){s[k]=1;});(RACE_SKILLS[race]||[]).forEach(function(k){s[k]=1;});return Object.keys(s);}
function skillNames(job,race){return charSkills(job,race).map(function(k){return SKILLS[k].nm+'('+ABN[SKILLS[k].ab]+')';}).join('、');}
var RANKS=[{nm:'見習傭兵',floor:0},{nm:'銅牌傭兵',floor:5},{nm:'銀牌傭兵',floor:10},{nm:'金牌傭兵',floor:15},{nm:'白金傭兵',floor:20},{nm:'傳說傭兵',floor:25}];
function rankOf(dp){var ix=0;for(var i=0;i<RANKS.length;i++){if((dp||0)>=RANKS[i].floor)ix=i;}return ix;}
var STORY={
  intro:"你是名初來乍到的傭兵，踏進了以地下城聞名的『傭兵之城』。\n\n城牆上張貼著領主的懸賞：地下城最深處盤踞著魔王，攪得四方不寧，至今無人生還歸來。\n\n在酒館招募夥伴、在公會接下委託，備好裝備，一步步向深淵挑戰吧 —— 或許成為傳說的，就是你。",
  rank:['','領主聽聞你首次深入地下城，親手為你別上銅牌：「初露鋒芒，別鬆懈。」','你的名字開始在酒館被人提起。領主頷首：「銀牌傭兵，名副其實。」','商會與神殿都想結識你。領主：「金牌 —— 這座城已經少不了你了。」','你踏進了從沒人生還過的深度。領主神色凝重：「魔王就在下面……白金傭兵，你準備好了嗎？」','第 20 層的魔王灰飛煙滅，全城為你徹夜歡呼。從今往後，你的名字就是傳說。'],
  boss:{5:'第 5 層 —— 哥布林王的巢穴。你踏過牠的斷角王座，通往深淵的階梯在腳下敞開。',10:'第 10 層 —— 巨魔領主的咆哮震落塵土。牠倒下時，牆上的古老壁畫指向了更深處。',15:'第 15 層 —— 骨龍盤踞在成山的白骨上。斬斷牠的那一刻，你聽見更深處傳來低語。',20:'第 20 層 —— 魔王【巫妖】現身。一切禍亂的源頭。這一戰，將決定傭兵之城的命運。',25:'比魔王更深的地方……傳說中無人抵達的領域，如今在你眼前。'}
};
function effBase(raw,race){var o={},g=(RACES[race]||{}).grow||{};AB.forEach(function(a){o[a]=Math.min(20,(raw[a]||10)+(g[a]||0));});return o;}
var WEAPONS=[
  {id:'w_dagger',nm:'匕首',ico:'🔪',dmg:[1,4],bonus:0,price:20,tier:1},
  {id:'w_short',nm:'短劍',ico:'🗡️',dmg:[1,6],bonus:0,price:45,tier:1},
  {id:'w_long',nm:'長劍',ico:'⚔️',dmg:[1,8],bonus:0,price:90,tier:2},
  {id:'w_bow',nm:'長弓',ico:'🏹',dmg:[1,8],bonus:1,price:110,tier:2},

function hashNoiseC(s){var h=2166136261;for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return ((h>>>0)%1000)/1000;}

function uRow(c,btn){var st=isSup(c.job)?null:cStats(c);var ci=cinfo(c.job);

// 免費 AI 個性（Pollinations 文字，失敗用模板保底）
function genBio(c,cb){
  var ci=cinfo(c.job),rc=c.rarity&&RARITY_C[c.rarity]?RARITY_C[c.rarity].nm:'常見',race=RACES[c.race]?RACES[c.race].nm:'人類';
  var prompt='用繁體中文，為一位奇幻世界的傭兵寫一句 30 字以內、生動有個性的自我介紹或口頭禪。職業：'+ci.nm+'，種族：'+race+'，資質：'+rc+'。只回傳那一句話本身，不要引號、不要任何額外說明。';
  var done=false,timer=setTimeout(function(){if(!done){done=true;cb(bioTemplate(c));}},9000);
  fetch('https://text.pollinations.ai/'+encodeURIComponent(prompt)).then(function(r){return r.text();}).then(function(t){
    if(done)return;done=true;clearTimeout(timer);
    t=(t||'').trim().replace(/^["「『]+|["」』]+$/g,'').split('\n')[0].slice(0,60);
    cb(t&&!/error|unable|sorry/i.test(t)?t:bioTemplate(c));
  }).catch(function(){if(done)return;done=true;clearTimeout(timer);cb(bioTemplate(c));});
}
function bioTemplate(c){
  var t={fighter:'刀口舔血慣了，錢給夠，我就替你擋在最前面。',paladin:'以聖光之名，我發誓守護同伴到最後一刻。',rogue:'噓，別出聲——值錢的東西，我來拿就好。',ranger:'我的箭從不落空，除非我想讓它落空。',wizard:'凡人的常識？在我的魔法面前不適用。',cleric:'受傷就過來，別逞強，交給我。',bard:'來，聽我唱一首，順便替你們打打氣！',merchant:'一分錢一分貨，跟著我準沒錯。',scholar:'知識就是力量，這地下城的秘密我都記著。',medic:'別死在我面前，那是對我醫術的侮辱。',diviner:'命運？我早看過結局了，跟緊我。'};
  return t[c.job]||'一位來歷成謎的傭兵。';
}

var equipSel=null;
function openEquip(){
  equipSel=equipSel||heroOf().id;
  var body='<div class="glab">選擇角色</div><div class="chips" id="ec">';
  P.roster.forEach(function(c){body+='<span class="chip'+(equipSel===c.id?' on':'')+'" data-c="'+c.id+'">'+cinfo(c.job).ico+' '+c.name+'</span>';});
  body+='</div>';
  var c=byId(equipSel);
  ['weapon','armor','trinket'].forEach(function(slot){
    var label={weapon:'🗡️ 武器',armor:'🛡️ 防具',trinket:'💍 飾品'}[slot];
    var eq=c.equip[slot]?gById(c.equip[slot]):null;
    body+='<div class="card"><div class="glab">'+label+'</div>';
    body+='<div class="note" style="text-align:left;margin:0 0 6px">目前：'+(eq?eq.ico+' '+eq.nm:'（無）')+(eq?' <button class="btn dim sm" data-un="'+slot+'">卸下</button>':'')+'</div>';
    var owned=(P.bag||[]).map(gById).filter(function(g){return g&&gSlot(g.id)===slot;});
    if(!owned.length)body+='<div class="note">背包沒有可裝備的'+label.slice(2)+'，去商店買或地下城撿。</div>';
    owned.forEach(function(g,idx){body+='<div class="u"><div class="av">'+g.ico+'</div><div class="info"><b>'+g.nm+'</b><small>'+gearDesc(g)+'</small></div><button class="btn ok sm" data-eq="'+slot+'" data-gid="'+g.id+'">裝上</button></div>';});
    body+='</div>';
  });
  var st=isSup(c.job)?null:cStats(c);
  body+='<div class="note" style="text-align:left">'+(st?('生命 '+cMaxHp(c)+' ・ AC '+st.ac+' ・ 攻擊 +'+st.atk+' ・ 傷害 '+st.dmg):'後勤職業不下場戰鬥')+'</div>';
  openSheet('🎒 裝備','裝備會即時反映到能力值',body);
  q('[data-c]',function(el){equipSel=el.dataset.c;openEquip();});
  q('[data-un]',function(el){var slot=el.dataset.un;var c=byId(equipSel);P.bag.push(c.equip[slot]);c.equip[slot]=null;c.maxhp=cMaxHp(c);if(c.hp>c.maxhp)c.hp=c.maxhp;saveP(openEquip);});
  q('[data-eq]',function(el){var slot=el.dataset.eq,gid=el.dataset.gid;var c=byId(equipSel);
    if(c.equip[slot])P.bag.push(c.equip[slot]);
    var i=P.bag.indexOf(gid);if(i>=0)P.bag.splice(i,1);
    c.equip[slot]=gid;c.maxhp=cMaxHp(c);if(c.hp>c.maxhp)c.hp=c.maxhp;saveP(openEquip);});
}
function gSlot(id){if(id.indexOf('t_')===0||id.indexOf('u_')===0)return'trinket';if(id.indexOf('w_')===0)return'weapon';if(id.indexOf('a_')===0)return'armor';}
function gearDesc(g){if(g.dmg)return '傷害 '+g.dmg[0]+'d'+g.dmg[1]+(g.bonus?' +'+g.bonus:'');if(g.ac!=null)return '護甲 AC +'+g.ac;if(g.abs){var ps=[];for(var a in g.abs)ps.push(ABN[a]+'+'+g.abs[a]);return '✨'+ps.join(' ');}if(g.ab)return ABN[g.ab]+' +'+g.val;return '';}

var shopTab='buy';
function sellPrice(g){return Math.max(5,Math.round(g.price*0.5));}
function openShop(){
  var body='<div class="chips" style="margin-bottom:10px"><span class="chip'+(shopTab==='buy'?' on':'')+'" data-tab="buy">🛒 購買</span><span class="chip'+(shopTab==='sell'?' on':'')+'" data-tab="sell">💰 賣出（背包 '+(P.bag||[]).length+'）</span></div>';
  if(shopTab==='buy'){
    [['🗡️ 武器',WEAPONS],['🛡️ 防具',ARMORS],['💍 飾品',TRINKETS]].forEach(function(grp){
      body+='<div class="glab">'+grp[0]+'</div>';
      grp[1].forEach(function(g){body+='<div class="u"><div class="av">'+g.ico+'</div><div class="info"><b>'+g.nm+'</b><small>'+gearDesc(g)+'</small></div>'+
        '<button class="btn gold sm" data-buy="'+g.id+'" data-price="'+g.price+'"'+(P.gold<g.price?' disabled':'')+'>買 '+g.price+'🪙</button></div>';});
    });
  }else{
    // 背包依 id 分組計數

      body+='<div class="u"><div class="av">'+g.ico+'</div><div class="info"><b>'+g.nm+(cnt[id]>1?' ×'+cnt[id]:'')+'</b><small>'+gearDesc(g)+'</small></div>'+
        '<button class="btn ok sm" data-sell="'+id+'">賣 '+sellPrice(g)+'🪙</button></div>';});
    if(ids.length>1)body+='<button class="btn dim sm" id="sellall" style="margin-top:6px">一鍵賣掉全部（未裝備）</button>';
  }
  openSheet('🛡️ 武器防具飾品店','買賣裝備・賣出價為售價一半','<div class="note" style="text-align:left">🪙 目前金幣：<span id="shopgold">'+P.gold+'</span></div>'+body);
  q('[data-tab]',function(el){shopTab=el.dataset.tab;openShop();});
  q('[data-buy]',function(el){var price=+el.dataset.price;if(P.gold<price){toast('金幣不足');return;}P.gold-=price;P.bag.push(el.dataset.buy);saveP(openShop);toast('已購入');});
  q('[data-sell]',function(el){var id=el.dataset.sell,i=P.bag.indexOf(id);if(i<0)return;P.bag.splice(i,1);var g=gById(id);P.gold+=sellPrice(g);saveP(openShop);toast('賣出 '+g.nm+' +'+sellPrice(g)+'🪙');});
  var sa=document.getElementById('sellall');if(sa)sa.onclick=function(){if(!(P.bag||[]).length)return;if(!confirm('賣掉背包所有未裝備的裝備？'))return;var tot=0;P.bag.forEach(function(id){var g=gById(id);if(g)tot+=sellPrice(g);});P.bag=[];P.gold+=tot;saveP(openShop);toast('全部賣出 +'+tot+'🪙');};
}

var RARITY_C={common:{nm:'常見',star:'⭐',color:'#b6a892'},fine:{nm:'精良',star:'⭐⭐',color:'#7cc36a'},rare:{nm:'稀有',star:'⭐⭐⭐',color:'#5a9ee5'},epic:{nm:'史詩',star:'⭐⭐⭐⭐',color:'#b06fe0'},legend:{nm:'傳說',star:'⭐⭐⭐⭐⭐',color:'#f4c34e'}};
function rarC(k){return RARITY_C[k]||RARITY_C.common;}
function candStats(cand){return {job:cand.job,race:cand.race,level:1,base:cand.base,equip:{weapon:null,armor:null,trinket:null}};}
function openTavern(){
  openSheet('🍺 酒館','今日應徵的傭兵（稀有度隨機）','<div class="note">召集應徵者…</div>');

      '<b style="color:'+rc.color+'">'+rc.star+' '+rc.nm+'</b> <span class="tag">'+r.ico+r.nm+'・'+ci.nm+'</span>'+
      '<small>'+top+' ・ HP '+cMaxHp(pc)+(isSup(cand.job)?'':' ・ AC '+cStats(pc).ac)+'</small>'+
      '<small>'+(isSup(cand.job)?SUPPORT[cand.job].desc:('技「'+COMBAT[cand.job].skill+'」'))+'</small></div>'+
      '<button class="btn ok sm" data-cand="'+cand.cid+'"'+(afford?'':' disabled')+'>雇 '+cand.cost+'🪙</button></div>';
  });

}
var recruitCand=null, recruitPortrait='', recruitSeed=0;
function startRecruit(cand){
  if(P.roster.length>=ROSTER_MAX){toast('倉庫已滿，請先遣散');return;}
  if(P.gold<cand.cost){toast('金幣不足');return;}
  recruitCand=cand;recruitPortrait='';recruitSeed=0;window._rname='';
  renderRecruitForm();
}
function renderRecruitForm(){
  var cand=recruitCand,ci=cinfo(cand.job),rc=rarC(cand.rarity),r=RACES[cand.race],pc=candStats(cand);
  var body='<div class="pbox" id="rpbox" style="width:min(46vw,170px)">'+(recruitPortrait?'<img src="'+recruitPortrait+'">':'<div class="ph">尚未建立頭像</div>')+'</div>';

  AB.forEach(function(a){var s=cand.base[a],m=cmod(s);body+='<div class="ab"><small>'+ABI[a]+ABN[a]+'</small><b>'+s+'</b><span class="mm">'+(m>=0?'+':'')+m+'</span></div>';});

  body+='<div class="glab">名字</div><input class="inp" id="rname" maxlength="16" placeholder="'+ci.nm+'" value="'+(window._rname||'')+'">';
  body+='<button class="btn ok" id="rhire" style="margin-top:10px">✅ 雇用（'+cand.cost+'🪙）</button>';
  openSheet(rc.star+' 雇用 '+ci.nm,'資質已定，客製名字與立繪',body);
  var rn=document.getElementById('rname');rn.addEventListener('input',function(){window._rname=rn.value;});
  document.getElementById('rmkport').onclick=function(){openPortrait(cand.job,function(rr){recruitPortrait=rr.portrait;recruitSeed=rr.seed;renderRecruitForm();},RACE_KEYS.indexOf(cand.race),cand.rarity);};
  document.getElementById('rhire').onclick=function(){

    }).catch(function(e){b.disabled=false;b.textContent='✅ 雇用（'+cand.cost+'🪙）';toast('招募失敗：'+e.message);});
  };
}

function blackPool(){return [
  {k:'ess_str',e:'💪',nm:'力量精華',ds:'指定角色 力量 +1（永久）',cost:180,type:'ess',ab:'str'},
  {k:'ess_dex',e:'🎯',nm:'敏捷精華',ds:'指定角色 敏捷 +1（永久）',cost:180,type:'ess',ab:'dex'},
  {k:'ess_con',e:'❤️',nm:'體質精華',ds:'指定角色 體質 +1（增加生命）',cost:200,type:'ess',ab:'con'},
  {k:'ess_int',e:'🧠',nm:'智慧精華',ds:'指定角色 智力 +1（永久）',cost:180,type:'ess',ab:'int'},
  {k:'ess_wis',e:'👁️',nm:'睿知精華',ds:'指定角色 睿知 +1（永久）',cost:180,type:'ess',ab:'wis'},
  {k:'ess_cha',e:'💬',nm:'魅力精華',ds:'指定角色 魅力 +1（永久）',cost:180,type:'ess',ab:'cha'},
  {k:'g_flame',e:'🔥',nm:'烈焰之刃',ds:'稀有武器 2d6+2',cost:520,type:'gear',id:'w_flame'},
  {k:'g_dragon',e:'🐲',nm:'龍鱗鎧',ds:'稀有防具 護甲 +8',cost:560,type:'gear',id:'a_dragon'},
  {k:'g_staff',e:'🪄',nm:'秘法杖',ds:'法系武器 1d8+2',cost:300,type:'gear',id:'w_staff'}
];}
function rollBlack(){var pool=blackPool().slice();for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}return pool.slice(0,4).map(function(o){return {k:o.k,sold:false};});}
function blackDisc(){return P.roster.some(function(c){return charSkills(c.job,c.race).indexOf('persuasion')>=0;})?0.85:1;}
function openBlack(){
  if(!P.black||!P.black.length)P.black=rollBlack();
  var disc=blackDisc(),map={};blackPool().forEach(function(o){map[o.k]=o;});
  var body='';
  P.black.forEach(function(it,i){var o=map[it.k];if(!o)return;var price=Math.round(o.cost*disc);
    if(it.sold){body+='<div class="u" style="opacity:.45"><div class="av">'+o.e+'</div><div class="info"><b>'+o.nm+'</b><small>已售出</small></div></div>';return;}
    body+='<div class="u"><div class="av">'+o.e+'</div><div class="info"><b>'+o.nm+'</b><small>'+o.ds+'</small></div><button class="btn gold sm" data-bk="'+i+'"'+(P.gold<price?' disabled':'')+'>買 '+price+'🪙</button></div>';
  });
  body+='<div class="note">🕶️ 「識貨的才懂。」每批貨有限，售完可花錢進新貨。'+(disc<1?'　✨ 隊上有人擅長交涉，已打折！':'')+'</div>';
  body+='<button class="btn dim sm" id="brefresh"'+(P.gold<30?' disabled':'')+' style="margin-top:4px">🔄 進貨（30🪙 換一批）</button>';
  openSheet('🕶️ 黑市','見不得光的稀有交易',body);
  q('[data-bk]',function(el){var i=+el.dataset.bk,it=P.black[i],o=map[it.k],price=Math.round(o.cost*disc);
    if(it.sold||P.gold<price)return;
    if(o.type==='ess'){ chooseChar('用「'+o.nm+'」', function(id){var c=byId(id);c.base[o.ab]=Math.min(20,(c.base[o.ab]||10)+1);c.maxhp=cMaxHp(c);P.gold-=price;it.sold=true;saveP(function(){toast(c.name+' 的'+ABN[o.ab]+' +1！');openBlack();});}); }
    else { P.gold-=price;P.bag.push(o.id);it.sold=true;saveP(function(){toast('入手 '+o.nm+'！放進背包了');openBlack();}); }
  });
  var rf=document.getElementById('brefresh');if(rf)rf.onclick=function(){if(P.gold<30)return;P.gold-=30;P.black=rollBlack();saveP(openBlack);};
}
function chooseChar(title,cb){

  document.getElementById('collect').onclick=function(){flushSave().then(function(){return srv('fleet',{nick:P.nick,op:'collect'});}).then(function(r){P=r.player;refreshTopbar();var rp=r.report;toast(rp.earned>0?('商隊收益 +'+rp.earned+'🪙'):'商隊還在路上…');if(rp.lines&&rp.lines.length)openSheet('💰 商隊回報','',rp.lines.map(function(l){return '<div class="note" style="text-align:left">'+l+'</div>';}).join(''));else openFleet();}).catch(function(e){toast(e.message);});};

  q('[data-esc]',function(el){flushSave().then(function(){return srv('fleet',{nick:P.nick,op:'escort',id:el.dataset.esc});}).then(function(r){P=r.player;openFleet();}).catch(function(e){toast(e.message);});});
  q('[data-idle]',function(el){flushSave().then(function(){return srv('fleet',{nick:P.nick,op:'idle',id:el.dataset.idle});}).then(function(r){P=r.player;openFleet();}).catch(function(e){toast(e.message);});});
}
function fleetRoute(id){
  var body='<div class="note" style="text-align:left">選商路（產地買→需求地賣，價差越大越賺）</div><div class="glab">從</div><div class="chips" id="rfrom">';
  MARKETS_C.forEach(function(m){body+='<span class="chip'+(m.id==='merc'?' on':'')+'" data-rf="'+m.id+'">'+m.ico+m.nm+'</span>';});
  body+='</div><div class="glab" style="margin-top:6px">到</div><div class="chips" id="rto">';
  MARKETS_C.forEach(function(m){body+='<span class="chip'+(m.id==='port'?' on':'')+'" data-rt="'+m.id+'">'+m.ico+m.nm+'</span>';});
  body+='</div><button class="btn ok" id="setroute" style="margin-top:10px">✅ 派出商隊</button>';
  openSheet('🔁 設定商路','',body);
  var f='merc',t='port';
  q('[data-rf]',function(el){f=el.dataset.rf;Array.prototype.forEach.call(sheet.querySelectorAll('#rfrom .chip'),function(c){c.classList.remove('on');});el.classList.add('on');});
  q('[data-rt]',function(el){t=el.dataset.rt;Array.prototype.forEach.call(sheet.querySelectorAll('#rto .chip'),function(c){c.classList.remove('on');});el.classList.add('on');});
  document.getElementById('setroute').onclick=function(){if(f===t){toast('起訖不能同港');return;}flushSave().then(function(){return srv('fleet',{nick:P.nick,op:'assign',id:id,from:f,to:t});}).then(function(r){P=r.player;openFleet();}).catch(function(e){toast(e.message);});};
}
// ---- 海域（NPC 商船巡弋）----
function openSea(){
  openSheet('🌊 海域巡弋','海上的 NPC 商船，可掠奪（PvE）','<div class="note">瞭望中…</div>');
  srv('sea',{nick:P.nick}).then(function(r){P=r.player;var body='<div class="note" style="text-align:left">⛵ 船身 '+(P.ship?P.ship.hull:0)+'/'+(P.ship?P.ship.hullMax:0)+'　今日往來的商船（每艘每天限搶一次）</div>';
    (r.npcs||[]).forEach(function(n){body+='<div class="u"><div class="av">'+n.ico+'</div><div class="info"><b>'+n.nm+'</b><small>'+n.portIco+' 往 '+n.portNm+' ・ 🚢 '+n.hull+' ・ 💣 '+n.cannon+'</small></div><button class="btn re sm" data-npc="'+n.id+'">🏴‍☠️ 掠奪</button></div>';});
    sheet.innerHTML='<button class="close" onclick="closeSheet()">✕</button><h2>🌊 海域巡弋</h2><p class="sub">NPC 商船・可掠奪（每艘每天限一次）</p>'+body;
    q('[data-npc]',function(el){el.disabled=true;el.textContent='交戰中…';flushSave().then(function(){return srv('sea',{nick:P.nick,op:'raid',id:el.dataset.npc});}).then(function(res){P=res.player;modal.classList.remove('show');refreshTopbar();renderNaval(res.report);}).catch(function(e){el.disabled=false;el.textContent='🏴‍☠️ 掠奪';toast(e.message);});});
  }).catch(function(e){toast(e.message);});
}
function portInfo(id){
  var m=portOf(id),here=P.port||'merc',days=voyDays(here,id);
  var body='<div class="note" style="text-align:left;line-height:1.7">'+m.ico+' <b>'+m.nm+'</b> —— '+m.blurb+'<br>🟢 產地（便宜）：'+goodNames(m.cheap)+'<br>🟡 搶手（賣貴）：'+goodNames(m.dear)+'<br>⛵ 航程：約 '+days+' 天</div>';
  body+='<button class="btn ok" id="setsail" style="margin-top:8px">⛵ 揚帆前往（約 '+days+' 天）</button>';
  body+='<button class="btn dim sm" id="backmap" style="margin-top:6px">← 回地圖</button>';
  openSheet(m.ico+' '+m.nm,'',body);
  document.getElementById('backmap').onclick=openMap;
  document.getElementById('setsail').onclick=function(){var b=this;b.disabled=true;b.textContent='揚帆中…';
    flushSave().then(function(){return srv('voyage',{nick:P.nick,to:id});}).then(function(r){P=r.player;modal.classList.remove('show');refreshTopbar();renderVoyage(r.voyage);}).catch(function(e){b.disabled=false;b.textContent='⛵ 揚帆前往';toast(e.message);});};
}
function renderVoyage(v){
  var from=portOf(v.from),to=portOf(v.to);
  var h=topbar()+'<div class="pad" style="background:radial-gradient(120% 80% at 50% -10%,#173753,transparent 55%)">';
  h+='<h1>⛵ 航海日誌</h1><p class="lead">'+from.ico+' '+from.nm+' → '+to.ico+' '+to.nm+' ・ 航行 '+v.days+' 天</p>';
  h+='<div class="card">'+(v.events||[]).map(function(e){return '<div class="note" style="text-align:left;line-height:1.8">'+e.ico+' '+e.t+'</div>';}).join('')+'</div>';
  h+='<div class="note">🧭 秘寶線索：'+(P.clues||0)+'　🪙 '+P.gold+'　📦 貨艙 '+cargoCountC(P)+'/'+CARGO_MAX_C+'</div>';
  h+='<button class="btn gold" id="arrive" style="margin-top:10px">⚓ 抵達 '+to.nm+'</button></div>';
  app.innerHTML=h;
  document.getElementById('arrive').onclick=renderTown;
}

// ---- 領主城堡（主線・階級）----
function openCastle(){
  var deep=P.deepest||0,ri=rankOf(deep),next=RANKS[ri+1];
  var body='<div class="card"><b>🎖️ 目前階級：'+RANKS[ri].nm+'</b>';
  if(next){var pct=Math.min(100,Math.round(deep/next.floor*100));
    body+='<div class="note" style="text-align:left;margin-top:4px">下一階「'+next.nm+'」：探索到第 '+next.floor+' 層（目前最深 '+deep+'）</div>'+
      '<div class="hpbar" style="height:9px;margin-top:6px"><i style="background:linear-gradient(90deg,#f4c34e,#c8971f);width:'+pct+'%"></i></div>';}
  else body+='<div class="note" style="text-align:left;margin-top:4px">🏆 你已是傳說傭兵，全城以你為傲！</div>';
  body+='</div>';
  body+='<div class="card"><b>👑 領主的懸賞（主線）</b><div class="note" style="text-align:left;margin-top:4px">'+
    '討伐盤踞地下城第 20 層的魔王【巫妖】，成為傳說傭兵。<br>每 5 層有一名頭目把守：哥布林王(5) → 巨魔領主(10) → 骨龍(15) → 巫妖(20)。</div></div>';
  body+='<div class="note">階級越高，代表你探得越深。晉升自動觸發並發放賞金。</div>';
  openSheet('🏰 領主城堡','向領主稟報你的功績',body);
}

// ---- 冒險者名冊（觀戰）----
function openRoster(){
  openSheet('📜 冒險者名冊','大家的進度・可掠奪其他船','<div class="note">讀取中…</div>');
  srv('roster',{}).then(function(r){
    var body='';
    r.players.forEach(function(pl,ix){
      var me=pl.nick===P.nick;
      var canRaid=!me&&(pl.deepest||0)>=3;
      body+='<div class="card"'+(me?' style="border-color:var(--gold)"':'')+'><b>'+(ix+1===1?'👑 ':'')+'#'+(ix+1)+' '+pl.nick+(me?' <span class="tag">你</span>':'')+'</b>'+
        '<div class="note" style="text-align:left;margin:4px 0 6px">⬇️ 最深第 '+pl.deepest+' 層 ・ 🪙 '+pl.gold+'<br>'+(pl.portIco||'🏰')+' 停泊 '+(pl.portNm||'?')+' ・ ⛵ 火砲 '+(pl.cannon||6)+' ・ 🚢 '+(pl.hull||60)+'</div><div class="chips">';
      (pl.members||[]).forEach(function(m){body+='<span class="chip" style="cursor:default">'+(m.portrait?'🖼️':m.ico)+' '+m.name+' Lv'+m.level+'</span>';});
      body+='</div>'+(canRaid?'<button class="btn re sm" data-raid="'+pl.nick+'" style="margin-top:8px">🏴‍☠️ 掠奪這艘船</button>':(!me&&(pl.deepest||0)<3?'<div class="note" style="text-align:left">🛡️ 新手保護中，不可掠奪</div>':''))+'</div>';
    });
    sheet.innerHTML='<button class="close" onclick="closeSheet()">✕</button><h2>📜 冒險者名冊</h2><p class="sub">大家的進度・可掠奪其他玩家的船</p>'+(body||'<div class="note">還沒有其他冒險者</div>');
    q('[data-raid]',function(el){var t=el.dataset.raid;if(!confirm('派船掠奪 '+t+' 的商船？勝則搶金幣貨物，敗則損船損金。'))return;el.disabled=true;el.textContent='交戰中…';
      flushSave().then(function(){return srv('raid',{nick:P.nick,target:t});}).then(function(res){P=res.player;modal.classList.remove('show');refreshTopbar();res.report.pvp=true;renderNaval(res.report);}).catch(function(e){el.disabled=false;el.textContent='🏴‍☠️ 掠奪這艘船';toast(e.message);});});
  }).catch(function(e){toast('讀取失敗：'+e.message);});
}

// ============ 地下城 ============
function openDungeon(){
  var deep=P.deepest||0, maxStart=Math.max(1,deep);
  var suggest=Math.min(MAX_FLOOR,deep+1);
  var battle=P.team.battle.length, sup=P.team.support.length;
  var body='<div class="note" style="text-align:left">目前隊伍：戰鬥 '+battle+'/'+BATTLE_MAX+' ・ 後勤 '+sup+'/'+SUPPORT_MAX+'　'+(battle?'':'<b style="color:var(--hp)">（至少要 1 名戰鬥位！）</b>')+'</div>';
  body+='<div class="card"><div class="glab">起始樓層（可從已解鎖的第 1～'+maxStart+' 層出發）</div>'+
    '<input class="inp" id="sf" type="number" min="1" max="'+maxStart+'" value="1">'+
    '<div class="glab" style="margin-top:10px">目標樓層（最深已達 '+deep+'）</div>'+
    '<input class="inp" id="tf" type="number" min="1" max="'+MAX_FLOOR+'" value="'+suggest+'">'+
    '<div class="note" style="text-align:left;margin-top:8px">每 5 層有頭目。中途全滅會撤退失敗，但撿到的都帶得走。從深層出發可省去重打前段。</div></div>';
  body+='<button class="btn ok" id="dive"'+(battle?'':' disabled')+'>⚔️ 自動探索出發</button>';
  openSheet('⬇️ 地下城','GAS 會擲骰跑完整場，回你戰報',body);
  var dv=document.getElementById('dive');if(dv)dv.onclick=function(){
    var s=Math.max(1,Math.min(maxStart,parseInt(document.getElementById('sf').value,10)||1));
    var t=Math.max(s,Math.min(MAX_FLOOR,parseInt(document.getElementById('tf').value,10)||s));
    dv.disabled=true;dv.textContent='探索中…擲骰計算';
    flushSave().then(function(){return srv('dungeon',{nick:P.nick,start:s,target:t});}).then(function(res){P=res.player;modal.classList.remove('show');renderReport(res.report);})
      .catch(function(e){dv.disabled=false;dv.textContent='⚔️ 自動探索出發';toast('錯誤：'+e.message);});
  };
}
function fmtLog(lines){return lines.map(function(l){var m=/^R(\d+)$/.exec(l);return m?'<div style="color:var(--soft);font-size:11px;margin-top:6px;font-weight:700;border-top:1px dashed var(--d-line);padding-top:4px">— 第 '+m[1]+' 回合 —</div>':'<div style="font-size:12px;line-height:1.6">'+l+'</div>';}).join('');}
function renderReport(rep){
  var head=rep.wiped?'💀 小隊全滅撤退':(rep.cleared?'🎉 探索成功！':'🏳️ 探索結束');
  var h=topbar()+'<div class="pad" style="background:radial-gradient(120% 80% at 50% -10%,#2a2140,transparent 55%)">';
  h+='<h1>'+head+'</h1><p class="lead">從第 '+(rep.start||1)+' 層探索 → 目標第 '+rep.target+' 層 ・ 實際抵達第 '+rep.reached+' 層</p>';
  h+='<div class="card"><b>結算</b><div class="note" style="text-align:left;margin-top:6px">'+
    '🪙 金幣 +'+rep.gold+'　⭐ 經驗 +'+rep.xp+'<br>⚔️ 擊敗 '+(rep.kills||0)+' 隻　🎁 掉落 '+(rep.loot.length||0)+' 件　🏛️ 探索 '+(rep.floors?rep.floors.length:0)+' 層</div>';
  if(rep.wiped)h+='<div class="note" style="text-align:left;color:var(--hp)">🚑 救援費：損失 '+(rep.rescueGoldLost||0)+'🪙'+(rep.rescueLootLost?' ＋ '+rep.rescueLootLost+' 件戰利品':'')+'（倒下的夥伴回旅館付費救治）</div>';
  if(rep.rankUp)h+='<div class="note" style="text-align:left;color:var(--gold);font-weight:800">🎖️ 晉升為「'+rep.rankUp.to+'」！ +'+rep.rankUp.reward+'🪙</div>';
  if(rep.questDone)h+='<div class="note" style="text-align:left;color:var(--good);font-weight:800">📜 委託完成【'+rep.questDone.name+'】 +'+rep.questDone.reward+'🪙</div>';
  if(rep.levelUps&&rep.levelUps.length){h+='<div class="note" style="text-align:left;color:var(--gold)">⬆️ '+rep.levelUps.map(function(u){return u.name+' → Lv'+u.level;}).join('、')+'</div>';}
  if(rep.uniqueGains&&rep.uniqueGains.length){h+='<div class="note" style="text-align:left;color:var(--gold);font-weight:800">🌟 首殺獎勵！獲得獨門神器：'+rep.uniqueGains.map(function(u){return u.ico+u.nm;}).join('、')+'</div>';}
  if(rep.traitGains&&rep.traitGains.length){h+='<div class="note" style="text-align:left">🏅 '+rep.traitGains.map(function(t){var ti=TRAITS_C[t.key]||{};return t.name+' 獲得<span style="color:'+(t.good?'var(--gold)':'var(--hp)')+'">「'+ti.ico+ti.nm+'」</span>';}).join('、')+'</div>';}
  if(rep.bondUps&&rep.bondUps.length){h+='<div class="note" style="text-align:left;color:#ff9ec7">💞 羈絆提升：'+rep.bondUps.map(function(bd){return bd.a+' × '+bd.b+' → '+bd.level;}).join('、')+'</div>';}
  if(rep.loot&&rep.loot.length){h+='<div class="note" style="text-align:left">戰利品：'+rep.loot.map(function(id){var g=gById(id);return g?g.ico+g.nm:id;}).join('、')+'</div>';}
  h+='</div>';
  var story=[];
  if(rep.rankUp&&STORY.rank[rep.rankUp.ix])story.push(STORY.rank[rep.rankUp.ix]);
  (rep.newBosses||[]).forEach(function(bf){if(STORY.boss[bf])story.push(STORY.boss[bf]);});
  if(story.length)h+='<div class="card" style="border-color:var(--gold-d)"><b>📖 劇情</b>'+story.map(function(s){return '<div class="note" style="text-align:left;margin-top:6px;line-height:1.75;color:#f0d6ad;white-space:pre-line">'+s+'</div>';}).join('')+'</div>';
  h+='<details><summary>📋 展開逐層戰報（'+(rep.floors?rep.floors.length:0)+' 層）</summary><div style="margin-top:8px">';
  rep.floors.forEach(function(f){
    var enc=f.encounters&&f.encounters[0];
    var enemies=(enc&&enc.enemies||[]).map(function(e){return e.ico;}).join('');
    h+='<div class="rep-floor"><div class="fh">'+(f.boss?'👑 ':'')+'第 '+f.floor+' 層 '+enemies+'</div><div class="fl">';
    if(f.skills&&f.skills.length)h+=f.skills.join('<br>')+'<br>';
    else if(f.event)h+=f.event+'<br>';
    if(f.wipe)h+='<b style="color:var(--hp)">小隊在此全滅…</b>';
    else h+='擊敗 '+((enc||{}).killed||0)+' 隻 ・ +'+f.gold+'🪙 ・ +'+f.xp+'⭐'+((f.loot&&f.loot.length)?' ・ 掉落 '+f.loot.map(function(g){return g.ico+g.nm;}).join(''):'');
    h+='</div>';
    if(enc&&enc.lines&&enc.lines.length){h+='<details style="margin-top:4px"><summary>📜 詳細戰記</summary><div class="fl" style="margin-top:4px">'+fmtLog(enc.lines)+'</div></details>';}
    h+='</div>';
  });
  h+='</div></details>';
  h+='<div class="card" style="margin-top:10px"><button class="btn re sm" id="aitale" style="width:auto">📜 生成 AI 戰記（免費）</button>'+
    '<div class="note" id="aitalebox" style="display:none;text-align:left;margin-top:8px;line-height:1.85;color:#f0d6ad;white-space:pre-line"></div></div>';
  h+='<button class="btn gold" id="back" style="margin-top:12px">🏰 回到城鎮</button></div>';
  app.innerHTML=h;
  document.getElementById('back').onclick=renderTown;
  var at=document.getElementById('aitale');
  if(at)at.onclick=function(){at.disabled=true;at.textContent='✍️ 執筆中…';var box=document.getElementById('aitalebox');box.style.display='block';box.textContent='✨ 吟遊詩人正在編寫戰記…';
    genBattleTale(rep,function(t){box.textContent=t;if(at)at.remove();});};
}
// 免費 AI 戰記（Pollinations 文字，按需生成、超時用模板保底）
function genBattleTale(rep,cb){
  var names=(P.team.battle||[]).map(function(id){var c=byId(id);return c?c.name:null;}).filter(Boolean).join('、')||'一支傭兵小隊';
  var bosses=(rep.newBosses||[]).length?('，並擊破第 '+(rep.newBosses||[]).join('、')+' 層的頭目'):'';
  var ending=rep.wiped?'最後力竭全滅、被抬回城裡':(rep.cleared?'最終凱旋歸來':'見好就收、安全撤退');
  var prompt='用繁體中文寫一段 60~100 字、生動有畫面感的奇幻戰記，描述傭兵小隊這趟地下城的經歷。隊員：'+names+'。他們從第 '+(rep.start||1)+' 層打到第 '+rep.reached+' 層，擊敗約 '+(rep.kills||0)+' 隻魔物'+bosses+'，'+ending+'。只回傳戰記本文，不要標題、不要引號、不要多餘說明。';
  var done=false,timer=setTimeout(function(){if(!done){done=true;cb(taleTemplate(rep,names,ending));}},12000);
  fetch('https://text.pollinations.ai/'+encodeURIComponent(prompt)).then(function(r){return r.text();}).then(function(t){
    if(done)return;done=true;clearTimeout(timer);t=(t||'').trim().replace(/^["「『]+|["」』]+$/g,'').slice(0,320);
    cb(t&&!/error|unable|sorry/i.test(t)?t:taleTemplate(rep,names,ending));
  }).catch(function(){if(done)return;done=true;clearTimeout(timer);cb(taleTemplate(rep,names,ending));});
}
function taleTemplate(rep,names,ending){
  return names+' 深入幽暗的地下城，一路殺至第 '+rep.reached+' 層，'+(rep.kills||0)+' 隻魔物倒在他們腳下。'+((rep.newBosses||[]).length?'連盤踞的頭目也難逃一劫。':'')+ending+'。';
}

// ============ 啟動 ============
renderLogin();
</script>
