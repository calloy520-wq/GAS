<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<base target="_top">
<style>
  :root{--ink:#f0e9dc;--soft:#b6a892;--gold:#f4c34e;--gold-d:#c8971f;--line:#5a4a35;
    --panel:#33291f;--panel2:#3d3125;--good:#7cc36a;--good-d:#4f9e42;--hp:#e5556a;
    --t1:#3a3357;--t2:#6d5a6e;--d-bg:#15111c;--d-panel:#2f273f;--d-line:#43385a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{color:var(--ink);font-family:"Baloo 2","Segoe UI Rounded","Hiragino Maru Gothic ProN","Noto Sans TC",system-ui,sans-serif;
    background:linear-gradient(180deg,var(--t1),var(--t2) 45%,#2a211a);min-height:100dvh}
  #app{max-width:520px;margin:0 auto;min-height:100dvh;position:relative;background:linear-gradient(180deg,var(--t1),var(--t2) 45%,#2a211a)}
  /* йӣ»и…ҰеҜ¬иһўе№•пјҡе…©еҒҙдёҚеҶҚз©әи•©пјҢеҒҡжҲҗзҪ®дёӯгҖҢйҒҠжҲІж©ҹеҸ°гҖҚжЎҶ */
  @media(min-width:760px){
    body{background:radial-gradient(120% 90% at 50% -10%,#4a3a63 0%,#241c2e 55%,#160f18 100%)}
    body::before{content:'рҹҸ°гҖҖвҡ”пёҸгҖҖрҹӣЎпёҸгҖҖрҹ—ЎпёҸгҖҖрҹҚәгҖҖрҹҸ№гҖҖвңЁгҖҖрҹҗү';position:fixed;inset:0;z-index:0;
      font-size:70px;line-height:2.4;letter-spacing:34px;color:#fff;opacity:.035;overflow:hidden;
      word-break:break-word;padding:20px;pointer-events:none;user-select:none}
    #app{box-shadow:0 0 0 1px var(--line),0 18px 60px rgba(0,0,0,.55);border-radius:16px;
      margin:16px auto;min-height:calc(100dvh - 32px);overflow:hidden;position:relative;z-index:1}
    .bar{border-radius:16px 16px 0 0}
  }
  h1{font-size:22px;text-align:center;margin:6px 0 2px}
  .lead{text-align:center;color:#f0d6ad;font-size:12.5px;margin:0 0 12px;opacity:.9}
  .pad{padding:14px 12px 30px}

  .bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;padding:9px 12px;
    background:rgba(20,16,12,.72);backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
  .bar .t{font-weight:800;font-size:15px} .bar .t small{color:var(--soft);font-weight:600;font-size:11px}
  .spacer{flex:1}
  .pill{display:flex;align-items:center;gap:4px;background:#1c1712;border:1px solid var(--line);
    border-radius:11px;padding:4px 9px;font-weight:800;font-variant-numeric:tabular-nums;font-size:13px}

  input,select{font-family:inherit}
  .inp{width:100%;padding:12px;border-radius:11px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:15px}
  .inp:focus{outline:none;border-color:var(--gold)}

  .btn{border:none;border-radius:13px;padding:13px;font-weight:800;font-size:15px;color:#fff;cursor:pointer;font-family:inherit;
    box-shadow:0 4px 0 rgba(0,0,0,.35);width:100%}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.35)}
  .btn.gold{background:linear-gradient(180deg,var(--gold),var(--gold-d));color:#3a2600}
  .btn.ok{background:linear-gradient(180deg,var(--good),var(--good-d))}
  .btn.re{background:linear-gradient(180deg,#8a6fd0,#6a4cae)}
  .btn.dim{background:#4a3b2a} .btn[disabled]{opacity:.45}
  .btn.sm{padding:9px 12px;font-size:13px;width:auto;box-shadow:0 3px 0 rgba(0,0,0,.35)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
  .glab{font-size:11px;color:var(--soft);font-weight:700;letter-spacing:1px;margin:0 2px 7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:7px 11px;font-size:13px;font-weight:700;cursor:pointer}
  .chip.on{background:linear-gradient(180deg,#f4c34e,#d09a1f);color:#3a2600;border-color:#f4c34e}
  .chip:active{transform:scale(.96)}

  .abil{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
  .ab{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:7px 4px;text-align:center}
  .ab b{font-size:17px;display:block} .ab .mm{color:var(--soft);font-size:11px} .ab small{color:var(--soft);font-size:10.5px}

  .pbox{width:min(56vw,220px);aspect-ratio:1/1;margin:0 auto;border-radius:16px;overflow:hidden;position:relative;
    border:3px solid var(--gold-d);background:#2a2118;box-shadow:0 8px 22px rgba(0,0,0,.4)}
  .pbox img{width:100%;height:100%;object-fit:cover;display:block}
  .pbox .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;
    color:#ffe0a8;font-size:13px;text-align:center;font-weight:700}
  .ring{width:32px;height:32px;border:4px solid #ffffff33;border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .bldg{position:relative;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
    border-radius:15px;padding:12px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.28)}
  .bldg:active{transform:translateY(2px)}
  .bldg .ico{font-size:30px} .bldg .nm{font-weight:800;font-size:15px;margin-top:4px} .bldg .ds{color:var(--soft);font-size:11px;margin-top:1px}
  .bldg.wide{grid-column:1/3;background:linear-gradient(180deg,#4a2c3a,#331c26);border-color:#7a3c52}
  .badge{position:absolute;top:8px;right:8px;background:var(--hp);color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:9px}

  /* дё»еҹҺе ҙжҷҜпјҲжүӢз№Әжү“еә•пјӢAI иғҢжҷҜз–ҠеҠ пјү */
  .scene{position:relative;height:178px;overflow:hidden;border-bottom:2px solid var(--gold-d);
    background:linear-gradient(180deg,#332e52 0%,#6d5a6e 46%,#c77b43 82%,#eaa659 100%)}
  .scene .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .9s ease}
  .scene .bg.on{opacity:1}
  .scene .sun{position:absolute;left:50%;top:33%;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:50%;
    background:radial-gradient(circle,#fff1c9,#f6b45a 72%);box-shadow:0 0 46px 14px rgba(246,170,80,.5)}
  .scene .star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.75}
  .scene .sil{position:absolute;left:0;right:0;bottom:0;text-align:center;font-size:46px;line-height:1;letter-spacing:-4px;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.4));opacity:.95}
  .scene .title{position:absolute;left:0;right:0;bottom:10px;text-align:center;color:#fff;z-index:3;
    font-weight:800;font-size:20px;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.75)}
  .scene .title small{display:block;font-size:11px;font-weight:600;color:#ffe6c0;letter-spacing:1px;opacity:.92;text-shadow:0 1px 4px rgba(0,0,0,.7)}

  /* жӢӣзүҢејҸе»әзҜү */
  .signs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .sign{position:relative;background:linear-gradient(180deg,#8a5a34,#5e3a21);border:2px solid #3f2814;border-radius:13px;
    padding:12px 10px 13px;cursor:pointer;text-align:center;box-shadow:0 5px 0 #3a2413, inset 0 1px 0 rgba(255,220,170,.22)}
  .sign:active{transform:translateY(2px);box-shadow:0 3px 0 #3a2413, inset 0 1px 0 rgba(255,220,170,.22)}
  .sign::before,.sign::after{content:'';position:absolute;top:-7px;width:2px;height:7px;background:#3f2814}
  .sign::before{left:24px}.sign::after{right:24px}
  .sign .ico{font-size:29px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.45))}
  .sign .nm{font-weight:800;font-size:15px;margin-top:3px;color:#ffe9c9}
  .sign .ds{color:#e7c6a0;font-size:10.5px;margin-top:1px}
  .sign .badge{background:var(--hp)}
  .sign.gate{grid-column:1/3;background:linear-gradient(180deg,#5a2f3f,#361c26);border-color:#7a3c52;box-shadow:0 5px 0 #2a1620}
  .sign.gate .nm{color:#ffd0dd}
  .sign.sea{grid-column:1/3;background:linear-gradient(180deg,#1f5478,#123249);border-color:#2e6a94}
  .sign.sea .nm{color:#bfe4ff}
  .omap{position:relative;width:100%;aspect-ratio:1/1.02;border-radius:16px;overflow:hidden;border:2px solid #2a4a6a;
    background:radial-gradient(120% 90% at 28% 18%,#356690,#173753 58%,#0e2438);box-shadow:inset 0 0 46px rgba(0,0,0,.55)}
  .omap .wv{position:absolute;inset:0;opacity:.10;background-image:repeating-linear-gradient(30deg,#fff 0 1px,transparent 1px 22px)}
  .oport{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;cursor:pointer;width:70px;z-index:2}
  .oport .pin{font-size:27px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.65))}
  .oport .pn{font-size:10px;font-weight:800;color:#fff;text-shadow:0 1px 3px #000;white-space:nowrap;background:rgba(0,0,0,.4);padding:0 5px;border-radius:6px;margin-top:1px}
  .oport.here .pin{filter:drop-shadow(0 0 7px #f4c34e) drop-shadow(0 0 2px #f4c34e)}
  .oport.here .pn{background:#c8971f;color:#3a2600}
  .oship{position:absolute;transform:translate(-50%,-150%);font-size:22px;filter:drop-shadow(0 2px 3px #000);pointer-events:none;z-index:3}

  .u{display:flex;gap:10px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:9px;margin-bottom:8px}
  .u .av{width:44px;height:44px;border-radius:10px;object-fit:cover;background:#241d14;flex:none;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
  .u .av img{width:100%;height:100%;object-fit:cover}
  .u .info{flex:1;min-width:0} .u .info b{font-size:14.5px} .u .info small{display:block;color:var(--soft);font-size:11.5px;line-height:1.5}
  .u .tag{font-size:10px;font-weight:800;padding:1px 7px;border-radius:8px;background:#0006;color:var(--soft)}
  .hpbar{height:6px;border-radius:4px;background:#0007;overflow:hidden;margin-top:4px}
  .hpbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--hp),#ff8a99)}

  .modal{position:fixed;inset:0;z-index:40;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55)}
  .modal.show{display:flex}
  .sheet{width:100%;max-width:520px;max-height:90dvh;overflow-y:auto;background:linear-gradient(180deg,#2e251b,#241c14);
    border:1px solid var(--line);border-radius:20px 20px 0 0;padding:14px 12px calc(20px + env(safe-area-inset-bottom))}
  .sheet h2{margin:2px 0 2px;font-size:19px} .sheet .sub{color:var(--soft);font-size:12.5px;margin:0 0 12px}
  .close{float:right;background:#4a3b2a;border:none;color:var(--ink);width:32px;height:32px;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer}
  .note{color:var(--soft);font-size:12px;text-align:center;margin:10px 0 2px}
  .rowbtns{display:flex;gap:8px;margin-top:6px}

  .rep-floor{background:var(--d-panel);border:1px solid var(--d-line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
  .rep-floor .fh{font-weight:800;font-size:14px;margin-bottom:3px}
  .rep-floor .fl{color:#c9bfe0;font-size:12px;line-height:1.6}
  .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#241c14;border:1px solid var(--gold-d);
    color:var(--ink);padding:10px 16px;border-radius:12px;font-weight:700;font-size:13px;z-index:80;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  details{margin-top:8px;color:var(--soft);font-size:12px}
  details pre{white-space:pre-wrap;word-break:break-word;background:#241d14;padding:8px;border-radius:8px;border:1px solid var(--line)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="modal" id="pmodal"><div class="sheet" id="psheet"></div></div>
<div class="toast" id="toast"></div>

<script>
// ============ еүҚз«ҜиіҮж–ҷпјҲйЎҜзӨәз”ЁпјӣжҲ°й¬Ҙд»Қд»ҘеҫҢз«ҜзӮәжә–пјү============
var COMBAT={
  fighter:{nm:'жҲ°еЈ«',ico:'вҡ”пёҸ',atk:'str',hd:10,dmg:[1,8],skill:'зҢӣж“Ҡ',blurb:'иЎҖеҺҡж”»й«ҳзҡ„еүҚз·ҡж”Ҝжҹұ'},
  paladin:{nm:'иҒ–йЁҺеЈ«',ico:'рҹӣЎпёҸ',atk:'str',hd:10,dmg:[1,8],skill:'зҘһиҒ–ж–¬',blurb:'иғҪжүӣиғҪеҘ¶зҡ„йҮҚз”ІйЁҺеЈ«'},
  rogue:{nm:'зӣңиіҠ',ico:'рҹ—ЎпёҸ',atk:'dex',hd:8,dmg:[1,6],skill:'еҒ·иҘІ',blurb:'й«ҳжҡҙж“Ҡй«ҳй–ғйҒҝзҡ„ж”¶еүІиҖ…'},
  ranger:{nm:'йҒҠдҝ ',ico:'рҹҸ№',atk:'dex',hd:10,dmg:[1,8],skill:'зһ„жә–йҖЈе°„',blurb:'з©©е®ҡијёеҮәзҡ„йҒ зЁӢзҚөжүӢ'},
  wizard:{nm:'жі•её«',ico:'рҹ”®',atk:'int',hd:6,dmg:[1,6],skill:'зҒ«зҗғиЎ“',blurb:'и„Ҷзҡ®дҪҶдёҖзҷјжё…е ҙ'},
  cleric:{nm:'зү§её«',ico:'вңЁ',atk:'wis',hd:8,dmg:[1,6],skill:'иҒ–е…ү',blurb:'иғҪжү“иғҪеҘ¶зҡ„е®ҡжө·зҘһйҮқ'}
};
var SUPPORT={
  bard:{nm:'еҗҹйҒҠи©©дәә',ico:'рҹҺө',hd:8,dmg:[1,6],desc:'е…ЁйҡҠж”»ж“ҠжӘўе®ҡ +2'},
  merchant:{nm:'е•Ҷдәә',ico:'рҹ’°',hd:6,dmg:[1,4],desc:'йҮ‘е№ЈиҲҮжҺүиҗҪзҺҮ +40%'},
  scholar:{nm:'еӯёиҖ…',ico:'рҹ“–',hd:6,dmg:[1,4],desc:'з¶“й©— +35%гҖҒиҮӘеӢ•й‘‘е®ҡ'},
  medic:{nm:'йҶ«иҖ…',ico:'вӣ‘пёҸ',hd:8,dmg:[1,6],desc:'жҜҸеұӨиҮӘеӢ•жІ»зҷӮе…ЁйҡҠ 12%'},
  diviner:{nm:'еҚ еҚңеё«',ico:'рҹҚҖ',hd:6,dmg:[1,4],desc:'е…ЁйҡҠжҡҙж“Ҡ+10%гҖҒйҒҝйҷ·йҳұ'}
};
var RACES={
  human:{nm:'дәәйЎһ',ico:'рҹ§‘',grow:{str:1,dex:1,con:1,int:1,wis:1,cha:1},perk:'е…Ёеұ¬жҖ§ +1'},
  elf:{nm:'зІҫйқҲ',ico:'рҹ§қ',grow:{dex:2,int:1},perk:'ж•ҸжҚ·+2 жҷәеҠӣ+1'},
  darkelf:{nm:'й»‘жҡ—зІҫйқҲ',ico:'рҹҢ‘',grow:{dex:2,cha:1},perk:'ж•ҸжҚ·+2 йӯ…еҠӣ+1'},
  beast:{nm:'зҚёиҖі',ico:'рҹҗҫ',grow:{str:2,con:1},perk:'еҠӣйҮҸ+2 й«”иіӘ+1'},
  dragon:{nm:'йҫҚж—Ҹ',ico:'рҹҗІ',grow:{str:2,cha:1},perk:'еҠӣйҮҸ+2 йӯ…еҠӣ+1'},
  demon:{nm:'йӯ”ж—Ҹ',ico:'рҹҳҲ',grow:{cha:2,int:1},perk:'йӯ…еҠӣ+2 жҷәеҠӣ+1'},
  angel:{nm:'еӨ©дҪҝ',ico:'рҹҳҮ',grow:{wis:2,cha:1},perk:'зқҝзҹҘ+2 йӯ…еҠӣ+1'},
  vampire:{nm:'еҗёиЎҖй¬ј',ico:'рҹ§ӣ',grow:{cha:2,dex:1},perk:'йӯ…еҠӣ+2 ж•ҸжҚ·+1'}
};
var RACE_KEYS=['human','elf','darkelf','beast','dragon','demon','angel','vampire']; // иҲҮз«Ӣз№ӘзЁ®ж—ҸйҒёй …еҗҢеәҸ
var SKILLS={perception:{nm:'еҜҹиҰә',ab:'wis'},stealth:{nm:'йҡұеҢҝ',ab:'dex'},athletics:{nm:'йҒӢеӢ•',ab:'str'},medicine:{nm:'йҶ«зҷӮ',ab:'int'},survival:{nm:'жұӮз”ҹ',ab:'wis'},sleight:{nm:'е·§жүӢ',ab:'dex'},persuasion:{nm:'дәӨж¶ү',ab:'cha'}};
var CLASS_SKILLS={fighter:['athletics','survival'],paladin:['athletics','persuasion'],rogue:['stealth','sleight'],ranger:['survival','perception'],wizard:['perception','medicine'],cleric:['medicine','persuasion'],bard:['persuasion','sleight'],merchant:['persuasion','sleight'],scholar:['perception','medicine'],medic:['medicine','survival'],diviner:['perception','survival']};
var RACE_SKILLS={human:['persuasion'],elf:['perception'],darkelf:['stealth'],beast:['survival'],dragon:['athletics'],demon:['persuasion'],angel:['medicine'],vampire:['stealth']};
function charSkills(job,race){var s={};(CLASS_SKILLS[job]||[]).forEach(function(k){s[k]=1;});(RACE_SKILLS[race]||[]).forEach(function(k){s[k]=1;});return Object.keys(s);}
function skillNames(job,race){return charSkills(job,race).map(function(k){return SKILLS[k].nm+'('+ABN[SKILLS[k].ab]+')';}).join('гҖҒ');}
var RANKS=[{nm:'иҰӢзҝ’еӮӯе…ө',floor:0},{nm:'йҠ…зүҢеӮӯе…ө',floor:5},{nm:'йҠҖзүҢеӮӯе…ө',floor:10},{nm:'йҮ‘зүҢеӮӯе…ө',floor:15},{nm:'зҷҪйҮ‘еӮӯе…ө',floor:20},{nm:'еӮіиӘӘеӮӯе…ө',floor:25}];
function rankOf(dp){var ix=0;for(var i=0;i<RANKS.length;i++){if((dp||0)>=RANKS[i].floor)ix=i;}return ix;}

function genBio(c,cb){
  var ci=cinfo(c.job),rc=c.rarity&&RARITY_C[c.rarity]?RARITY_C[c.rarity].nm:'еёёиҰӢ',race=RACES[c.race]?RACES[c.race].nm:'дәәйЎһ';
  var prompt='з”Ёз№Ғй«”дёӯж–ҮпјҢзӮәдёҖдҪҚеҘҮе№»дё–з•Ңзҡ„еӮӯе…өеҜ«дёҖеҸҘ 30 еӯ—д»Ҙе…§гҖҒз”ҹеӢ•жңүеҖӢжҖ§зҡ„иҮӘжҲ‘д»Ӣзҙ№жҲ–еҸЈй ӯзҰӘгҖӮиҒ·жҘӯпјҡ'+ci.nm+'пјҢзЁ®ж—Ҹпјҡ'+race+'пјҢиіҮиіӘпјҡ'+rc+'гҖӮеҸӘеӣһеӮійӮЈдёҖеҸҘи©ұжң¬иә«пјҢдёҚиҰҒеј•иҷҹгҖҒдёҚиҰҒд»»дҪ•йЎҚеӨ–иӘӘжҳҺгҖӮ';
  var done=false,timer=setTimeout(function(){if(!done){done=true;cb(bioTemplate(c));}},9000);
  fetch('https://text.pollinations.ai/'+encodeURIComponent(prompt)).then(function(r){return r.text();}).then(function(t){
    if(done)return;done=true;clearTimeout(timer);
    t=(t||'').trim().replace(/^["гҖҢгҖҺ]+|["гҖҚгҖҸ]+$/g,'').split('\n')[0].slice(0,60);
    cb(t&&!/error|unable|sorry/i.test(t)?t:bioTemplate(c));
  }).catch(function(){if(done)return;done=true;clearTimeout(timer);cb(bioTemplate(c));});
}

  var t={fighter:'еҲҖеҸЈиҲ”иЎҖж…ЈдәҶпјҢйҢўзөҰеӨ пјҢжҲ‘е°ұжӣҝдҪ ж“ӢеңЁжңҖеүҚйқўгҖӮ',paladin:'д»ҘиҒ–е…үд№ӢеҗҚпјҢжҲ‘зҷјиӘ“е®Ҳиӯ·еҗҢдјҙеҲ°жңҖеҫҢдёҖеҲ»гҖӮ',rogue:'еҷ“пјҢеҲҘеҮәиҒІвҖ”вҖ”еҖјйҢўзҡ„жқұиҘҝпјҢжҲ‘дҫҶжӢҝе°ұеҘҪгҖӮ',ranger:'жҲ‘зҡ„з®ӯеҫһдёҚиҗҪз©әпјҢйҷӨйқһжҲ‘жғіи®“е®ғиҗҪз©әгҖӮ',wizard:'еҮЎдәәзҡ„еёёиӯҳпјҹеңЁжҲ‘зҡ„йӯ”жі•йқўеүҚдёҚйҒ©з”ЁгҖӮ',cleric:'еҸ—еӮ·е°ұйҒҺдҫҶпјҢеҲҘйҖһеј·пјҢдәӨзөҰжҲ‘гҖӮ',bard:'дҫҶпјҢиҒҪжҲ‘е”ұдёҖйҰ–пјҢй ҶдҫҝжӣҝдҪ еҖ‘жү“жү“ж°ЈпјҒ',merchant:'дёҖеҲҶйҢўдёҖеҲҶиІЁпјҢи·ҹи‘—жҲ‘жә–жІ’йҢҜгҖӮ',scholar:'зҹҘиӯҳе°ұжҳҜеҠӣйҮҸпјҢйҖҷең°дёӢеҹҺзҡ„з§ҳеҜҶжҲ‘йғҪиЁҳи‘—гҖӮ',medic:'еҲҘжӯ»еңЁжҲ‘йқўеүҚпјҢйӮЈжҳҜе°ҚжҲ‘йҶ«иЎ“зҡ„дҫ®иҫұгҖӮ',diviner:'е‘ҪйҒӢпјҹжҲ‘ж—©зңӢйҒҺзөҗеұҖдәҶпјҢи·ҹз·ҠжҲ‘гҖӮ'};

function sellPrice(g){return Math.max(5,Math.round(g.price*0.5));}
function openShop(){
  var body='<div class="chips" style="margin-bottom:10px"><span class="chip'+(shopTab==='buy'?' on':'')+'" data-tab="buy">рҹӣ’ иіјиІ·</span><span class="chip'+(shopTab==='sell'?' on':'')+'" data-tab="sell">рҹ’° иіЈеҮәпјҲиғҢеҢ… '+(P.bag||[]).length+'пјү</span></div>';
  if(shopTab==='buy'){
    [['рҹ—ЎпёҸ жӯҰеҷЁ',WEAPONS],['рҹӣЎпёҸ йҳІе…·',ARMORS],['рҹ’Қ йЈҫе“Ғ',TRINKETS]].forEach(function(grp){
      body+='<div class="glab">'+grp[0]+'</div>';
      grp[1].forEach(function(g){body+='<div class="u"><div class="av">'+g.ico+'</div><div class="info"><b>'+g.nm+'</b><small>'+gearDesc(g)+'</small></div>'+
        '<button class="btn gold sm" data-buy="'+g.id+'" data-price="'+g.price+'"'+(P.gold<g.price?' disabled':'')+'>иІ· '+g.price+'рҹӘҷ</button></div>';});
    });
  }else{
    // иғҢеҢ…дҫқ id еҲҶзө„иЁҲж•ё
    var cnt={};(P.bag||[]).forEach(function(id){cnt[id]=(cnt[id]||0)+1;});
    var ids=Object.keys(cnt);
    if(!ids.length)body+='<div class="note">иғҢеҢ…жҳҜз©әзҡ„гҖӮең°дёӢеҹҺжҺүиҗҪгҖҒе•Ҷеә—иІ·зҡ„иЈқеӮҷжңғж”ҫйҖҷиЈЎгҖӮ</div>';
    ids.forEach(function(id){var g=gById(id);if(!g)return;
      body+='<div class="u"><div class="av">'+g.ico+'</div><div class="info"><b>'+g.nm+(cnt[id]>1?' Г—'+cnt[id]:'')+'</b><small>'+gearDesc(g)+'</small></div>'+
        '<button class="btn ok sm" data-sell="'+id+'">иіЈ '+sellPrice(g)+'рҹӘҷ</button></div>';});
    if(ids.length>1)body+='<button class="btn dim sm" id="sellall" style="margin-top:6px">дёҖйҚөиіЈжҺүе…ЁйғЁпјҲжңӘиЈқеӮҷпјү</button>';
  }
  openSheet('рҹӣЎпёҸ жӯҰеҷЁйҳІе…·йЈҫе“Ғеә—','иІ·иіЈиЈқеӮҷгғ»иіЈеҮәеғ№зӮәе”®еғ№дёҖеҚҠ','<div class="note" style="text-align:left">рҹӘҷ зӣ®еүҚйҮ‘е№Јпјҡ<span id="shopgold">'+P.gold+'</span></div>'+body);
  q('[data-tab]',function(el){shopTab=el.dataset.tab;openShop();});
  q('[data-buy]',function(el){var price=+el.dataset.price;if(P.gold<price){toast('йҮ‘е№ЈдёҚи¶і');return;}P.gold-=price;P.bag.push(el.dataset.buy);saveP(openShop);toast('е·Іиіје…Ҙ');});
  q('[data-sell]',function(el){var id=el.dataset.sell,i=P.bag.indexOf(id);if(i<0)return;P.bag.splice(i,1);var g=gById(id);P.gold+=sellPrice(g);saveP(openShop);toast('иіЈеҮә '+g.nm+' +'+sellPrice(g)+'рҹӘҷ');});
  var sa=document.getElementById('sellall');if(sa)sa.onclick=function(){if(!(P.bag||[]).length)return;if(!confirm('иіЈжҺүиғҢеҢ…жүҖжңүжңӘиЈқеӮҷзҡ„иЈқеӮҷпјҹ'))return;var tot=0;P.bag.forEach(function(id){var g=gById(id);if(g)tot+=sellPrice(g);});P.bag=[];P.gold+=tot;saveP(openShop);toast('е…ЁйғЁиіЈеҮә +'+tot+'рҹӘҷ');};
}

// ---- й…’йӨЁпјҲзЁҖжңүеәҰжӢӣеӢҹгғ»ијӘжӣҝеҖҷйҒёпјү----
var RARITY_C={common:{nm:'еёёиҰӢ',star:'вӯҗ',color:'#b6a892'},fine:{nm:'зІҫиүҜ',star:'вӯҗвӯҗ',color:'#7cc36a'},rare:{nm:'зЁҖжңү',star:'вӯҗвӯҗвӯҗ',color:'#5a9ee5'},epic:{nm:'еҸІи©©',star:'вӯҗвӯҗвӯҗвӯҗ',color:'#b06fe0'},legend:{nm:'еӮіиӘӘ',star:'вӯҗвӯҗвӯҗвӯҗвӯҗ',color:'#f4c34e'}};
function rarC(k){return RARITY_C[k]||RARITY_C.common;}
function candStats(cand){return {job:cand.job,race:cand.race,level:1,base:cand.base,equip:{weapon:null,armor:null,trinket:null}};}
function openTavern(){
  openSheet('рҹҚә й…’йӨЁ','д»Ҡж—ҘжҮүеҫөзҡ„еӮӯе…өпјҲзЁҖжңүеәҰйҡЁж©ҹпјү','<div class="note">еҸ¬йӣҶжҮүеҫөиҖ…вҖҰ</div>');
  flushSave().then(function(){return srv('tavern',{nick:P.nick,op:'list'});}).then(function(r){P=r.player;refreshTopbar();renderTavern();}).catch(function(e){toast(e.message);});
}
function renderTavern(){
  var body='<div class="note" style="text-align:left">е°ҸйҡҠ '+P.roster.length+'/'+ROSTER_MAX+' дәәгҖӮжҮүеҫөиҖ…иіҮиіӘе·ІйҡЁж©ҹжҠҪе®ҡпјҢйӣҮиө°е°ұжІ’дәҶпјӣйӣҮз”ЁеҫҢеҸҜиҮӘиЁӮеҗҚеӯ—иҲҮз«Ӣз№ӘгҖӮ</div>';
  (P.tavern||[]).forEach(function(cand){
    var ci=cinfo(cand.job),rc=rarC(cand.rarity),r=RACES[cand.race],pc=candStats(cand);
    var top=AB.slice().sort(function(a,b){return cand.base[b]-cand.base[a];}).slice(0,2).map(function(a){return ABI[a]+cand.base[a];}).join(' ');
    var afford=P.gold>=cand.cost&&P.roster.length<ROSTER_MAX;
    body+='<div class="u" style="border-color:'+rc.color+'"><div class="av">'+ci.ico+'</div><div class="info">'+
      '<b style="color:'+rc.color+'">'+rc.star+' '+rc.nm+'</b> <span class="tag">'+r.ico+r.nm+'гғ»'+ci.nm+'</span>'+
      '<small>'+top+' гғ» HP '+cMaxHp(pc)+(isSup(cand.job)?'':' гғ» AC '+cStats(pc).ac)+'</small>'+
      '<small>'+(isSup(cand.job)?SUPPORT[cand.job].desc:('жҠҖгҖҢ'+COMBAT[cand.job].skill+'гҖҚ'))+'</small></div>'+
      '<button class="btn ok sm" data-cand="'+cand.cid+'"'+(afford?'':' disabled')+'>йӣҮ '+cand.cost+'рҹӘҷ</button></div>';
  });
  if(!(P.tavern||[]).length)body+='<div class="note">жҮүеҫөиҖ…йғҪиў«йӣҮиө°дәҶпјҢжҸӣдёҖжү№зңӢзңӢпјҹ</div>';
  body+='<button class="btn dim sm" id="tref" style="margin-top:6px"'+(P.gold<30?' disabled':'')+'>рҹ”„ жҸӣдёҖжү№жҮүеҫөиҖ…пјҲ30рҹӘҷпјү</button>';
  sheet.innerHTML='<button class="close" onclick="closeSheet()">вң•</button><h2>рҹҚә й…’йӨЁ</h2><p class="sub">д»Ҡж—ҘжҮүеҫөзҡ„еӮӯе…өпјҲзЁҖжңүеәҰйҡЁж©ҹгғ»йӣҮиө°е°ұжІ’дәҶпјү</p>'+body;
  q('[data-cand]',function(el){var cand=(P.tavern||[]).filter(function(c){return c.cid===el.dataset.cand;})[0];if(cand)startRecruit(cand);});
  var rf=document.getElementById('tref');if(rf)rf.onclick=function(){rf.disabled=true;flushSave().then(function(){return srv('tavern',{nick:P.nick,op:'refresh'});}).then(function(r){P=r.player;refreshTopbar();renderTavern();}).catch(function(e){rf.disabled=false;toast(e.message);});};
}
var recruitCand=null, recruitPortrait='', recruitSeed=0;
function startRecruit(cand){
  if(P.roster.length>=ROSTER_MAX){toast('еҖүеә«е·Іж»ҝпјҢи«Ӣе…ҲйҒЈж•Ј');return;}
  if(P.gold<cand.cost){toast('йҮ‘е№ЈдёҚи¶і');return;}
  recruitCand=cand;recruitPortrait='';recruitSeed=0;window._rname='';
  renderRecruitForm();
}
function renderRecruitForm(){
  var cand=recruitCand,ci=cinfo(cand.job),rc=rarC(cand.rarity),r=RACES[cand.race],pc=candStats(cand);
  var body='<div class="pbox" id="rpbox" style="width:min(46vw,170px)">'+(recruitPortrait?'<img src="'+recruitPortrait+'">':'<div class="ph">е°ҡжңӘе»әз«Ӣй ӯеғҸ</div>')+'</div>';
  body+='<button class="btn re sm" style="width:auto;display:block;margin:10px auto 12px" id="rmkport">рҹҺЁ е»әз«Ӣй ӯеғҸ</button>';
  body+='<div class="card" style="border-color:'+rc.color+'"><b style="color:'+rc.color+'">'+rc.star+' '+rc.nm+'</b> '+r.ico+r.nm+' '+ci.ico+ci.nm+'<div class="abil" style="margin-top:8px">';
  AB.forEach(function(a){var s=cand.base[a],m=cmod(s);body+='<div class="ab"><small>'+ABI[a]+ABN[a]+'</small><b>'+s+'</b><span class="mm">'+(m>=0?'+':'')+m+'</span></div>';});
  body+='</div><div class="note" style="text-align:left">HP '+cMaxHp(pc)+(isSup(cand.job)?'':' гғ» AC '+cStats(pc).ac)+' гғ» е°Ҳй•· '+skillNames(cand.job,cand.race)+'</div></div>';
  body+='<div class="glab">еҗҚеӯ—</div><input class="inp" id="rname" maxlength="16" placeholder="'+ci.nm+'" value="'+(window._rname||'')+'">';
  body+='<button class="btn ok" id="rhire" style="margin-top:10px">вң… йӣҮз”ЁпјҲ'+cand.cost+'рҹӘҷпјү</button>';
  openSheet(rc.star+' йӣҮз”Ё '+ci.nm,'иіҮиіӘе·Іе®ҡпјҢе®ўиЈҪеҗҚеӯ—иҲҮз«Ӣз№Ә',body);
  var rn=document.getElementById('rname');rn.addEventListener('input',function(){window._rname=rn.value;});
  document.getElementById('rmkport').onclick=function(){openPortrait(cand.job,function(rr){recruitPortrait=rr.portrait;recruitSeed=rr.seed;renderRecruitForm();},RACE_KEYS.indexOf(cand.race),cand.rarity);};
  document.getElementById('rhire').onclick=function(){
    if(!recruitPortrait){toast('и«Ӣе…Ҳе»әз«Ӣй ӯеғҸ');return;}
    var name=(window._rname||'').trim().slice(0,16)||ci.nm;
    var b=this;b.disabled=true;b.textContent='йӣҮз”ЁдёӯвҖҰ';
    flushSave().then(function(){return srv('recruit',{nick:P.nick,cid:cand.cid,name:name,portrait:recruitPortrait,seed:recruitSeed});}).then(function(res){
      P=res.player;toast(name+' еҠ е…ҘдәҶе°ҸйҡҠпјҒ');refreshTopbar();renderTavern();
    }).catch(function(e){b.disabled=false;b.textContent='вң… йӣҮз”ЁпјҲ'+cand.cost+'рҹӘҷпјү';toast('жӢӣеӢҹеӨұж•—пјҡ'+e.message);});
  };
}

function openGuild(){
  var body='';
  if(P.quest){var q=P.quest;var done=q.prog>=q.target;var pct=Math.min(100,Math.round(q.prog/q.target*100));
    body+='<div class="card"><b>рҹ“ң йҖІиЎҢдёӯе§”иЁ—</b><div class="note" style="text-align:left;margin-top:4px">'+q.name+'<br>'+q.desc+'</div>'+
      '<div class="hpbar" style="height:9px;margin-top:7px"><i style="background:linear-gradient(90deg,#7cc36a,#4f9e42);width:'+pct+'%"></i></div>'+
      '<div class="note" style="text-align:left">йҖІеәҰ '+Math.min(q.prog,q.target)+' / '+q.target+' гғ» иіһйҮ‘ '+q.reward+'рҹӘҷ</div>'+
      (done?'<div class="note" style="text-align:left;color:var(--good)">вң… е·ІйҒ”жҲҗпјҒдёӢж¬ЎжҺўзҙўеӣһеҹҺжҷӮиҮӘеӢ•й ҳиіһгҖӮ</div>':'<div class="note" style="text-align:left">дёӢең°дёӢеҹҺйҒ”жҲҗзӣ®жЁҷпјҢеӣһеҹҺиҮӘеӢ•зөҗз®—гҖӮ</div>')+
      '<button class="btn dim sm" id="qab" style="margin-top:6px">ж”ҫжЈ„е§”иЁ—</button></div>';
  }else{
    body+='<div class="note">жҺҘдёҖејөе§”иЁ—пјҢйҖІең°дёӢеҹҺйҒ”жҲҗзӣ®жЁҷе°ұиҮӘеӢ•й ҳиіһйҮ‘гҖӮе§”иЁ—зӣ®жЁҷдҫқдҪ зӣ®еүҚжңҖж·ұеұӨиӘҝж•ҙгҖӮ</div><button class="btn ok" id="qacc">жҺҘж–°е§”иЁ—</button>';
  }
  openSheet('рҹ—ЎпёҸ еӮӯе…өе…¬жңғ','жҺҘе§”иЁ— вҶ’ дёӢең°дёӢеҹҺйҒ”жҲҗ вҶ’ еӣһеҹҺиҮӘеӢ•й ҳзҚҺ',body);
  var acc=document.getElementById('qacc');if(acc)acc.onclick=function(){acc.disabled=true;acc.textContent='жҺҘжҙҪдёӯвҖҰ';flushSave().then(function(){return srv('quest',{nick:P.nick,op:'accept'});}).then(function(r){P=r.player;openGuild();}).catch(function(e){acc.disabled=false;acc.textContent='жҺҘж–°е§”иЁ—';toast(e.message);});};
  var ab=document.getElementById('qab');if(ab)ab.onclick=function(){if(!confirm('зўәе®ҡж”ҫжЈ„зӣ®еүҚе§”иЁ—пјҹ'))return;flushSave().then(function(){return srv('quest',{nick:P.nick,op:'abandon'});}).then(function(r){P=r.player;openGuild();}).catch(function(e){toast(e.message);});};
}

// ---- й»‘еёӮпјҲзЁҖжңүдәӨжҳ“гғ»ијӘжӣҝиІЁгғ»дәӨж¶үжҠҳжүЈпјү----
function blackPool(){return [
  {k:'ess_str',e:'рҹ’Ә',nm:'еҠӣйҮҸзІҫиҸҜ',ds:'жҢҮе®ҡи§’иүІ еҠӣйҮҸ +1пјҲж°ёд№…пјү',cost:180,type:'ess',ab:'str'},
  {k:'ess_dex',e:'рҹҺҜ',nm:'ж•ҸжҚ·зІҫиҸҜ',ds:'жҢҮе®ҡи§’иүІ ж•ҸжҚ· +1пјҲж°ёд№…пјү',cost:180,type:'ess',ab:'dex'},
  {k:'ess_con',e:'вқӨпёҸ',nm:'й«”иіӘзІҫиҸҜ',ds:'жҢҮе®ҡи§’иүІ й«”иіӘ +1пјҲеўһеҠ з”ҹе‘Ҫпјү',cost:200,type:'ess',ab:'con'},
  {k:'ess_int',e:'рҹ§ ',nm:'жҷәж…§зІҫиҸҜ',ds:'жҢҮе®ҡи§’иүІ жҷәеҠӣ +1пјҲж°ёд№…пјү',cost:180,type:'ess',ab:'int'},
  {k:'ess_wis',e:'рҹ‘ҒпёҸ',nm:'зқҝзҹҘзІҫиҸҜ',ds:'жҢҮе®ҡи§’иүІ зқҝзҹҘ +1пјҲж°ёд№…пјү',cost:180,type:'ess',ab:'wis'},
  {k:'ess_cha',e:'рҹ’¬',nm:'йӯ…еҠӣзІҫиҸҜ',ds:'жҢҮе®ҡи§’иүІ йӯ…еҠӣ +1пјҲж°ёд№…пјү',cost:180,type:'ess',ab:'cha'},
  {k:'g_flame',e:'рҹ”Ҙ',nm:'зғҲз„°д№ӢеҲғ',ds:'зЁҖжңүжӯҰеҷЁ 2d6+2',cost:520,type:'gear',id:'w_flame'},
  {k:'g_dragon',e:'рҹҗІ',nm:'йҫҚйұ—йҺ§',ds:'зЁҖжңүйҳІе…· иӯ·з”І +8',cost:560,type:'gear',id:'a_dragon'},
  {k:'g_staff',e:'рҹӘ„',nm:'з§ҳжі•жқ–',ds:'жі•зі»жӯҰеҷЁ 1d8+2',cost:300,type:'gear',id:'w_staff'}
];}
function rollBlack(){var pool=blackPool().slice();for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}return pool.slice(0,4).map(function(o){return {k:o.k,sold:false};});}
function blackDisc(){return P.roster.some(function(c){return charSkills(c.job,c.race).indexOf('persuasion')>=0;})?0.85:1;}
function openBlack(){
  if(!P.black||!P.black.length)P.black=rollBlack();
  var disc=blackDisc(),map={};blackPool().forEach(function(o){map[o.k]=o;});
  var body='';
  P.black.forEach(function(it,i){var o=map[it.k];if(!o)return;var price=Math.round(o.cost*disc);
    if(it.sold){body+='<div class="u" style="opacity:.45"><div class="av">'+o.e+'</div><div class="info"><b>'+o.nm+'</b><small>е·Іе”®еҮә</small></div></div>';return;}
    body+='<div class="u"><div class="av">'+o.e+'</div><div class="info"><b>'+o.nm+'</b><small>'+o.ds+'</small></div><button class="btn gold sm" data-bk="'+i+'"'+(P.gold<price?' disabled':'')+'>иІ· '+price+'рҹӘҷ</button></div>';
  });
  body+='<div class="note">рҹ•¶пёҸ гҖҢиӯҳиІЁзҡ„жүҚжҮӮгҖӮгҖҚжҜҸжү№иІЁжңүйҷҗпјҢе”®е®ҢеҸҜиҠұйҢўйҖІж–°иІЁгҖӮ'+(disc<1?'гҖҖвңЁ йҡҠдёҠжңүдәәж“…й•·дәӨж¶үпјҢе·Іжү“жҠҳпјҒ':'')+'</div>';
  body+='<button class="btn dim sm" id="brefresh"'+(P.gold<30?' disabled':'')+' style="margin-top:4px">рҹ”„ йҖІиІЁпјҲ30рҹӘҷ жҸӣдёҖжү№пјү</button>';
  openSheet('рҹ•¶пёҸ й»‘еёӮ','иҰӢдёҚеҫ—е…үзҡ„зЁҖжңүдәӨжҳ“',body);
  q('[data-bk]',function(el){var i=+el.dataset.bk,it=P.black[i],o=map[it.k],price=Math.round(o.cost*disc);
    if(it.sold||P.gold<price)return;

    r.players.forEach(function(pl,ix){
      var me=pl.nick===P.nick;
      body+='<div class="card"'+(me?' style="border-color:var(--gold)"':'')+'><b>'+(ix+1===1?'рҹ‘‘ ':'')+'#'+(ix+1)+' '+pl.nick+(me?' <span class="tag">дҪ </span>':'')+'</b>'+
        '<div class="note" style="text-align:left;margin:4px 0 8px">в¬ҮпёҸ жңҖж·ұз¬¬ '+pl.deepest+' еұӨ гғ» рҹӘҷ '+pl.gold+'</div><div class="chips">';
      (pl.members||[]).forEach(function(m){body+='<span class="chip" style="cursor:default">'+(m.portrait?'рҹ–јпёҸ':m.ico)+' '+m.name+' Lv'+m.level+'</span>';});
      body+='</div></div>';
    });
    sheet.innerHTML='<button class="close" onclick="closeSheet()">вң•</button><h2>рҹ“ң еҶ’йҡӘиҖ…еҗҚеҶҠ</h2><p class="sub">еӨ§е®¶зҡ„жҺўзҙўйҖІеәҰиҲҮйҡҠдјҚпјҲе”Ҝи®Җпјү</p>'+(body||'<div class="note">йӮ„жІ’жңүе…¶д»–еҶ’йҡӘиҖ…</div>');
  }).catch(function(e){toast('и®ҖеҸ–еӨұж•—пјҡ'+e.message);});
}

// ============ ең°дёӢеҹҺ ============
function openDungeon(){
  var deep=P.deepest||0, maxStart=Math.max(1,deep);
  var suggest=Math.min(MAX_FLOOR,deep+1);
  var battle=P.team.battle.length, sup=P.team.support.length;
  var body='<div class="note" style="text-align:left">зӣ®еүҚйҡҠдјҚпјҡжҲ°й¬Ҙ '+battle+'/'+BATTLE_MAX+' гғ» еҫҢеӢӨ '+sup+'/'+SUPPORT_MAX+'гҖҖ'+(battle?'':'<b style="color:var(--hp)">пјҲиҮіе°‘иҰҒ 1 еҗҚжҲ°й¬ҘдҪҚпјҒпјү</b>')+'</div>';
  body+='<div class="card"><div class="glab">иө·е§ӢжЁ“еұӨпјҲеҸҜеҫһе·Іи§ЈйҺ–зҡ„з¬¬ 1пҪһ'+maxStart+' еұӨеҮәзҷјпјү</div>'+
    '<input class="inp" id="sf" type="number" min="1" max="'+maxStart+'" value="1">'+
    '<div class="glab" style="margin-top:10px">зӣ®жЁҷжЁ“еұӨпјҲжңҖж·ұе·ІйҒ” '+deep+'пјү</div>'+
    '<input class="inp" id="tf" type="number" min="1" max="'+MAX_FLOOR+'" value="'+suggest+'">'+
    '<div class="note" style="text-align:left;margin-top:8px">жҜҸ 5 еұӨжңүй ӯзӣ®гҖӮдёӯйҖ”е…Ёж»…жңғж’ӨйҖҖеӨұж•—пјҢдҪҶж’ҝеҲ°зҡ„йғҪеё¶еҫ—иө°гҖӮеҫһж·ұеұӨеҮәзҷјеҸҜзңҒеҺ»йҮҚжү“еүҚж®өгҖӮ</div></div>';
  body+='<button class="btn ok" id="dive"'+(battle?'':' disabled')+'>вҡ”пёҸ иҮӘеӢ•жҺўзҙўеҮәзҷј</button>';
  openSheet('в¬ҮпёҸ ең°дёӢеҹҺ','GAS жңғж“ІйӘ°и·‘е®Ңж•ҙе ҙпјҢеӣһдҪ жҲ°е ұ',body);
  var dv=document.getElementById('dive');if(dv)dv.onclick=function(){
    var s=Math.max(1,Math.min(maxStart,parseInt(document.getElementById('sf').value,10)||1));
    var t=Math.max(s,Math.min(MAX_FLOOR,parseInt(document.getElementById('tf').value,10)||s));
    dv.disabled=true;dv.textContent='жҺўзҙўдёӯвҖҰж“ІйӘ°иЁҲз®—';
    flushSave().then(function(){return srv('dungeon',{nick:P.nick,start:s,target:t});}).then(function(res){P=res.player;modal.classList.remove('show');renderReport(res.report);})
      .catch(function(e){dv.disabled=false;dv.textContent='вҡ”пёҸ иҮӘеӢ•жҺўзҙўеҮәзҷј';toast('йҢҜиӘӨпјҡ'+e.message);});
  };
}
function fmtLog(lines){return lines.map(function(l){var m=/^R(\d+)$/.exec(l);return m?'<div style="color:var(--soft);font-size:11px;margin-top:6px;font-weight:700;border-top:1px dashed var(--d-line);padding-top:4px">вҖ” з¬¬ '+m[1]+' еӣһеҗҲ вҖ”</div>':'<div style="font-size:12px;line-height:1.6">'+l+'</div>';}).join('');}
function renderReport(rep){
  var head=rep.wiped?'рҹ’Җ е°ҸйҡҠе…Ёж»…ж’ӨйҖҖ':(rep.cleared?'рҹҺү жҺўзҙўжҲҗеҠҹпјҒ':'рҹҸіпёҸ жҺўзҙўзөҗжқҹ');
  var h=topbar()+'<div class="pad" style="background:radial-gradient(120% 80% at 50% -10%,#2a2140,transparent 55%)">';
  h+='<h1>'+head+'</h1><p class="lead">еҫһз¬¬ '+(rep.start||1)+' еұӨжҺўзҙў вҶ’ зӣ®жЁҷз¬¬ '+rep.target+' еұӨ гғ» еҜҰйҡӣжҠөйҒ”з¬¬ '+rep.reached+' еұӨ</p>';
  h+='<div class="card"><b>зөҗз®—</b><div class="note" style="text-align:left;margin-top:6px">'+
    'рҹӘҷ йҮ‘е№Ј +'+rep.gold+'гҖҖвӯҗ з¶“й©— +'+rep.xp+'<br>вҡ”пёҸ ж“Ҡж•— '+(rep.kills||0)+' йҡ»гҖҖрҹҺҒ жҺүиҗҪ '+(rep.loot.length||0)+' д»¶гҖҖрҹҸӣпёҸ жҺўзҙў '+(rep.floors?rep.floors.length:0)+' еұӨ</div>';
  if(rep.wiped)h+='<div class="note" style="text-align:left;color:var(--hp)">рҹҡ‘ ж•‘жҸҙиІ»пјҡжҗҚеӨұ '+(rep.rescueGoldLost||0)+'рҹӘҷ'+(rep.rescueLootLost?' пјӢ '+rep.rescueLootLost+' д»¶жҲ°еҲ©е“Ғ':'')+'пјҲеҖ’дёӢзҡ„еӨҘдјҙеӣһж—…йӨЁд»ҳиІ»ж•‘жІ»пјү</div>';
  if(rep.rankUp)h+='<div class="note" style="text-align:left;color:var(--gold);font-weight:800">рҹҺ–пёҸ жҷүеҚҮзӮәгҖҢ'+rep.rankUp.to+'гҖҚпјҒ +'+rep.rankUp.reward+'рҹӘҷ</div>';
  if(rep.questDone)h+='<div class="note" style="text-align:left;color:var(--good);font-weight:800">рҹ“ң е§”иЁ—е®ҢжҲҗгҖҗ'+rep.questDone.name+'гҖ‘ +'+rep.questDone.reward+'рҹӘҷ</div>';
  if(rep.levelUps&&rep.levelUps.length){h+='<div class="note" style="text-align:left;color:var(--gold)">в¬ҶпёҸ '+rep.levelUps.map(function(u){return u.name+' вҶ’ Lv'+u.level;}).join('гҖҒ')+'</div>';}
  if(rep.traitGains&&rep.traitGains.length){h+='<div class="note" style="text-align:left">рҹҸ… '+rep.traitGains.map(function(t){var ti=TRAITS_C[t.key]||{};return t.name+' зҚІеҫ—<span style="color:'+(t.good?'var(--gold)':'var(--hp)')+'">гҖҢ'+ti.ico+ti.nm+'гҖҚ</span>';}).join('гҖҒ')+'</div>';}
  if(rep.bondUps&&rep.bondUps.length){h+='<div class="note" style="text-align:left;color:#ff9ec7">рҹ’һ зҫҲзөҶжҸҗеҚҮпјҡ'+rep.bondUps.map(function(bd){return bd.a+' Г— '+bd.b+' вҶ’ '+bd.level;}).join('гҖҒ')+'</div>';}
  if(rep.loot&&rep.loot.length){h+='<div class="note" style="text-align:left">жҲ°еҲ©е“Ғпјҡ'+rep.loot.map(function(id){var g=gById(id);return g?g.ico+g.nm:id;}).join('гҖҒ')+'</div>';}
  h+='</div>';
  var story=[];
  if(rep.rankUp&&STORY.rank[rep.rankUp.ix])story.push(STORY.rank[rep.rankUp.ix]);
  (rep.newBosses||[]).forEach(function(bf){if(STORY.boss[bf])story.push(STORY.boss[bf]);});
  if(story.length)h+='<div class="card" style="border-color:var(--gold-d)"><b>рҹ“– еҠҮжғ…</b>'+story.map(function(s){return '<div class="note" style="text-align:left;margin-top:6px;line-height:1.75;color:#f0d6ad;white-space:pre-line">'+s+'</div>';}).join('')+'</div>';
  h+='<details><summary>рҹ“Ӣ еұ•й–ӢйҖҗеұӨжҲ°е ұпјҲ'+(rep.floors?rep.floors.length:0)+' еұӨпјү</summary><div style="margin-top:8px">';
  rep.floors.forEach(function(f){
    var enc=f.encounters&&f.encounters[0];
    var enemies=(enc&&enc.enemies||[]).map(function(e){return e.ico;}).join('');
    h+='<div class="rep-floor"><div class="fh">'+(f.boss?'рҹ‘‘ ':'')+'з¬¬ '+f.floor+' еұӨ '+enemies+'</div><div class="fl">';
    if(f.skills&&f.skills.length)h+=f.skills.join('<br>')+'<br>';
    else if(f.event)h+=f.event+'<br>';
    if(f.wipe)h+='<b style="color:var(--hp)">е°ҸйҡҠеңЁжӯӨе…Ёж»…вҖҰ</b>';
    else h+='ж“Ҡж•— '+((enc||{}).killed||0)+' йҡ» гғ» +'+f.gold+'рҹӘҷ гғ» +'+f.xp+'вӯҗ'+((f.loot&&f.loot.length)?' гғ» жҺүиҗҪ '+f.loot.map(function(g){return g.ico+g.nm;}).join(''):'');
    h+='</div>';
    if(enc&&enc.lines&&enc.lines.length){h+='<details style="margin-top:4px"><summary>рҹ“ң и©ізҙ°жҲ°иЁҳ</summary><div class="fl" style="margin-top:4px">'+fmtLog(enc.lines)+'</div></details>';}
    h+='</div>';
  });
  h+='</div></details>';
  h+='<div class="card" style="margin-top:10px"><button class="btn re sm" id="aitale" style="width:auto">рҹ“ң з”ҹжҲҗ AI жҲ°иЁҳпјҲе…ҚиІ»пјү</button>'+
    '<div class="note" id="aitalebox" style="display:none;text-align:left;margin-top:8px;line-height:1.85;color:#f0d6ad;white-space:pre-line"></div></div>';
  h+='<button class="btn gold" id="back" style="margin-top:12px">рҹҸ° еӣһеҲ°еҹҺйҺ®</button></div>';
  app.innerHTML=h;
  document.getElementById('back').onclick=renderTown;
  var at=document.getElementById('aitale');
  if(at)at.onclick=function(){at.disabled=true;at.textContent='вңҚпёҸ еҹ·зӯҶдёӯвҖҰ';var box=document.getElementById('aitalebox');box.style.display='block';box.textContent='вңЁ еҗҹйҒҠи©©дәәжӯЈеңЁз·ЁеҜ«жҲ°иЁҳвҖҰ';
    genBattleTale(rep,function(t){box.textContent=t;if(at)at.remove();});};
}
// е…ҚиІ» AI жҲ°иЁҳпјҲPollinations ж–Үеӯ—пјҢжҢүйңҖз”ҹжҲҗгҖҒи¶…жҷӮз”ЁжЁЎжқҝдҝқеә•пјү
function genBattleTale(rep,cb){
  var names=(P.team.battle||[]).map(function(id){var c=byId(id);return c?c.name:null;}).filter(Boolean).join('гҖҒ')||'дёҖж”ҜеӮӯе…өе°ҸйҡҠ';
  var bosses=(rep.newBosses||[]).length?('пјҢдёҰж“Ҡз ҙз¬¬ '+(rep.newBosses||[]).join('гҖҒ')+' еұӨзҡ„й ӯзӣ®'):'';
  var ending=rep.wiped?'жңҖеҫҢеҠӣз«ӯе…Ёж»…гҖҒиў«жҠ¬еӣһеҹҺиЈЎ':(rep.cleared?'жңҖзөӮеҮұж—ӢжӯёдҫҶ':'иҰӢеҘҪе°ұж”¶гҖҒе®үе…Ёж’ӨйҖҖ');
  var prompt='з”Ёз№Ғй«”дёӯж–ҮеҜ«дёҖж®ө 60~100 еӯ—гҖҒз”ҹеӢ•жңүз•«йқўж„ҹзҡ„еҘҮе№»жҲ°иЁҳпјҢжҸҸиҝ°еӮӯе…өе°ҸйҡҠйҖҷи¶ҹең°дёӢеҹҺзҡ„з¶“жӯ·гҖӮйҡҠе“Ўпјҡ'+names+'гҖӮд»–еҖ‘еҫһз¬¬ '+(rep.start||1)+' еұӨжү“еҲ°з¬¬ '+rep.reached+' еұӨпјҢж“Ҡж•—зҙ„ '+(rep.kills||0)+' йҡ»йӯ”зү©'+bosses+'пјҢ'+ending+'гҖӮеҸӘеӣһеӮіжҲ°иЁҳжң¬ж–ҮпјҢдёҚиҰҒжЁҷйЎҢгҖҒдёҚиҰҒеј•иҷҹгҖҒдёҚиҰҒеӨҡйӨҳиӘӘжҳҺгҖӮ';
  var done=false,timer=setTimeout(function(){if(!done){done=true;cb(taleTemplate(rep,names,ending));}},12000);
  fetch('https://text.pollinations.ai/'+encodeURIComponent(prompt)).then(function(r){return r.text();}).then(function(t){
    if(done)return;done=true;clearTimeout(timer);t=(t||'').trim().replace(/^["гҖҢгҖҺ]+|["гҖҚгҖҸ]+$/g,'').slice(0,320);
    cb(t&&!/error|unable|sorry/i.test(t)?t:taleTemplate(rep,names,ending));
  }).catch(function(){if(done)return;done=true;clearTimeout(timer);cb(taleTemplate(rep,names,ending));});
}
function taleTemplate(rep,names,ending){
  return names+' ж·ұе…Ҙе№Ҫжҡ—зҡ„ең°дёӢеҹҺпјҢдёҖи·Ҝж®әиҮіз¬¬ '+rep.reached+' еұӨпјҢ'+(rep.kills||0)+' йҡ»йӯ”зү©еҖ’еңЁд»–еҖ‘и…ідёӢгҖӮ'+((rep.newBosses||[]).length?'йҖЈзӣӨиёһзҡ„й ӯзӣ®д№ҹйӣЈйҖғдёҖеҠ«гҖӮ':'')+ending+'гҖӮ';
}

// ============ е•ҹеӢ• ============
renderLogin();
</script>
