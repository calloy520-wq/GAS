<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<style>
  :root{
    --bg:#0e1017; --panel:#171c29; --panel2:#1f2536; --card:#232a3d;
    --line:#2c3446; --line2:#3a4459; --text:#e9edf7; --muted:#8b95af;
    --gold:#e8b84b; --blue:#4a90e2; --green:#5fcf80; --pink:#e878a8; --red:#e5675a; --purple:#a986e0;
    --sp:10px; --r:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:
      radial-gradient(1200px 600px at 50% -10%, #1a2133 0%, var(--bg) 60%);
    color:var(--text);font-size:14px;line-height:1.5;overflow-x:hidden;
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;}
  #app{max-width:1080px;margin:0 auto;padding:12px;}
  .muted{color:var(--muted)} .tag{font-size:11px;color:var(--muted)}

  /* Header */
  .hd{display:flex;align-items:center;gap:14px;flex-wrap:wrap;
      background:linear-gradient(180deg,#1c2334,#161b28);border:1px solid var(--line);
      border-radius:var(--r);padding:10px 14px;margin-bottom:10px;box-shadow:0 4px 18px #0006;}
  .hd .logo{font-size:18px;font-weight:800;letter-spacing:3px;}
  .hd .logo small{font-size:11px;font-weight:400;color:var(--muted);letter-spacing:1px;margin-left:6px}
  .kpi{display:flex;flex-direction:column;line-height:1.1}
  .kpi b{font-size:17px} .kpi span{font-size:10px;color:var(--muted);letter-spacing:1px}
  .kpi .g{color:var(--gold)} .kpi .ap{color:var(--green)}
  .turnbar{flex:1;min-width:140px}
  .turnbar .trk{height:8px;background:#0007;border-radius:5px;overflow:hidden;border:1px solid var(--line)}
  .turnbar .trk>i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--gold))}
  .spacer{flex:1}

  /* Buttons */
  .btn{background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:8px;
       padding:7px 12px;font-size:13px;cursor:pointer;transition:.12s;white-space:nowrap;font-family:inherit}
  .btn:hover:not(:disabled){border-color:var(--gold);transform:translateY(-1px)}
  .btn:disabled{opacity:.38;cursor:not-allowed}
  .btn.primary{background:linear-gradient(180deg,#f0c65e,#e0a838);color:#231a00;font-weight:800;border-color:#f0c65e}
  .btn.accent{border-color:var(--pink)} .btn.sm{padding:4px 9px;font-size:12px}
  .btn.on{outline:2px solid var(--gold)}

  /* Panels */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
         padding:12px 14px;margin-bottom:10px;box-shadow:0 2px 10px #0004}
  .ptitle{display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
  .ptitle .i{font-size:16px} .ptitle .sub{font-size:11px;color:var(--muted);font-weight:400}
  .grid{display:grid;gap:8px}
  .g-char{grid-template-columns:repeat(auto-fill,minmax(232px,1fr))}
  .g-fac{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
  .row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}

  /* Banner */
  .banner{text-align:center;font-size:20px;font-weight:800;padding:12px;border-radius:var(--r);margin-bottom:10px}
  .banner.win{background:linear-gradient(180deg,#1f3f2a,#16301f);color:#9af0b0;border:1px solid #2f6b45}
  .banner.lose{background:linear-gradient(180deg,#3f1f22,#301619);color:#f3a0a0;border:1px solid #6b3030}

  /* Map */
  .mapscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r)}
  #mapWrap{position:relative;width:100%;min-width:600px;padding-top:52%;
    background:radial-gradient(700px 380px at 50% 40%,#1c2436 0%,#131826 72%);
    border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  #map{position:absolute;inset:0} #lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .ter{position:absolute;transform:translate(-50%,-50%);min-width:66px;text-align:center;cursor:pointer;
       background:var(--panel2);border:1px solid var(--line2);border-top:3px solid #888;border-radius:9px;
       padding:3px 6px 4px;box-shadow:0 3px 8px #0008;transition:.1s;user-select:none}
  .ter:hover{transform:translate(-50%,-50%) scale(1.07);z-index:5}
  .ter b{display:block;font-size:12px;line-height:1.2}
  .ter .tr{font-size:10.5px;color:#cfd6e6}
  .ter .bld{font-size:9px;letter-spacing:-.5px}
  .ter .gs{display:flex;justify-content:center;gap:1px;margin-top:1px}
  .ter.sel{outline:2px solid var(--gold)} .ter.target{outline:2px dashed #fff}
  .ter .dg{font-size:9px;color:var(--gold)}

  /* Cards */
  .card{background:var(--card);border:1px solid var(--line2);border-radius:10px;padding:9px 10px}
  .card.sel{outline:2px solid var(--gold)} .card.acted{opacity:.5}
  .chead{display:flex;align-items:center;gap:8px}
  .av{border-radius:7px;overflow:hidden;background:#0c0e14;flex:none}
  .nm{font-weight:700;font-size:15px}
  .ulab{font-size:10px;padding:1px 7px;border-radius:10px;color:#0a0d14;font-weight:700}
  .stat{font-size:12px;color:#cfd6e6;margin-top:2px}
  .bar{height:6px;background:#0007;border-radius:4px;overflow:hidden;margin:2px 0}
  .bar>i{display:block;height:100%}
  .loy>i{background:linear-gradient(90deg,#e878a8,#f0a0c0)} .xp>i{background:linear-gradient(90deg,#5fcf80,#a0e0b0)}
  .cg>i{background:linear-gradient(90deg,#e8b84b,#ffd76a)}
  .rdy{color:#231a00;background:linear-gradient(90deg,#f0c65e,#ffd76a);border-radius:8px;padding:0 6px;font-weight:800;font-size:11px}
  .bondtag{color:var(--pink);font-size:11px}
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;
    background:radial-gradient(900px 500px at 50% 0%,#1a2133,#0e1017 70%)}
  .loginbox{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px 26px;width:min(90vw,360px);
    text-align:center;box-shadow:0 12px 40px #000a}
  .loginbox input{width:100%;padding:11px 12px;font-size:15px;border-radius:9px;border:1px solid var(--line2);
    background:var(--panel2);color:var(--text);font-family:inherit}
  .loginbox input:focus{outline:none;border-color:var(--gold)}
  .legend{font-size:10px;font-weight:800;padding:1px 7px;border-radius:10px;color:#3a2a00;background:linear-gradient(90deg,#ffd76a,#ffb84a);box-shadow:0 0 6px rgba(255,200,80,.5)}
  .soul{font-size:12px;color:#cbd3e6;background:#10141e;border:1px dashed var(--line2);border-radius:8px;
        padding:8px;margin-top:7px;line-height:1.55;display:none}
  .soul.show{display:block} .soul b{color:var(--gold)}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:-1px}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;align-items:center}

  /* Actions */
  .cmdgrp{border:1px solid var(--line);border-radius:9px;padding:8px;margin-top:8px;background:#10141e}
  .cmdgrp .lab{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:5px}
  input[type=range]{flex:1;min-width:120px;accent-color:var(--gold)}
  .lvdots{display:inline-flex;gap:2px;margin-left:4px}
  .lvdots i{width:6px;height:6px;border-radius:50%;background:#0009;display:inline-block}
  .lvdots i.on{background:var(--gold)}
  #log{background:#0b0e15;border:1px solid var(--line);border-radius:var(--r);padding:10px 12px;margin-bottom:10px;line-height:1.6;min-height:44px}
  .itemcard{background:var(--card);border:1px solid var(--line2);border-radius:9px;padding:7px 9px;font-size:12px;min-width:150px}
  /* 手機優化 */
  @media (max-width:640px){
    #app{padding:8px}
    .panel{padding:10px 11px}
    .hd{gap:8px;padding:8px 10px}
    .hd .logo{font-size:15px;letter-spacing:1px} .hd .logo small{display:none}
    .kpi b{font-size:15px}
    .turnbar{order:5;flex-basis:100%;min-width:0}
    .grid{gap:7px}
    .ter b{font-size:12.5px} .ter .tr{font-size:11px}
    .mapscroll::after{content:'← 左右滑動看全地圖 →';display:block;text-align:center;color:var(--muted);font-size:11px;padding:4px 0 0}
    .btn{padding:8px 12px}
    #log{font-size:13px}
  }
</style>
</head>
<body>
<div id="login">
  <div class="loginbox">
    <div class="logo" style="font-size:26px">⚔️ 諸國爭霸</div>
    <div class="muted" style="margin:6px 0 14px">輸入暱稱，開始屬於你的征程</div>
    <input id="pname" maxlength="20" placeholder="你的暱稱" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn primary" style="width:100%;margin-top:10px" onclick="doLogin()">進入遊戲 ▶</button>
    <div class="tag" id="loginmsg" style="margin-top:10px"></div>
    <div class="tag" style="margin-top:12px;opacity:.7">同一個暱稱＝同一份存檔；換暱稱＝另一局。進度每步自動存。</div>
  </div>
</div>
<div id="app" style="display:none">
  <div class="hd">
    <div class="logo">⚔️ 諸國爭霸 <small>戰略 SLG · 純 GAS</small></div>
    <div class="turnbar">
      <div class="tag" id="turnlab">回合 - / -</div>
      <div class="trk"><i id="turnfill" style="width:0%"></i></div>
    </div>
    <div class="kpi"><b class="g" id="gold">-</b><span>銀兩</span></div>
    <div class="kpi"><b class="ap" id="ap">-</b><span>行動點</span></div>
    <div class="kpi"><b id="who" style="font-size:14px">-</b><span>玩家</span></div>
    <button class="btn primary" id="btnEnd" onclick="endTurn()">結束回合 ▶</button>
    <button class="btn" onclick="newGame()">重開</button>
    <button class="btn" onclick="logout()">換人</button>
  </div>

  <div id="bannerSlot"></div>
  <div id="log">載入中…</div>

  <div class="panel">
    <div class="ptitle"><span class="i">🗺️</span>戰況地圖<span class="sub" id="mapsub"></span>
      <div class="spacer"></div><div class="legend" id="legend"></div></div>
    <div class="mapscroll"><div id="mapWrap"><svg id="lines"></svg><div id="map"></div></div></div>
    <div class="tag" style="margin-top:7px">圖示：🛡兵力　🏪市場 ⛺兵營 🧱城牆 🗼魔導塔（數字=等級）　🗿迷宮(未通關) ✅已通關　·　點領地上的女將可快速選取</div>
  </div>

  <div class="panel">
    <div class="ptitle"><span class="i">🎴</span>女將<span class="sub">點卡片選取，點「角色卡」看她的靈魂</span></div>
    <div class="grid g-char" id="charList"></div>
  </div>

  <div class="panel">
    <div class="ptitle"><span class="i">🎯</span>指令<span class="sub" id="actHint"></span></div>
    <div id="actBody"></div>
  </div>

  <div class="panel">
    <div class="ptitle"><span class="i">🤝</span>外交<span class="sub">結盟／停戰避免多線作戰；AI 不與獨大者結盟</span></div>
    <div class="grid g-fac" id="diploList"></div>
  </div>

  <div class="panel">
    <div class="ptitle"><span class="i">🗡️</span>寶庫 · 裝備<span class="sub">裝備不耗行動點</span></div>
    <div class="row" id="itemList"></div>
  </div>
</div>

<script>
var VIEW=null, selCharId=null, selTargetId=null, busy=false, openSoul={}, PLAYER='';
var UCOL={infantry:'#9aa7b5',cavalry:'#e8b84b',archer:'#5fcf80',mage:'#a986e0',ninja:'#6f86d6'};

function call(action,params){
  if(busy) return; busy=true;
  var el=document.getElementById('log'); el.style.opacity=.5;
  var lm=document.getElementById('loginmsg');
  google.script.run
    .withSuccessHandler(function(resp){ busy=false; el.style.opacity=1;
      if(!resp||!resp.ok){ var m='⚠️ '+((resp&&resp.message)||'未知錯誤'); el.textContent=m; if(lm&&action==='login')lm.textContent=m; return; }
      VIEW=resp.view;
      document.getElementById('login').style.display='none';
      document.getElementById('app').style.display='block';
      var w=document.getElementById('who'); if(w)w.textContent=PLAYER;
      render(); })
    .withFailureHandler(function(err){ busy=false; el.style.opacity=1;
      var m='❌ 連線錯誤：'+err.message+'（第一次使用請先在 Apps Script 編輯器手動執行一次 initGame）';
      el.textContent=m; if(lm&&action==='login')lm.textContent=m; })
    .handleAction(Object.assign({action:action,player:PLAYER},params||{}));
}
function doLogin(){
  var n=(document.getElementById('pname').value||'').trim();
  if(!n){ document.getElementById('loginmsg').textContent='請輸入暱稱'; return; }
  PLAYER=n; try{localStorage.setItem('gas_player',n);}catch(e){}
  document.getElementById('loginmsg').textContent='登入中…';
  call('login',{});
}
function logout(){
  PLAYER=''; VIEW=null; selCharId=null; selTargetId=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
}
function facOf(id){return (VIEW.factions||[]).filter(function(f){return f.id===id;})[0];}
function terOf(id){return (VIEW.territories||[]).filter(function(t){return t.id===id;})[0];}
function chOf(id){return (VIEW.chars||[]).filter(function(c){return c.id===id;})[0];}
function dunOf(id){return (VIEW.dungeons||[]).filter(function(d){return d.ter===id;})[0];}
function isMine(f){return f===VIEW.playerFactionId;}
function uLabel(u){return VIEW.unitLabel[u]||u;}
function terInc(t){return t.income+(t.market||0)*VIEW.rules.MARKET_INCOME;}
function terMax(t){return t.maxTroops+(t.barracks||0)*VIEW.rules.BARRACKS_MAX;}

// ★★ 立繪烘焙接口（PORTRAITS）★★
//   把「角色 ID → 圖片」填進下面即可換上真立繪（資料 URI 或圖片網址皆可）。
//   之後有 AI 生圖/手繪立繪時，離線做好一套圖，填進這裡就無縫替換；遊戲執行仍然零 AI。
//   留空(預設)則使用下方純 SVG 向量頭像當占位。
//   範例：
//     'C1': 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUg...',
//     'L2': 'https://your-cdn.example/legend_hishizuku.webp',
//   角色 ID：具名女將 C1~C13、路人 R1~R12、傳說 L1~L3（可用「角色卡」或存檔試算表查 ID）。
var PORTRAITS = {
  // 具名女將
  'C1':  'https://i.ibb.co/vvvFyg3y/33ae8ae6c28a.jpg', // 亞瑟莉亞
  'C2':  'https://i.ibb.co/5Xyr2mhR/240a6b750038.jpg', // 莉緹希雅
  'C3':  'https://i.ibb.co/GfcsQGn4/08075adfda3b.jpg', // 卡蜜拉
  'C4':  'https://i.ibb.co/Q3HbD7W1/fde17c78e65d.jpg', // 薇歐拉
  'C5':  'https://i.ibb.co/21L90NhG/e93fd13e2bd7.jpg', // 綾音
  'C6':  'https://i.ibb.co/4np1PjMv/5d1fced29431.jpg', // 雪代
  'C7':  'https://i.ibb.co/kgTJXnqD/8dfb8ee8e696.jpg', // 星奈
  'C8':  'https://i.ibb.co/Z6Nb5LNm/a84c537c755e.jpg', // 澪
  'C9':  'https://i.ibb.co/5WqYCh3J/9a281dffd86b.jpg', // 蕾娜
  'C10': 'https://i.ibb.co/SSBMqyb/fe72c8889672.jpg',  // 蓋兒
  'C11': 'https://i.ibb.co/jkM0sGwc/c7977b22b240.jpg', // 蒂雅娜
  'C12': 'https://i.ibb.co/27G8bG3f/ef080ac1459a.jpg', // 芙蘭
  'C13': 'https://i.ibb.co/vC6CbPGh/31fc78713ae0.jpg', // 巫月
  // 傳說女將
  'L1':  'https://i.ibb.co/dw29k73d/fbe9acce3e81.jpg', // 沙夜
  'L2':  'https://i.ibb.co/5hyv99st/2b046b004162.jpg', // 緋雫
  'L3':  'https://i.ibb.co/cKDP565g/89af46eff556.jpg', // 露娜
  'L4':  'https://i.ibb.co/ycy4Nhq2/ad42166044e2.jpg', // 露卡卡
};

// 向量動漫 Q 版頭像 v2（純 SVG，零 API）。線稿描邊+瀏海投影+呆毛+臥蠶反光；傳說女將(id 以 L 開頭)加金光暈+星芒+寶石王冠。
function pixelAvatar(id, unit, px){
  id=String(id);
  if(PORTRAITS[id]) return '<img src="'+PORTRAITS[id]+'" width="'+px+'" height="'+px+'" alt="" loading="lazy" style="display:block;object-fit:cover;object-position:center top;border-radius:8px;background:#0c0e14"/>'; // 有立繪就用立繪(從上緣裁切，露臉)
  var h=0,i; for(i=0;i<id.length;i++) h=(h*131+id.charCodeAt(i))>>>0;
  function rnd(n){ h=(h*1103515245+12345)>>>0; return Math.floor(h/65536)%n; }
  var uid='av'+(h%997);
  var HAIR=[['#7a5236','#9c6f4a','#5a3a22'],['#33303e','#4a4658','#201e2a'],['#e6c260','#f4dc8e','#c89a34'],
    ['#e88fb4','#f6b6cf','#c96a92'],['#5a7fc0','#84a3d8','#3d5c98'],['#8f6fc0','#b393d8','#6a4c98'],
    ['#cf5f56','#e58079','#9c3d38'],['#4fa398','#78c3b8','#357a70'],['#dfe2ea','#f4f6fa','#bcc0cc'],['#e0894a','#f2ad74','#b8642c']];
  var EYE=['#8a5cc0','#4a86d0','#4fa35f','#d05a6a','#d0a040','#5a5468','#c8623a','#3aa0a0'];
  var SKIN=[['#ffe1c6','#f3c6a2'],['#ffd8b6','#efbf98'],['#f6cfa4','#e3b184']];
  var hair=HAIR[rnd(HAIR.length)], eye=EYE[rnd(EYE.length)], skin=SKIN[rnd(SKIN.length)];
  var side=rnd(4), bangs=rnd(3), expr=rnd(5), mouth=rnd(3), acc=rnd(6), part=(rnd(3)-1)*4, BL=[60,74,90][rnd(3)];
  var ahoge=rnd(3)===0;
  var legend=id.charAt(0)==='L'; // 傳說女將：華麗特效
  function shift(hex,a){var s=hex.replace('#','');var n=parseInt(s,16);var r=Math.max(0,Math.min(255,((n>>16)&255)+a));var g=Math.max(0,Math.min(255,((n>>8)&255)+a));var b=Math.max(0,Math.min(255,(n&255)+a));return 'rgb('+r+','+g+','+b+')';}
  var ol=shift(hair[2],-22); // 髮線稿描邊色
  function blob(cx,cy,rx,ry,c){return '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="'+c+'" stroke="'+ol+'" stroke-width="1"/>';}
  function eyeSVG(ex,ey,sideLR){
    var closed=(expr===3)||(expr===4&&sideLR==='R');
    if(closed) return '<path d="M'+(ex-8)+','+(ey+1)+' Q'+ex+','+(ey-8)+' '+(ex+8)+','+(ey+1)+'" stroke="#3a3040" stroke-width="2.4" fill="none" stroke-linecap="round"/>';
    var ry=(expr===2)?11:9.5;var s='';
    s+='<ellipse cx="'+ex+'" cy="'+ey+'" rx="8" ry="'+ry+'" fill="#fff"/>';
    s+='<ellipse cx="'+ex+'" cy="'+(ey+1)+'" rx="6.2" ry="'+(ry-1.5)+'" fill="url(#'+uid+'i)"/>';
    s+='<ellipse cx="'+ex+'" cy="'+(ey+3)+'" rx="6.2" ry="3" fill="'+shift(eye,-10)+'" opacity="0.6"/>';
    s+='<ellipse cx="'+ex+'" cy="'+(ey+2)+'" rx="3" ry="'+(ry-4)+'" fill="#2a2530"/>';
    s+='<circle cx="'+(ex-2.4)+'" cy="'+(ey-3.5)+'" r="2.8" fill="#fff"/>';
    s+='<circle cx="'+(ex+2.2)+'" cy="'+(ey+3)+'" r="1.5" fill="#fff" opacity="0.9"/>';
    // 上眼線+睫毛
    s+='<path d="M'+(ex-8.6)+','+(ey-3)+' Q'+ex+','+(ey-12)+' '+(ex+8.6)+','+(ey-3)+'" stroke="#2a2530" stroke-width="2.8" fill="none" stroke-linecap="round"/>';
    s+='<path d="M'+(ex+7)+','+(ey-5)+' l3.4,-2.2" stroke="#2a2530" stroke-width="1.7" stroke-linecap="round"/>';
    // 臥蠶反光
    s+='<path d="M'+(ex-5)+','+(ey+ry-1.5)+' Q'+ex+','+(ey+ry+1.5)+' '+(ex+5)+','+(ey+ry-1.5)+'" stroke="#fff" stroke-width="1" fill="none" opacity="0.45"/>';
    return s;

function render(){
  var pf=facOf(VIEW.playerFactionId);
  document.getElementById('gold').textContent=pf?pf.gold:'-';
  document.getElementById('ap').textContent=VIEW.ap;
  document.getElementById('turnlab').textContent='回合 '+VIEW.turn+' / '+VIEW.turnLimit;
  document.getElementById('turnfill').style.width=Math.min(100,VIEW.turn/VIEW.turnLimit*100)+'%';
  document.getElementById('log').textContent=VIEW.log||'';

  document.getElementById('mapsub').textContent='　'+cities+' 城 · '+mine+' 女將';

function renderLegend(){
  document.getElementById('legend').innerHTML=(VIEW.factions||[]).filter(function(f){return f.id!=='F0';})
    .map(function(f){return '<span><span class="dot" style="background:'+f.color+'"></span>'+f.name+'</span>';}).join('')
    +'<span><span class="dot" style="background:#9e9e9e"></span>中立</span>';
}
function renderBanner(){
  var s=document.getElementById('bannerSlot');var w=VIEW.winner;
  if(w==='WIN')s.innerHTML='<div class="banner win">🎉 天下一統，霸業已成！</div>';
  else if(w==='TIMEUP_A')s.innerHTML='<div class="banner win">🏯 時限已至 — 群雄之首，一方霸主！</div>';
  else if(w==='TIMEUP_B')s.innerHTML='<div class="banner lose">🏳️ 時限已至 — 割據求存，未能問鼎天下</div>';

function renderMap(){
  var map=document.getElementById('map'),svg=document.getElementById('lines');map.innerHTML='';
  var seen={},lines='';
  (VIEW.territories||[]).forEach(function(t){(t.adj||[]).forEach(function(nid){
    var k=[t.id,nid].sort().join('-');if(seen[k])return;seen[k]=1;var n=terOf(nid);if(!n)return;
    lines+='<line x1="'+t.x+'%" y1="'+t.y+'%" x2="'+n.x+'%" y2="'+n.y+'%" stroke="#2c3446" stroke-width="2"/>';
  });});svg.innerHTML=lines;
  (VIEW.territories||[]).forEach(function(t){
    var f=facOf(t.owner)||{color:'#888'};
    var gens=(VIEW.chars||[]).filter(function(c){return c.loc===t.id;});
    var gs=gens.length?'<div class="gs">'+gens.slice(0,3).map(function(g){return pixelAvatar(g.id,g.unit,16);}).join('')+'</div>':'';
    var bld='';['market','barracks','wall','tower'].forEach(function(b){if(t[b])bld+=VIEW.buildTypes[b].icon+t[b]+' ';});
    var bldm=bld?'<div class="bld">'+bld+'</div>':'';
    var dg=dunOf(t.id);var dgm=dg?'<div class="dg">'+(dg.cleared?'✅':'🗿'+dg.progress+'/'+dg.floors)+'</div>':'';
    var el=document.createElement('div');
    el.className='ter'+(selTargetId===t.id?' target':'')+(selCharId&&chOf(selCharId)&&chOf(selCharId).loc===t.id?' sel':'');
    el.style.left=t.x+'%';el.style.top=t.y+'%';el.style.borderTopColor=f.color;
    el.style.background='linear-gradient(180deg,'+hexA(f.color,.18)+',var(--panel2))';
    el.innerHTML='<b>'+t.name+'</b><div class="tr">🛡'+t.troops+'</div>'+bldm+dgm+gs;
    el.onclick=function(){onTerritoryClick(t.id);};map.appendChild(el);

}
function hexA(hex,a){var h=hex.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];

function renderActions(){
  var body=document.getElementById('actBody'),hint=document.getElementById('actHint');
  if(!selCharId){body.innerHTML='<div class="muted">先選一位女將；攻擊／移動需再點地圖上的目標領地。</div>';hint.textContent='';return;}
  var c=chOf(selCharId);if(!c){selCharId=null;body.innerHTML='';return;}
  var here=terOf(c.loc),pf=facOf(VIEW.playerFactionId),tgt=terOf(selTargetId),onOwn=here&&here.owner===pf.id;
  hint.innerHTML='';
  var head='<div class="chead" style="margin-bottom:6px"><div class="av">'+pixelAvatar(c.id,c.unit,36)+'</div>'+
    '<div><div><span class="nm">'+c.name+'</span> <span class="ulab" style="background:'+UCOL[c.unit]+'">'+uLabel(c.unit)+'</span></div>'+
    '<div class="stat">駐 '+(here?here.name:'在野')+(here?'（守軍 '+here.troops+'）':'')+' · 行動點剩 '+VIEW.ap+
      (c.charge>=VIEW.chargeMax?' · <span class="rdy">⚡必殺就緒</span>':' · 蓄力'+c.charge+'/'+VIEW.chargeMax)+'</div></div></div>';

  if(c.acted){ body.innerHTML=head+'<div class="muted">此女將本回合已行動。</div>'+talkGrp(c); return; }
  if(VIEW.ap<=0){ body.innerHTML=head+'<div class="muted">行動點用盡，請結束回合。</div>'; return; }

  var maxM=here?here.troops:0,def=Math.max(1,Math.floor(maxM*0.7));
  var rel=tgt&&VIEW.relations[tgt.owner]?VIEW.relations[tgt.owner].status:'war';
  var blocked=(rel==='ally'||rel==='ceasefire');
  var canAtk=tgt&&here&&here.adj.indexOf(tgt.id)>=0&&tgt.owner!==pf.id&&!blocked;
  var canMove=tgt&&here&&here.adj.indexOf(tgt.id)>=0&&tgt.owner===pf.id;

  // 軍事
  // 出戰部隊預覽：主將 + 同城未行動女將（上限 MAX_PARTY）
  var party=[c];
  if(here){(VIEW.chars||[]).forEach(function(o){ if(party.length>=VIEW.rules.MAX_PARTY)return;
    if(isMine(o.owner)&&o.loc===here.id&&!o.acted&&o.id!==c.id) party.push(o); });}
  var partyStr = party.length>1 ? '　🛡️出戰部隊：'+party.map(function(g){return g.name+(g.charge>=VIEW.chargeMax?'⚡':'');}).join('＋') : '　（單將出戰，同城可組副將）';

  var mil='<div class="cmdgrp"><div class="lab">⚔️ 軍事'+partyStr+'</div>'+
    '<div class="row" style="margin-bottom:6px">出征兵力 <input type="range" id="march" min="1" max="'+Math.max(1,maxM)+'" value="'+def+'" oninput="document.getElementById(\'mv\').textContent=this.value"><b id="mv">'+def+'</b></div>'+
    '<div class="tag" style="margin-bottom:6px">目標：'+(tgt?('<b>'+tgt.name+'</b>'+(blocked?'（'+(rel==='ally'?'盟友':'停戰中')+'，需先毀約）':'')):'（點地圖選一格）')+'　'+advHint(c,tgt)+'</div>'+
    '<div class="row">'+
      '<button class="btn primary" onclick="doAttack()"'+(canAtk?'':' disabled')+'>⚔️ 進攻'+(canAtk?' → '+tgt.name:'')+'</button>'+
      '<button class="btn" onclick="doMove()"'+(canMove?'':' disabled')+'>🐎 移動'+(canMove?' → '+tgt.name:'')+'</button>'+
      '<button class="btn" onclick="call(\'recruit\',{charId:selCharId})"'+(onOwn&&pf.gold>=VIEW.rules.RECRUIT_COST_PER_TROOP?'':' disabled')+'>🪖 徵兵</button>'+
      '<button class="btn accent" onclick="call(\'search\',{charId:selCharId})"'+(onOwn&&pf.gold>=VIEW.rules.SEARCH_COST_GOLD?'':' disabled')+'>🔍 搜索('+VIEW.rules.SEARCH_COST_GOLD+')</button>'+
      dgBtn(here,onOwn)+
    '</div></div>';

  // 內政
  var pol='';
  if(onOwn){
    pol='<div class="cmdgrp"><div class="lab">🏛️ 內政建設（'+here.name+'）</div><div class="row">'+
      VIEW.buildKeys.map(function(b){
        var bt=VIEW.buildTypes[b],lv=here[b]||0,cost=VIEW.rules.BUILD_BASE_COST*(lv+1),mx=lv>=VIEW.rules.BUILD_MAX_LEVEL;
        return '<button class="btn" onclick="call(\'build\',{charId:selCharId,building:\''+b+'\'})"'+((mx||pf.gold<cost)?' disabled':'')+' title="'+bt.desc+'">'+
          bt.icon+bt.name+lvDots(lv)+(mx?' MAX':' '+cost)+'</button>';
      }).join('')+
      '</div><div class="tag" style="margin-top:5px">收入 '+terInc(here)+' · 兵力上限 '+terMax(here)+' · 城牆Lv'+(here.wall||0)+' · 塔Lv'+(here.tower||0)+'</div></div>';
  }
  body.innerHTML=head+mil+pol+talkGrp(c);
}

function renderDiplo(){
  var pf=facOf(VIEW.playerFactionId);
  document.getElementById('diploList').innerHTML=(VIEW.factions||[]).filter(function(f){return f.id!=='F0'&&!f.isPlayer;}).map(function(f){
    var rel=VIEW.relations[f.id]||{status:'war',expire:0};
    var terr=(VIEW.territories||[]).filter(function(t){return t.owner===f.id;}).length;
    var st,col;
    if(!f.alive){st='已滅亡';col='var(--muted)';}

    else{st='⚔️ 戰爭';col='var(--red)';}
    var ab=VIEW.abilities[f.ability]||{},btns='';
    if(f.alive&&!VIEW.winner){
      if(rel.status!=='ally')btns+='<button class="btn sm" onclick="call(\'ally\',{factionId:\''+f.id+'\'})"'+(pf.gold<VIEW.rules.ALLY_COST?' disabled':'')+'>結盟('+VIEW.rules.ALLY_COST+')</button> ';
      if(rel.status==='war')btns+='<button class="btn sm" onclick="call(\'ceasefire\',{factionId:\''+f.id+'\'})"'+(pf.gold<VIEW.rules.CEASEFIRE_COST?' disabled':'')+'>停戰('+VIEW.rules.CEASEFIRE_COST+')</button> ';
      if(rel.status!=='war')btns+='<button class="btn sm accent" onclick="if(confirm(\'確定毀約開戰？\'))call(\'break_pact\',{factionId:\''+f.id+'\'})">毀約</button>';
    }
    return '<div class="card"><div><span class="dot" style="background:'+f.color+'"></span><b>'+f.name+'</b> <span class="tag">'+terr+'城</span></div>'+
      '<div style="color:'+col+';font-weight:700;margin:3px 0">'+st+'</div>'+
      '<div class="tag">特色：'+(ab.name||'—')+'（'+(ab.desc||'')+'）</div>'+
      '<div style="margin-top:6px">'+(btns||'<span class="tag">—</span>')+'</div></div>';
  }).join('');
}
function renderItems(){
  document.getElementById('itemList').innerHTML=(VIEW.items||[]).map(function(i){
    var holder=i.owner?chOf(i.owner):null,owned=holder&&isMine(holder.owner);
    var b=[];if(i.war)b.push('武+'+i.war);if(i.lead)b.push('統+'+i.lead);if(i.int)b.push('智+'+i.int);
    var status=holder?(owned?('裝備於 '+holder.name):('（'+(facOf(holder.owner)||{}).name+'持有）')):'寶庫';
    var btn='';
    if(!holder||owned){ if(holder)btn='<button class="btn sm" onclick="call(\'unequip\',{itemId:\''+i.id+'\'})">卸下</button>';
      else if(selCharId)btn='<button class="btn sm" onclick="call(\'equip\',{charId:selCharId,itemId:\''+i.id+'\'})">裝備給'+(chOf(selCharId)||{}).name+'</button>';}
    return '<div class="itemcard"><b>'+i.name+'</b> <span class="tag">'+b.join(' ')+'</span><br><span class="tag">'+i.desc+' · '+status+'</span><br>'+btn+'</div>';
  }).join('');
}

function toggleSoul(id){openSoul[id]=!openSoul[id];renderChars();}
function selectChar(id){selCharId=id;selTargetId=null;render();}
function onTerritoryClick(id){
  if(!selCharId){var g=(VIEW.chars||[]).filter(function(c){return c.loc===id&&isMine(c.owner)&&!c.acted;})[0];if(g)selectChar(g.id);return;}
  selTargetId=(selTargetId===id?null:id);render();
}
function doAttack(){if(!selCharId||!selTargetId)return;var m=document.getElementById('march');var march=m?parseInt(m.value,10):0;var t=selTargetId;selTargetId=null;call('attack',{charId:selCharId,targetId:t,marchTroops:march});}
function doMove(){if(!selCharId||!selTargetId)return;var t=selTargetId;selTargetId=null;call('move',{charId:selCharId,targetId:t});}
function endTurn(){selCharId=null;selTargetId=null;call('end_turn');}
function newGame(){if(!confirm('確定重開新局？現有進度將重置。'))return;selCharId=null;selTargetId=null;openSoul={};call('new_game');}

// 啟動：顯示登入頁，帶回上次的暱稱
(function(){ try{ var s=localStorage.getItem('gas_player'); if(s) document.getElementById('pname').value=s; }catch(e){}
  document.getElementById('pname').focus(); })();
</script>
</body>
</html>
