<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<base target="_top">
<style>
  :root{--ink:#f0e9dc;--soft:#b6a892;--gold:#f4c34e;--gold-d:#c8971f;--line:#5a4a35;
    --panel:#33291f;--panel2:#3d3125;--good:#7cc36a;--good-d:#4f9e42;--hp:#e5556a;
    --t1:#3a3357;--t2:#6d5a6e;--d-bg:#15111c;--d-panel:#2f273f;--d-line:#43385a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{color:var(--ink);font-family:"Baloo 2","Segoe UI Rounded","Hiragino Maru Gothic ProN","Noto Sans TC",system-ui,sans-serif;
    background:linear-gradient(180deg,var(--t1),var(--t2) 45%,#2a211a);min-height:100dvh}
  #app{max-width:520px;margin:0 auto;min-height:100dvh;position:relative;background:linear-gradient(180deg,var(--t1),var(--t2) 45%,#2a211a)}
  /* 電腦寬螢幕：兩側不再空蕩，做成置中「遊戲機台」框 */
  @media(min-width:760px){
    body{background:radial-gradient(120% 90% at 50% -10%,#4a3a63 0%,#241c2e 55%,#160f18 100%)}
    body::before{content:'🏰　⚔️　🛡️　🗡️　🍺　🏹　✨　🐉';position:fixed;inset:0;z-index:0;
      font-size:70px;line-height:2.4;letter-spacing:34px;color:#fff;opacity:.035;overflow:hidden;
      word-break:break-word;padding:20px;pointer-events:none;user-select:none}
    #app{box-shadow:0 0 0 1px var(--line),0 18px 60px rgba(0,0,0,.55);border-radius:16px;
      margin:16px auto;min-height:calc(100dvh - 32px);overflow:hidden;position:relative;z-index:1}
    .bar{border-radius:16px 16px 0 0}
    /* 桌機把彈窗改成置中卡片，不再貼底 */
    .modal{align-items:center}
    .sheet{max-width:600px;border-radius:20px;max-height:88dvh}
  }
  /* 更大螢幕：整個機台放大、設施多欄（用 #app 提高優先序，壓過後面的基礎規則）*/
  @media(min-width:1000px){
    #app{max-width:1120px}
    #app .pad{padding:18px 20px 90px}
    #app .signs{grid-template-columns:repeat(3,1fr)}
    #app .scene{height:240px}
    #app h1{font-size:26px}
    #app .townwrap{display:flex;align-items:flex-start}
    #app .townmain{flex:1;min-width:0}
    #app .aside{display:block}
  }
  .townwrap{display:block}
  .aside{display:none;width:300px;flex:none;border-left:1px solid var(--line);padding:14px 12px;background:rgba(20,16,12,.35)}
  .aside .ah{font-size:11px;color:var(--soft);font-weight:800;letter-spacing:1px;margin:12px 2px 6px}
  .aside .ai{font-size:12px;color:var(--ink);background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:6px 8px;margin-bottom:5px}
  .aside .ai small{color:var(--soft)}
  h1{font-size:22px;text-align:center;margin:6px 0 2px}
  .lead{text-align:center;color:#f0d6ad;font-size:12.5px;margin:0 0 12px;opacity:.9}
  .pad{padding:14px 12px 30px}

  .bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;padding:9px 12px;
    background:rgba(20,16,12,.72);backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
  .bar .t{font-weight:800;font-size:15px} .bar .t small{color:var(--soft);font-weight:600;font-size:11px}
  .spacer{flex:1}
  .pill{display:flex;align-items:center;gap:4px;background:#1c1712;border:1px solid var(--line);
    border-radius:11px;padding:4px 9px;font-weight:800;font-variant-numeric:tabular-nums;font-size:13px}

  input,select{font-family:inherit}
  .inp{width:100%;padding:12px;border-radius:11px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:15px}
  .inp:focus{outline:none;border-color:var(--gold)}

  .btn{border:none;border-radius:13px;padding:13px;font-weight:800;font-size:15px;color:#fff;cursor:pointer;font-family:inherit;
    box-shadow:0 4px 0 rgba(0,0,0,.35);width:100%}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.35)}
  .btn.gold{background:linear-gradient(180deg,var(--gold),var(--gold-d));color:#3a2600}
  .btn.ok{background:linear-gradient(180deg,var(--good),var(--good-d))}
  .btn.re{background:linear-gradient(180deg,#8a6fd0,#6a4cae)}
  .btn.dim{background:#4a3b2a} .btn[disabled]{opacity:.45}
  .btn.sm{padding:9px 12px;font-size:13px;width:auto;box-shadow:0 3px 0 rgba(0,0,0,.35)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
  .glab{font-size:11px;color:var(--soft);font-weight:700;letter-spacing:1px;margin:0 2px 7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:7px 11px;font-size:13px;font-weight:700;cursor:pointer}
  .chip.on{background:linear-gradient(180deg,#f4c34e,#d09a1f);color:#3a2600;border-color:#f4c34e}
  .chip:active{transform:scale(.96)}

  .abil{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
  .ab{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:7px 4px;text-align:center}
  .ab b{font-size:17px;display:block} .ab .mm{color:var(--soft);font-size:11px} .ab small{color:var(--soft);font-size:10.5px}

  .pbox{width:min(56vw,220px);aspect-ratio:1/1;margin:0 auto;border-radius:16px;overflow:hidden;position:relative;
    border:3px solid var(--gold-d);background:#2a2118;box-shadow:0 8px 22px rgba(0,0,0,.4)}
  .pbox img{width:100%;height:100%;object-fit:cover;display:block}
  .pbox .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;
    color:#ffe0a8;font-size:13px;text-align:center;font-weight:700}
  .ring{width:32px;height:32px;border:4px solid #ffffff33;border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .bldg{position:relative;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
    border-radius:15px;padding:12px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.28)}
  .bldg:active{transform:translateY(2px)}
  .bldg .ico{font-size:30px} .bldg .nm{font-weight:800;font-size:15px;margin-top:4px} .bldg .ds{color:var(--soft);font-size:11px;margin-top:1px}
  .bldg.wide{grid-column:1/3;background:linear-gradient(180deg,#4a2c3a,#331c26);border-color:#7a3c52}
  .badge{position:absolute;top:8px;right:8px;background:var(--hp);color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:9px}

  /* 主城場景（手繪打底＋AI 背景疊加） */
  .scene{position:relative;height:178px;overflow:hidden;border-bottom:2px solid var(--gold-d);
    background:linear-gradient(180deg,#332e52 0%,#6d5a6e 46%,#c77b43 82%,#eaa659 100%)}
  .scene .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .9s ease}
  .scene .bg.on{opacity:1}
  .scene .sun{position:absolute;left:50%;top:33%;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:50%;
    background:radial-gradient(circle,#fff1c9,#f6b45a 72%);box-shadow:0 0 46px 14px rgba(246,170,80,.5)}
  .scene .star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.75}
  .scene .sil{position:absolute;left:0;right:0;bottom:0;text-align:center;font-size:46px;line-height:1;letter-spacing:-4px;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.4));opacity:.95}
  .scene .title{position:absolute;left:0;right:0;bottom:10px;text-align:center;color:#fff;z-index:3;
    font-weight:800;font-size:20px;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.75)}
  .scene .title small{display:block;font-size:11px;font-weight:600;color:#ffe6c0;letter-spacing:1px;opacity:.92;text-shadow:0 1px 4px rgba(0,0,0,.7)}

  /* 招牌式建築 */
  .signs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .sign{position:relative;background:linear-gradient(180deg,#8a5a34,#5e3a21);border:2px solid #3f2814;border-radius:13px;
    padding:12px 10px 13px;cursor:pointer;text-align:center;box-shadow:0 5px 0 #3a2413, inset 0 1px 0 rgba(255,220,170,.22)}
  .sign:active{transform:translateY(2px);box-shadow:0 3px 0 #3a2413, inset 0 1px 0 rgba(255,220,170,.22)}
  .sign::before,.sign::after{content:'';position:absolute;top:-7px;width:2px;height:7px;background:#3f2814}
  .sign::before{left:24px}.sign::after{right:24px}
  .sign .ico{font-size:29px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.45))}
  .sign .nm{font-weight:800;font-size:15px;margin-top:3px;color:#ffe9c9}
  .sign .ds{color:#e7c6a0;font-size:10.5px;margin-top:1px}
  .sign .badge{background:var(--hp)}
  .sign.gate{grid-column:1/-1;background:linear-gradient(180deg,#5a2f3f,#361c26);border-color:#7a3c52;box-shadow:0 5px 0 #2a1620}
  .sign.gate .nm{color:#ffd0dd}
  .sign.sea{grid-column:1/-1;background:linear-gradient(180deg,#1f5478,#123249);border-color:#2e6a94}
  .sign.sea .nm{color:#bfe4ff}
  /* 底部分頁快捷列 */
  .tabbar{position:sticky;bottom:0;z-index:15;display:flex;gap:2px;padding:6px 6px calc(6px + env(safe-area-inset-bottom));
    background:rgba(20,16,12,.82);backdrop-filter:blur(6px);border-top:1px solid var(--line);margin:0 -12px -30px}
  .tabbar .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 2px;border-radius:10px;cursor:pointer;color:var(--soft);font-size:10px;font-weight:700}
  .tabbar .tab .ti{font-size:20px}
  .tabbar .tab:active{transform:scale(.94)}
  @media(min-width:1000px){.tabbar{margin:0 -20px -90px;padding:9px 12px}.tabbar .tab{font-size:12px}.tabbar .tab .ti{font-size:24px}}
  .omap{position:relative;width:100%;aspect-ratio:1/1.02;border-radius:16px;overflow:hidden;border:2px solid #2a4a6a;
    background:radial-gradient(120% 90% at 28% 18%,#356690,#173753 58%,#0e2438);box-shadow:inset 0 0 46px rgba(0,0,0,.55)}
  .omap .wv{position:absolute;inset:0;opacity:.12;background-image:repeating-linear-gradient(30deg,#fff 0 1px,transparent 1px 22px);animation:omwave 9s linear infinite}
  @keyframes omwave{from{background-position:0 0}to{background-position:44px 0}}
  .omap .wv2{position:absolute;inset:0;opacity:.06;background-image:repeating-linear-gradient(-24deg,#fff 0 1px,transparent 1px 30px);animation:omwave 14s linear infinite reverse}
  .oland{position:absolute;transform:translate(-50%,-50%);border-radius:48% 52% 55% 45%;background:radial-gradient(closest-side,rgba(94,116,74,.55),rgba(70,92,58,.3) 62%,transparent);filter:blur(2px);z-index:1;pointer-events:none}
  .olanes{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;overflow:visible}
  .olanes line{stroke:rgba(255,240,200,.28);stroke-width:.45;stroke-dasharray:1.6 1.8}
  .olanes text{fill:rgba(255,240,200,.6);font-size:2.7px;font-weight:800;paint-order:stroke;stroke:rgba(0,0,0,.5);stroke-width:.5}
  .ocompass{position:absolute;right:9px;top:9px;width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(244,195,78,.55);background:radial-gradient(closest-side,rgba(0,0,0,.35),rgba(0,0,0,.15));display:flex;align-items:center;justify-content:center;z-index:4;box-shadow:0 2px 8px rgba(0,0,0,.4)}
  .ocompass b{font-size:20px;filter:drop-shadow(0 1px 2px #000)}
  .ocompass i{position:absolute;font-size:7px;font-weight:900;color:#f4c34e;font-style:normal;text-shadow:0 1px 2px #000}
  .ocompass .cn{top:1px}.ocompass .cs{bottom:1px}.ocompass .ce{right:2px}.ocompass .cw{left:2px}
  .oport{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;cursor:pointer;width:74px;z-index:4}
  .oport .pin{font-size:28px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.65))}
  .oport .pn{font-size:10px;font-weight:800;color:#fff;text-shadow:0 1px 3px #000;white-space:nowrap;background:rgba(0,0,0,.45);padding:0 5px;border-radius:6px;margin-top:1px}
  .oport .prod{font-size:9px;margin-top:2px;background:rgba(0,0,0,.4);border-radius:6px;padding:0 4px;white-space:nowrap}
  .oport.here .pin{filter:drop-shadow(0 0 7px #f4c34e) drop-shadow(0 0 2px #f4c34e);animation:ompulse 1.8s ease-in-out infinite}
  @keyframes ompulse{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
  .oport.here .pn{background:#c8971f;color:#3a2600}
  .oport.held .pin{filter:drop-shadow(0 0 6px #e0483a) drop-shadow(0 0 2px #e0483a)}
  .oport.held .pn{background:#a8331f;color:#fff}
  .oship{position:absolute;font-size:23px;filter:drop-shadow(0 2px 3px #000);pointer-events:none;z-index:5;animation:ombob 3.2s ease-in-out infinite}
  @keyframes ombob{0%,100%{transform:translate(-50%,-150%) rotate(-4deg)}50%{transform:translate(-50%,-166%) rotate(4deg)}}

  /* ── 陸地region map（城鎮周邊） ── */
  .lmap{position:relative;width:100%;aspect-ratio:1/1.02;border-radius:16px;overflow:hidden;border:2px solid #5a4326;
    background:radial-gradient(120% 100% at 42% 30%,#8ea865,#6f8a4c 40%,#556b3b 62%,#3f5230 100%);box-shadow:inset 0 0 46px rgba(20,30,10,.5)}
  .lmap .lgrid{position:absolute;inset:0;opacity:.08;background-image:repeating-linear-gradient(0deg,#000 0 1px,transparent 1px 26px),repeating-linear-gradient(90deg,#000 0 1px,transparent 1px 26px);pointer-events:none}
  .lmap .lsea{position:absolute;left:0;bottom:0;width:100%;height:26%;z-index:1;pointer-events:none;
    background:linear-gradient(180deg,transparent,rgba(30,80,120,.35) 34%,rgba(24,72,110,.72));border-top:2px dashed rgba(210,235,255,.35)}
  .lmap .lsea .lwv{position:absolute;inset:0;opacity:.16;background-image:repeating-linear-gradient(24deg,#fff 0 1px,transparent 1px 20px);animation:omwave 10s linear infinite}
  .lmap .lforest{position:absolute;top:0;left:0;width:44%;height:40%;z-index:1;pointer-events:none;opacity:.5;
    background:radial-gradient(closest-side,rgba(40,74,38,.9),transparent 72%)}
  .lmap .lmtn{position:absolute;top:0;right:0;width:46%;height:34%;z-index:1;pointer-events:none;opacity:.55;
    background:radial-gradient(closest-side at 70% 30%,rgba(96,88,80,.9),transparent 70%)}
  .lroads{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;overflow:visible}
  .lroads path{fill:none;stroke:rgba(90,66,38,.55);stroke-width:2.4;stroke-linecap:round}
  .lroads .lr2{stroke:rgba(120,92,54,.4);stroke-width:1.4;stroke-dasharray:2 2.4}
  .lspot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;cursor:pointer;width:80px;z-index:4}
  .lspot .pin{font-size:27px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.6))}
  .lspot .pn{font-size:10px;font-weight:800;color:#fff;text-shadow:0 1px 3px #000;white-space:nowrap;background:rgba(50,36,18,.6);padding:0 6px;border-radius:6px;margin-top:1px}
  .lspot .pd{font-size:8.5px;margin-top:1px;color:#ffe9bf;background:rgba(0,0,0,.4);border-radius:6px;padding:0 4px;white-space:nowrap}
  .lspot:active{transform:translate(-50%,-50%) scale(.93)}
  .lspot.lock{opacity:.5;cursor:default;filter:grayscale(.6)}
  .lspot.main .pin{filter:drop-shadow(0 0 8px #f4c34e) drop-shadow(0 0 2px #f4c34e)}
  .lspot.main .pn{background:#c8971f;color:#3a2600}
  .lscene{position:absolute;pointer-events:none;font-size:19px;z-index:1;opacity:.72;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
  .lbanner{position:absolute;left:8px;top:8px;z-index:5;background:rgba(50,36,18,.6);color:#ffe9bf;font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:8px;border:1px solid rgba(244,195,78,.4)}

  /* ── 約會 / 副手對話窗 ── */
  .date{display:flex;flex-direction:column;height:100dvh;background:radial-gradient(130% 80% at 50% 0%,#3a2c46,#241a2e 55%,#181019);transition:background .5s}
  .date[data-scene=port]{background:radial-gradient(130% 80% at 50% 0%,#6a5330,#3f3320 52%,#241a10)}
  .date[data-scene=deck]{background:radial-gradient(130% 80% at 50% 0%,#2f5a7a,#173753 52%,#0c1e30)}
  .date[data-scene=night]{background:radial-gradient(130% 90% at 50% -10%,#2b2458,#141234 52%,#080614)}
  .dchip.on{background:linear-gradient(180deg,#f4c34e,#c8971f);border-color:#f4c34e;color:#3a2600}
  .dhead{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);background:rgba(20,14,26,.6);backdrop-filter:blur(6px)}
  .dhead .dav{width:42px;height:42px;border-radius:12px;overflow:hidden;background:#241d14;flex:none;display:flex;align-items:center;justify-content:center;font-size:22px}
  .dhead .dav img{width:100%;height:100%;object-fit:cover;display:block}
  .dhead .di{flex:1;min-width:0}.dhead .di b{font-size:15px}.dhead .di small{display:block;color:#ffb8d8;font-size:11px}
  .dhead .dback{background:#0005;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:6px 10px;font-size:13px;font-weight:700;cursor:pointer}
  .dlog{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:9px}
  .dbub{max-width:80%;padding:8px 12px;border-radius:15px;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word;box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .dbub.her{align-self:flex-start;background:linear-gradient(180deg,#463a5e,#3a2f50);color:#f2e9ff;border-bottom-left-radius:5px}
  .dbub.me{align-self:flex-end;background:linear-gradient(180deg,#f4c34e,#d7a52a);color:#3a2600;border-bottom-right-radius:5px}
  .dbub.sys{align-self:center;background:rgba(0,0,0,.35);color:var(--soft);font-size:11px;border-radius:10px;text-align:center}
  .dnm{font-size:10px;color:#c8a8e0;margin:2px 0 -3px 5px}
  .dtyping{align-self:flex-start;background:#3a2f50;color:#c8a8e0;padding:8px 14px;border-radius:15px;font-size:14px;letter-spacing:2px;animation:dpulse 1.1s ease-in-out infinite}
  @keyframes dpulse{0%,100%{opacity:.5}50%{opacity:1}}
  .dchips{display:flex;gap:6px;overflow-x:auto;padding:7px 10px 3px;scrollbar-width:none}.dchips::-webkit-scrollbar{display:none}
  .dchip{flex:none;background:rgba(200,168,224,.15);border:1px solid #6d5a8e;color:#e6d8f5;border-radius:14px;padding:4px 11px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
  .dchip:active{transform:scale(.94)}
  .dbar{display:flex;gap:7px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(20,14,26,.9)}
  .dbar input{flex:1;min-width:0;background:#1c1524;border:1px solid #4a3a5e;color:var(--ink);border-radius:20px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none}
  .dbar input:focus{border-color:#8a6fd0}
  .dbar .dsend{flex:none;background:linear-gradient(180deg,#c86fb0,#a04f88);color:#fff;border:none;border-radius:20px;padding:0 16px;font-size:15px;font-weight:800;cursor:pointer}
  .dbar .dsend:active{transform:scale(.95)}.dbar .dsend:disabled{opacity:.5}

  .u{display:flex;gap:10px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:9px;margin-bottom:8px}
  .u .av{width:44px;height:44px;border-radius:10px;object-fit:cover;background:#241d14;flex:none;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
  .u .av img{width:100%;height:100%;object-fit:cover}
  .av img{width:100%;height:100%;object-fit:cover;display:block}
  .u .info{flex:1;min-width:0} .u .info b{font-size:14.5px} .u .info small{display:block;color:var(--soft);font-size:11.5px;line-height:1.5}
  .u .tag{font-size:10px;font-weight:800;padding:1px 7px;border-radius:8px;background:#0006;color:var(--soft)}
  .hpbar{height:6px;border-radius:4px;background:#0007;overflow:hidden;margin-top:4px}
  .hpbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--hp),#ff8a99)}

function jobOutfit(job,male){var m={fighter:'ornate knight armor',paladin:'holy paladin plate armor',rogue:'rogue leather outfit, hood',ranger:'ranger archer light leather outfit',wizard:'mage magic robe',
  cleric:male?'priest holy robe':'priestess holy robe',
  bard:'elegant bard minstrel outfit',merchant:'travelling merchant outfit',scholar:'scholar robe with glasses',medic:'field medic apron outfit',diviner:'fortune teller mystic outfit'};return m[job]||'adventurer outfit';}
function rarityFlair(rk){
  if(rk==='legend')return ', legendary hero, radiant divine glowing aura, extremely ornate intricate golden details, sparkling light particles, dramatic lighting, ultra detailed masterpiece';
  if(rk==='epic')return ', epic hero, magical glowing aura, ornate intricate details, dramatic rim lighting, highly detailed';
  if(rk==='rare')return ', fine ornate details, subtle magical glow';

function buildPPrompt(job,sel){
  var male=(sel.gender===1);
  var subj=male?"1boy, solo, adult man, handsome, masculine":"1girl, solo, adult woman, attractive, feminine";
  var base="masterpiece, best quality, anime style illustration, "+subj+", upper body portrait, from the chest up, medium shot, looking at viewer, big detailed anime eyes, soft cel shading, clean lineart, soft pastel background, japanese gacha character portrait";
  var floor=", no nudity, non-nude, not naked, no explicit content, no nsfw";
  function g(k){var v=PMAP[k][sel[k]][1];return Array.isArray(v)?v[male?1:0]:v;}
  function part(k){var v=g(k);return v?', '+v:'';}
  var outfit=jobOutfit(job,male);
  return base+part('race')+", "+g('hair')+", "+g('style')+", "+g('eyes')+part('age')+part('figure')+", wearing "+outfit+part('expose')+part('aura')+", "+g('face')+rarityFlair(pRarity)+floor;
}
var portraitCb=null, pSel={}, pSeed=0, pJob='fighter', pRarity='', pModel='flux', pCooling=false, pHasImg=false;
function openPortrait(job,cb,raceIdx,rarity){
  portraitCb=cb;pJob=job;pRarity=rarity||'';POPTS.forEach(function(g){pSel[g[0]]=0;});
  if(raceIdx>0)pSel.race=raceIdx;                 // 立繪外觀預設跟著機制種族（仍可改）

  h+='<div class="rowbtns" style="margin-top:12px"><button class="btn re" id="pgen">🖌️ 生成立繪</button><button class="btn ok" id="puse">✅ 用這張</button></div>';

      Array.prototype.forEach.call(row.children,function(c){c.classList.remove('on');});chip.classList.add('on');pRefresh();};});});

  pRefresh();pmodal.classList.add('show');
}
function closePortrait(){pmodal.classList.remove('show');}
function pUrl(){return "https://image.pollinations.ai/prompt/"+encodeURIComponent(buildPPrompt(pJob,pSel))+"?width=384&height=384&nologo=true&model=flux&seed="+pSeed;}
function pRefresh(){var el=document.getElementById('pprompt');if(el)el.textContent=buildPPrompt(pJob,pSel)+"\n(seed:"+pSeed+")";}
function pDoGen(){
  if(pCooling)return;pSeed=Math.floor(Math.random()*1e6);pRefresh();
  var box=document.getElementById('ppic');box.innerHTML='<div class="ph"><div class="ring"></div>生成中…（約 3~10 秒）</div>';
  var slow=setTimeout(function(){if(!pHasImg){var tip=box.querySelector('.ph');if(tip)tip.innerHTML='<div class="ring"></div>還在畫…尖峰較慢<br><span style="font-size:11px">再等一下或按重新生成</span>';}},9000);
  var img=new Image();img.onload=function(){clearTimeout(slow);box.innerHTML='';box.appendChild(img);pHasImg=true;};
  img.onerror=function(){clearTimeout(slow);box.innerHTML='<div class="ph">😵 生成失敗<br>5 秒後可再試</div>';};
  img.src=pUrl();
  pCooling=true;var b=document.getElementById('pgen');b.disabled=true;var n=5;b.textContent='⏳ '+n+' 秒';
  var t=setInterval(function(){n--;if(n<=0){clearInterval(t);pCooling=false;b.disabled=false;b.textContent='🎲 重新生成';}else b.textContent='⏳ '+n+' 秒';},1000);
}

function resolveNavalC(ship,party,enemy,gunBonus,stance,enemySpeed,surprise,ammo){
  stance=stance||'sink';ammo=ammo||'round';var STN={sink:'🎯 砲擊擊沉',board:'⚔️ 接舷俘虜',kite:'🏴‍☠️ 打帶跑'};
  var log=[],ph=ship.hull,eh=enemy.hull,guard=0,fled=false,capture=false;
  var pw=0;(party||[]).forEach(function(c){pw+=(c.level||1);});
  var dexm=0;(party||[]).forEach(function(c){dexm=Math.max(dexm,cmod(cab(c,'dex')));});
  var gunBase=ship.cannon*flagGunMulC(ship)+dexm+Math.floor((ship.crew||8)/4)+(gunBonus||0);
  var rangedMul=ammo==='chain'?0.9:(ammo==='grape'?0.85:1.0),boardMul=ammo==='grape'?1.6:1.0,foeFireMul=ammo==='chain'?0.8:1.0,escBonus=ammo==='chain'?0.25:0;
  var spd=(ship.speed||6),espd=(enemySpeed||6);
  var meMax=ship.hullMax||ship.hull,foeMax=enemy.hull,nev=[{t:'start',mode:stance}];
  log.push('⚓ 交戰！我船 '+ph+' vs '+enemy.ico+enemy.nm+' '+eh+'（'+(STN[stance]||'')+'）');
  if(surprise){var s0=Math.floor((gunBase+surprise)*0.9)+Math.floor(Math.random()*((gunBase+surprise+4)-Math.floor((gunBase+surprise)*0.9)+1));eh=Math.max(0,eh-s0);log.push('🎯 偵查奇襲！趁其不備先手齊射，造成 '+s0+' 傷（敵 '+eh+'）');nev.push({t:'surprise',dmg:s0,foeHull:eh});}
  while(ph>0&&eh>0&&guard<30){guard++;
    var gun=gunBase*(stance==='sink'?1.15:stance==='board'?0.85:0.8)*rangedMul;
    var pd=Math.floor(gun*0.7)+Math.floor(Math.random()*(Math.floor(gun)+2-Math.floor(gun*0.7)+1));
    var boarding=(stance==='board'&&eh<enemy.hull*0.6);if(boarding)pd+=Math.floor(pw*0.8*boardMul);
    eh=Math.max(0,eh-pd);log.push((boarding?'⚔️ 接舷肉搏！':'💥 齊射 ')+'造成 '+pd+' 傷（敵 '+eh+'）');nev.push({t:'volley',by:'me',dmg:pd,boarding:boarding,foeHull:eh});

    if(stance==='kite'){var esc=Math.max(0.05,Math.min(0.97,0.32+(spd-espd)*0.07+escBonus));if(Math.random()<esc){fled=true;log.push('🌬️ 搶佔上風，成功脫離戰鬥！');nev.push({t:'flee'});break;}}
    var efire=enemy.cannon*(stance==='kite'?0.5:stance==='board'?1.2:1.0)*foeFireMul;
    var ed=Math.floor(efire*0.6)+Math.floor(Math.random()*(Math.floor(efire)+2-Math.floor(efire*0.6)+1));
    ph=Math.max(0,ph-ed);log.push('🔥 '+enemy.ico+enemy.nm+' 還擊 '+ed+' 傷（我船 '+ph+'）');nev.push({t:'volley',by:'foe',dmg:ed,meHull:ph});
    if(ph<=0){nev.push({t:'sink',who:'me'});break;}
  }
  return {win:eh<=0,playerHull:ph,log:log,fled:fled,capture:capture,mode:stance,nev:nev,snap:{me:{ico:(ship.ico||'⛵'),hullMax:meMax},foe:{ico:enemy.ico,nm:enemy.nm,hullMax:foeMax}}};
}

// 閒聊即時台詞：依好感＋當前局勢隨機挑，秒回、可一直聊、避免連續重複
function mateChatLine(c){
  var lv=affLevel(c.id), pool=[];
  // 情境
  if(P.roster&&P.roster.some(function(x){return x.hp<x.maxhp&&x.hp>0;}))pool.push('大家都掛彩了，先回旅館養好傷再出發吧。');
  if((P.gold||0)>=3000)pool.push('金庫滿滿的，團長最近手氣不錯嘛。');
  if((P.gold||0)<120)pool.push('口袋有點緊…接個委託或跑趟商週轉一下？');
  if(P.holdings&&Object.keys(P.holdings).length)pool.push('領地的稅金又進帳了，當家的感覺不錯吧？');
  if((P.deepest||0)>=15)pool.push('都打到這麼深了，當初那個菜鳥團長不見囉。');
  if((P.clues||0)>=3)pool.push('海圖線索快湊齊了，寶藏在等我們呢。');
  try{var we=worldEventC();if(we&&we.type!=='calm')pool.push('聽說了嗎？'+we.t.replace(/。$/,'').replace(/ —— .*/,'')+'，別錯過。');}catch(e){}
  // 個性（依好感）
  if(lv<=1)pool.push('團長，有什麼吩咐？','我隨時待命，出發前說一聲。','船和帳我都盯著，放心。','風向我看過了，隨時能開。');
  else if(lv<=3)pool.push('跟著你跑船這陣子，其實挺開心的。','下次靠港，請我喝一杯如何？','你太拚了，偶爾也歇歇嘛。','海風真舒服…這種日子我喜歡。','別老是硬撐，有我在呢。');
  else pool.push('不管你去哪，我都跟著，這點別懷疑。','把後背交給我，你只管往前衝。','等這趟忙完…就我們倆去看海，好不好？','有你在的每一天，我都不想結束。','我這條命，早就是你的了。');
  var last=window._lastChat||'', tries=0, s;
  do{ s=pool[Math.floor(Math.random()*pool.length)]; tries++; }while(s===last&&tries<6&&pool.length>1);
  window._lastChat=s; return s;
}

function chatlog(id){if(!P.chats)P.chats={};if(!Array.isArray(P.chats[id]))P.chats[id]=[];return P.chats[id];}

function dateRenderLog(c){
  var el=document.getElementById('dlog');if(!el)return;
  el.innerHTML=chatlog(c.id).map(function(m){
    if(m.w===2)return '<div class="dbub sys">'+m.t+'</div>';
    return (m.w===1?'<div class="dnm">'+c.name+'</div>':'')+'<div class="dbub '+(m.w===1?'her':'me')+'">'+esc(m.t)+'</div>';
  }).join('');
  el.scrollTop=el.scrollHeight;
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function dateRenderChips(c){

function maybeDateEvent(c){
  if(window._dateEv)return false;
  var lv=affLevel(c.id),seen=(P.dateSeen&&P.dateSeen[c.id])||0,due=0;
  [2,3,4,5].forEach(function(m){if(!due&&lv>=m&&m>seen&&DATE_EVENTS[m])due=m;});
  if(!due)return false;
  window._dateEv=due;
  pushChat(c.id,1,DATE_EVENTS[due].setup);saveP();dateRenderLog(c);
  renderDateChoices(c,due);
  return true;
}
function renderDateChoices(c,m){
  var el=document.getElementById('dchips');if(!el)return;var ev=DATE_EVENTS[m];
  el.innerHTML='<div style="width:100%;font-size:11px;color:#c8a8e0;padding:0 4px 2px">💞 你的回答…</div>'+ev.choices.map(function(ch,i){return '<span class="dchip" style="white-space:normal;max-width:100%" data-ev="'+i+'">'+esc(ch.t)+'</span>';}).join('');
  var snd=document.getElementById('dsend');if(snd)snd.disabled=true;
  var inp=document.getElementById('dinput');if(inp)inp.disabled=true;
  Array.prototype.forEach.call(document.querySelectorAll('#dchips [data-ev]'),function(elm){elm.onclick=function(){
    var ch=ev.choices[+elm.dataset.ev];
    pushChat(c.id,0,ch.t);
    if(!P.dateSeen)P.dateSeen={};P.dateSeen[c.id]=m;
    if(!P.affinity)P.affinity={};var bef=affLevel(c.id);P.affinity[c.id]=(P.affinity[c.id]||0)+ch.aff;var aft=affLevel(c.id);
    pushChat(c.id,1,ch.reply);
    if(aft>bef)pushChat(c.id,2,'💞 你與 '+c.name+' 的關係提升為「'+AFF_NM[aft]+'」');
    window._dateEv=null;saveP();dateRenderLog(c);
    var di=document.querySelector('.dhead .di small');if(di)di.innerHTML=affHearts(c.id)+' ・ '+AFF_NM[affLevel(c.id)];
    var s=document.getElementById('dsend');if(s)s.disabled=false;var ip=document.getElementById('dinput');if(ip)ip.disabled=false;
    dateRenderChips(c);
    setTimeout(function(){dateStory(c);},300);   // 連鎖：一次升多階、或接終章
  };});
}

function maybeDateFinale(c){
  if(window._dateEv)return false;
  if(affLevel(c.id)<5||((P.dateSeen&&P.dateSeen[c.id])||0)<5)return false;
  if(P.dateEnd&&P.dateEnd[c.id])return false;
  window._dateEv='finale';
  pushChat(c.id,1,DATE_FINALE.setup);saveP();dateRenderLog(c);
  var el=document.getElementById('dchips');if(!el)return true;var ev=DATE_FINALE;
  el.innerHTML='<div style="width:100%;font-size:11px;color:#ffb8d8;padding:0 4px 2px">💍 終章…</div>'+ev.choices.map(function(ch,i){return '<span class="dchip" style="white-space:normal;max-width:100%" data-fin="'+i+'">'+esc(ch.t)+'</span>';}).join('');
  var snd=document.getElementById('dsend');if(snd)snd.disabled=true;var inp=document.getElementById('dinput');if(inp)inp.disabled=true;
  Array.prototype.forEach.call(document.querySelectorAll('#dchips [data-fin]'),function(elm){elm.onclick=function(){
    var ch=ev.choices[+elm.dataset.fin];
    pushChat(c.id,0,ch.t);pushChat(c.id,1,ch.reply);window._dateEv=null;
    var s=document.getElementById('dsend');if(s)s.disabled=false;var ip=document.getElementById('dinput');if(ip)ip.disabled=false;

    var t=document.getElementById('dtyping');if(t)t.remove();

// 模板保底：依關鍵字＋好感給有溫度的回覆（sandbox 無網路也能聊）
function dateTemplate(c,text){
  var lv=affLevel(c.id),t=text||'';
  if(/愛|喜歡|心動|在乎|想你/.test(t))return lv>=3?'…你突然這樣，害我臉都燙了。這句話，我會記很久很久。':'欸、欸你別亂說啦…不過，聽了還是有點開心。';
  if(/謝謝|感謝|辛苦/.test(t))return '傻瓜，跟我還這麼客氣。我陪著你，是心甘情願的。';
  if(/過去|以前|故事|身世/.test(t))return lv>=2?'我的過去啊…等哪天靠了港，我泡壺茶，慢慢說給你聽，好嗎？':'那些陳年往事…有機會再說吧。現在，我更想聽你的。';
  if(/未來|將來|以後|一起/.test(t))return lv>=3?'以後啊…我想和你一直航下去，哪片海都好，只要你在。':'以後的事誰說得準，但只要這團還在，我就在。';
  if(/累|辛苦|休息|睡/.test(t))return '你也是，別老硬撐。今晚早點歇著，船和帳都交給我盯。';
  if(/去哪|哪裡|出海|航|港/.test(t))return '想去哪我都奉陪。不如下個港口，我們偷個閒逛逛？';
  if(/[?？]$/.test(t))return lv>=3?'嗯…讓我想想。不管答案是什麼，我都站在你這邊。':'這問題有點難倒我了，不過我會陪你一起找答案。';
  return ['有你在身邊說說話，就覺得踏實。','海風正好，這種悠閒難得，多陪我一會兒嘛。','跟你聊天總是特別快，時間都不夠用。','無論你說什麼，我都愛聽。'][Math.floor(Math.random()*4)];
}

// 免費 AI 個性（Pollinations 文字，失敗用模板保底）
function genBio(c,cb){
  var ci=cinfo(c.job),rc=c.rarity&&RARITY_C[c.rarity]?RARITY_C[c.rarity].nm:'常見',race=RACES[c.race]?RACES[c.race].nm:'人類';
  var prompt='用繁體中文，為一位奇幻世界的傭兵寫一句 30 字以內、生動有個性的自我介紹或口頭禪。職業：'+ci.nm+'，種族：'+race+'，資質：'+rc+'。只回傳那一句話本身，不要引號、不要任何額外說明。';
  var done=false,timer=setTimeout(function(){if(!done){done=true;cb(bioTemplate(c));}},9000);
  fetch('https://text.pollinations.ai/'+encodeURIComponent(prompt)).then(function(r){return r.text();}).then(function(t){
    if(done)return;done=true;clearTimeout(timer);
    t=(t||'').trim().replace(/^["「『]+|["」』]+$/g,'').split('\n')[0].slice(0,60);
    cb(t&&!/error|unable|sorry/i.test(t)?t:bioTemplate(c));
  }).catch(function(){if(done)return;done=true;clearTimeout(timer);cb(bioTemplate(c));});
}
function bioTemplate(c){
  var t={fighter:'刀口舔血慣了，錢給夠，我就替你擋在最前面。',paladin:'以聖光之名，我發誓守護同伴到最後一刻。',rogue:'噓，別出聲——值錢的東西，我來拿就好。',ranger:'我的箭從不落空，除非我想讓它落空。',wizard:'凡人的常識？在我的魔法面前不適用。',cleric:'受傷就過來，別逞強，交給我。',bard:'來，聽我唱一首，順便替你們打打氣！',merchant:'一分錢一分貨，跟著我準沒錯。',scholar:'知識就是力量，這地下城的秘密我都記著。',medic:'別死在我面前，那是對我醫術的侮辱。',diviner:'命運？我早看過結局了，跟緊我。'};
  return t[c.job]||'一位來歷成謎的傭兵。';
}

    keys.forEach(function(k){var g=GOOD_BYC[k];if(!g)return;var pr=Math.round(tradePriceC(here,k,day)*0.92);
      body+='<div class="u"><div class="av">'+g.ico+'</div><div class="info"><b>'+g.nm+' ×'+P.cargo[k]+'</b><small>此地售價約 '+pr+'🪙/箱 ・ 共約 '+(pr*P.cargo[k])+'🪙</small></div></div>';});

  }

function invEquip(gid){
  var slot=gSlot(gid),g=gById(gid);if(!slot||!g){toast('無法裝備');return;}
  var body='<div class="note" style="text-align:left">把 '+g.ico+g.nm+' 裝給哪位夥伴？</div>';
  P.roster.forEach(function(c){var cur=c.equip[slot]?gById(c.equip[slot]):null;
    body+=uRow(c,'<button class="btn ok sm" data-give="'+c.id+'">'+(cur?'換上':'裝上')+'</button>');});
  openSheet('裝備給…','點頭像看詳情',body);
  q('[data-detail]',function(el){charSheet(el.dataset.detail);});
  q('[data-give]',function(el){var c=byId(el.dataset.give);if(c.equip[slot])P.bag.push(c.equip[slot]);var i=P.bag.indexOf(gid);if(i>=0)P.bag.splice(i,1);c.equip[slot]=gid;c.maxhp=cMaxHp(c);if(c.hp>c.maxhp)c.hp=c.maxhp;saveP(openInventory);toast('已裝備給 '+c.name);});
}
function gSlot(id){if(id.indexOf('t_')===0||id.indexOf('u_')===0)return'trinket';if(id.indexOf('w_')===0)return'weapon';if(id.indexOf('a_')===0)return'armor';}
function gearDesc(g){if(g.dmg)return '傷害 '+g.dmg[0]+'d'+g.dmg[1]+(g.bonus?' +'+g.bonus:'');if(g.ac!=null)return '護甲 AC +'+g.ac;if(g.abs){var ps=[];for(var a in g.abs)ps.push(ABN[a]+'+'+g.abs[a]);return '✨'+ps.join(' ');}if(g.ab)return ABN[g.ab]+' +'+g.val;return '';}

  var sa=document.getElementById('sellall');if(sa)sa.onclick=function(){if(!(P.bag||[]).length)return;if(!confirm('賣掉背包所有未裝備的裝備？'))return;var tot=0;P.bag.forEach(function(id){var g=gById(id);if(g)tot+=sellPrice(g);});P.bag=[];P.gold+=tot;saveP(openShop);toast('全部賣出 +'+tot+'🪙');};

var RARITY_C={common:{nm:'常見',star:'⭐',color:'#b6a892'},fine:{nm:'精良',star:'⭐⭐',color:'#7cc36a'},rare:{nm:'稀有',star:'⭐⭐⭐',color:'#5a9ee5'},epic:{nm:'史詩',star:'⭐⭐⭐⭐',color:'#b06fe0'},legend:{nm:'傳說',star:'⭐⭐⭐⭐⭐',color:'#f4c34e'}};
function rarC(k){return RARITY_C[k]||RARITY_C.common;}
function candStats(cand){return {job:cand.job,race:cand.race,level:1,base:cand.base,equip:{weapon:null,armor:null,trinket:null}};}
function openTavern(){
  openSheet('🍺 酒館','今日應徵的傭兵（稀有度隨機）','<div class="note">召集應徵者…</div>');
  flushSave().then(function(){return srv('tavern',{nick:P.nick,op:'list'});}).then(function(r){P=r.player;refreshTopbar();renderTavern();}).catch(function(e){toast(e.message);});
}
function renderTavern(){
  var body='<div class="note" style="text-align:left">小隊 '+P.roster.length+'/'+ROSTER_MAX+' 人。應徵者資質已隨機抽定，雇走就沒了；雇用後可自訂名字與立繪。</div>';
  (P.tavern||[]).forEach(function(cand){
    var ci=cinfo(cand.job),rc=rarC(cand.rarity),r=RACES[cand.race],pc=candStats(cand);
    var top=AB.slice().sort(function(a,b){return cand.base[b]-cand.base[a];}).slice(0,2).map(function(a){return ABI[a]+cand.base[a];}).join(' ');
    var afford=P.gold>=cand.cost&&P.roster.length<ROSTER_MAX;
    body+='<div class="u" style="border-color:'+rc.color+'"><div class="av">'+ci.ico+'</div><div class="info">'+
      '<b style="color:'+rc.color+'">'+rc.star+' '+rc.nm+'</b> <span class="tag">'+r.ico+r.nm+'・'+ci.nm+'</span>'+
      '<small>'+top+' ・ HP '+cMaxHp(pc)+(isSup(cand.job)?'':' ・ AC '+cStats(pc).ac)+'</small>'+
      '<small>'+(isSup(cand.job)?SUPPORT[cand.job].desc:('技「'+COMBAT[cand.job].skill+'」'))+'</small></div>'+
      '<button class="btn ok sm" data-cand="'+cand.cid+'"'+(afford?'':' disabled')+'>雇 '+cand.cost+'🪙</button></div>';
  });
  if(!(P.tavern||[]).length)body+='<div class="note">應徵者都被雇走了，換一批看看？</div>';
  body+='<div class="rowbtns" style="margin-top:6px"><button class="btn dim sm" id="tref"'+(P.gold<30?' disabled':'')+'>🔄 換一批（30🪙）</button><button class="btn re sm" id="trumor">👂 打聽消息</button></div>';
  sheet.innerHTML='<button class="close" onclick="closeSheet()">✕</button><h2>🍺 酒館</h2><p class="sub">今日應徵的傭兵（稀有度隨機・雇走就沒了）</p>'+body;
  q('[data-cand]',function(el){var cand=(P.tavern||[]).filter(function(c){return c.cid===el.dataset.cand;})[0];if(cand)startRecruit(cand);});
  var rf=document.getElementById('tref');if(rf)rf.onclick=function(){rf.disabled=true;flushSave().then(function(){return srv('tavern',{nick:P.nick,op:'refresh'});}).then(function(r){P=r.player;refreshTopbar();renderTavern();}).catch(function(e){rf.disabled=false;toast(e.message);});};
  var rm=document.getElementById('trumor');if(rm)rm.onclick=function(){rm.disabled=true;flushSave().then(function(){return srv('rumor',{nick:P.nick});}).then(function(r){P=r.player;refreshTopbar();renderRumors(r.rumors,r.persuade);}).catch(function(e){rm.disabled=false;toast(e.message);});};
}
var recruitCand=null, recruitPortrait='', recruitSeed=0;
function startRecruit(cand){
  if(P.roster.length>=ROSTER_MAX){toast('倉庫已滿，請先遣散');return;}
  if(P.gold<cand.cost){toast('金幣不足');return;}
  recruitCand=cand;recruitPortrait='';recruitSeed=0;window._rname='';
  renderRecruitForm();
}
function renderRecruitForm(){
  var cand=recruitCand,ci=cinfo(cand.job),rc=rarC(cand.rarity),r=RACES[cand.race],pc=candStats(cand);
  var body='<div class="pbox" id="rpbox" style="width:min(46vw,170px)">'+(recruitPortrait?'<img src="'+recruitPortrait+'">':'<div class="ph">尚未建立頭像</div>')+'</div>';
  body+='<button class="btn re sm" style="width:auto;display:block;margin:10px auto 12px" id="rmkport">🎨 建立頭像</button>';
  body+='<div class="card" style="border-color:'+rc.color+'"><b style="color:'+rc.color+'">'+rc.star+' '+rc.nm+'</b> '+r.ico+r.nm+' '+ci.ico+ci.nm+'<div class="abil" style="margin-top:8px">';
  AB.forEach(function(a){var s=cand.base[a],m=cmod(s);body+='<div class="ab"><small>'+ABI[a]+ABN[a]+'</small><b>'+s+'</b><span class="mm">'+(m>=0?'+':'')+m+'</span></div>';});
  body+='</div><div class="note" style="text-align:left">HP '+cMaxHp(pc)+(isSup(cand.job)?'':' ・ AC '+cStats(pc).ac)+' ・ 專長 '+skillNames(cand.job,cand.race)+'</div></div>';
  body+='<div class="glab">名字</div><input class="inp" id="rname" maxlength="16" placeholder="'+ci.nm+'" value="'+(window._rname||'')+'">';
  body+='<button class="btn ok" id="rhire" style="margin-top:10px">✅ 雇用（'+cand.cost+'🪙）</button>';
  openSheet(rc.star+' 雇用 '+ci.nm,'資質已定，客製名字與立繪',body);
  var rn=document.getElementById('rname');rn.addEventListener('input',function(){window._rname=rn.value;});
  document.getElementById('rmkport').onclick=function(){openPortrait(cand.job,function(rr){recruitPortrait=rr.portrait;recruitSeed=rr.seed;renderRecruitForm();},RACE_KEYS.indexOf(cand.race),cand.rarity);};
  document.getElementById('rhire').onclick=function(){
    if(!recruitPortrait){toast('請先建立頭像');return;}
    var name=(window._rname||'').trim().slice(0,16)||ci.nm;
    var b=this;b.disabled=true;b.textContent='雇用中…';
    flushSave().then(function(){return srv('recruit',{nick:P.nick,cid:cand.cid,name:name,portrait:recruitPortrait,seed:recruitSeed});}).then(function(res){
      P=res.player;toast(name+' 加入了小隊！');refreshTopbar();renderTavern();
    }).catch(function(e){b.disabled=false;b.textContent='✅ 雇用（'+cand.cost+'🪙）';toast('招募失敗：'+e.message);});
  };
}

function blackPool(){return [
  {k:'ess_str',e:'💪',nm:'力量精華',ds:'指定角色 力量 +1（永久）',cost:180,type:'ess',ab:'str'},
  {k:'ess_dex',e:'🎯',nm:'敏捷精華',ds:'指定角色 敏捷 +1（永久）',cost:180,type:'ess',ab:'dex'},
  {k:'ess_con',e:'❤️',nm:'體質精華',ds:'指定角色 體質 +1（增加生命）',cost:200,type:'ess',ab:'con'},
  {k:'ess_int',e:'🧠',nm:'智慧精華',ds:'指定角色 智力 +1（永久）',cost:180,type:'ess',ab:'int'},
  {k:'ess_wis',e:'👁️',nm:'睿知精華',ds:'指定角色 睿知 +1（永久）',cost:180,type:'ess',ab:'wis'},
  {k:'ess_cha',e:'💬',nm:'魅力精華',ds:'指定角色 魅力 +1（永久）',cost:180,type:'ess',ab:'cha'},
  {k:'g_flame',e:'🔥',nm:'烈焰之刃',ds:'稀有武器 2d6+2',cost:520,type:'gear',id:'w_flame'},
  {k:'g_dragon',e:'🐲',nm:'龍鱗鎧',ds:'稀有防具 護甲 +8',cost:560,type:'gear',id:'a_dragon'},
  {k:'g_staff',e:'🪄',nm:'秘法杖',ds:'法系武器 1d8+2',cost:300,type:'gear',id:'w_staff'}
];}
function rollBlack(){var pool=blackPool().slice();for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}return pool.slice(0,4).map(function(o){return {k:o.k,sold:false};});}
function blackDisc(){return P.roster.some(function(c){return charSkills(c.job,c.race).indexOf('persuasion')>=0;})?0.85:1;}
function openBlack(){
  if(!P.black||!P.black.length)P.black=rollBlack();
  var disc=blackDisc(),map={};blackPool().forEach(function(o){map[o.k]=o;});
  var body='';
  P.black.forEach(function(it,i){var o=map[it.k];if(!o)return;var price=Math.round(o.cost*disc);
    if(it.sold){body+='<div class="u" style="opacity:.45"><div class="av">'+o.e+'</div><div class="info"><b>'+o.nm+'</b><small>已售出</small></div></div>';return;}
    body+='<div class="u"><div class="av">'+o.e+'</div><div class="info"><b>'+o.nm+'</b><small>'+o.ds+'</small></div><button class="btn gold sm" data-bk="'+i+'"'+(P.gold<price?' disabled':'')+'>買 '+price+'🪙</button></div>';
  });

// ---- 領主城堡（主線・階級）----
// ---- 威名 / 爵位（把地城深度＋財富＋領地＋艦隊＋海事＋戰功合成總目標）----
var PEERAGE_C=[{t:0,nm:'無名浪人',ico:'🚶'},{t:300,nm:'見習船長',ico:'⛵'},{t:800,nm:'名聞商賈',ico:'💰'},{t:1600,nm:'海域騎士',ico:'🗡️'},{t:2800,nm:'男爵',ico:'🎖️'},{t:4500,nm:'子爵',ico:'🏅'},{t:7000,nm:'伯爵',ico:'👑'},{t:10000,nm:'侯爵',ico:'💠'},{t:15000,nm:'海洋霸主',ico:'🌊'}];
function fameOfC(pl){var f=0;f+=(pl.deepest||0)*40;f+=Math.floor((pl.gold||0)/120)+Math.floor((pl.invest||0)/120);if(pl.holdings)Object.keys(pl.holdings).forEach(function(k){f+=50+(pl.holdings[k].lv||1)*50;});f+=(pl.fleet||[]).length*40;f+=(((pl.nav&&pl.nav.lv)||1)+((pl.com&&pl.com.lv)||1))*18;f+=(pl.questsDone||0)*12;(pl.roster||[]).forEach(function(c){f+=(c.level||1)*3;});if(pl.uniques)f+=Object.keys(pl.uniques).length*80;return Math.round(f);}
function peerageOfC(f){var ix=0;for(var i=0;i<PEERAGE_C.length;i++){if(f>=PEERAGE_C[i].t)ix=i;}return ix;}
// ☠️ 叛徒路線：與體制多數勢力交惡、卻受海盜擁戴 → 走無冕之王/黑帆之王的自封路
var OUTLAW_TITLES=['浪人','亡命之徒','黑旗船長','劫掠首領','私掠艦長','海賊頭目','海賊將','無冕之王','黑帆之王'];
function isOutlawC(){if(repTierC(repOfC(P,'pirate'))<3)return false;var hostiles=['guild','navy','league'].filter(function(f){return repTierC(repOfC(P,f))<=1;}).length;return hostiles>=2;}
function fameBreakdownC(pl){return [['⚔️ 地城深度',(pl.deepest||0)*40],['💰 財富',Math.floor((pl.gold||0)/120)+Math.floor((pl.invest||0)/120)],['🚩 領地',(pl.holdings?Object.keys(pl.holdings).reduce(function(a,k){return a+50+(pl.holdings[k].lv||1)*50;},0):0)],['🚢 艦隊',(pl.fleet||[]).length*40],['⚓ 海事',(((pl.nav&&pl.nav.lv)||1)+((pl.com&&pl.com.lv)||1))*18],['📜 委託',(pl.questsDone||0)*12],['👥 夥伴',(pl.roster||[]).reduce(function(a,c){return a+(c.level||1)*3;},0)],['✦ 頭目戰利',(pl.uniques?Object.keys(pl.uniques).length*80:0)]];}
// ============ 🎖️ 授勳大典 / 反骨褫奪 ============
// 名聲跨階＋有友好勢力當靠山→受封爵位；冊封勢力若翻臉（敵對/世仇）→褫奪、視為叛徒
function bestAllyC(){var best=null,bv=199;FACTIONS_C.forEach(function(f){var v=repOfC(P,f.id);if(repTierC(v)>=3&&v>bv){bv=v;best=f.id;}});return best;}
function checkPeerage(){
  if(!P||(modal&&modal.classList.contains('show')))return false;
  var fame=fameOfC(P),tier=peerageOfC(fame);
  if(P.titleFrom&&P.titleFrom!=='pirate'&&repTierC(repOfC(P,P.titleFrom))<=1){   // 反骨：貴族靠山翻臉→褫奪（海盜擁立不會褫奪）
    var f=FACTION_BY_C[P.titleFrom]||{},old=P.title;
    P.title=null;P.titleFrom=null;P.titleTier=0;P.outlaw=false;saveP();refreshTopbar();
    peerageEvent('revoke',{facNm:f.nm||'',facIco:f.ico||'',title:old||'爵位'});return true;
  }
  if(tier>(P.titleTier||0)){   // 授勳：跨階＋有靠山（海盜擁立＝叛徒路，用海賊稱號）
    var sp=bestAllyC();if(!sp)return false;
    var outlaw=(sp==='pirate'&&isOutlawC());
    var nm=outlaw?OUTLAW_TITLES[tier]:PEERAGE_C[tier].nm,reward=200+tier*180,f2=FACTION_BY_C[sp]||{};
    P.title=nm;P.titleFrom=sp;P.titleTier=tier;P.outlaw=outlaw;P.gold=(P.gold||0)+reward;applyRepC(P,sp,40);saveP();refreshTopbar();
    peerageEvent('confer',{facNm:f2.nm||'',facIco:f2.ico||'',title:nm,ico:outlaw?'☠️':PEERAGE_C[tier].ico,reward:reward,outlaw:outlaw});return true;
  }
  return false;
}
function peerageEvent(mode,d){
  var body;
  if(mode==='confer'){

function mockBattle(pl,floor,boss){

  var party=(pl.team.battle||[]).map(function(id){return by[id];}).filter(Boolean).map(function(c){return {id:c.id,name:c.name,ico:(cinfo(c.job)||{}).ico||'⚔️',portrait:c.portrait||'',maxhp:c.maxhp||30,_atk:7+Math.floor((c.level||1)*1.4)};});

  var ph=party.map(function(p){return p.maxhp;}),fh=foes.map(function(f){return f.maxhp;});
  var ev=[],lines=[],round=0,guard=0;
  function any(a){return a.some(function(x){return x>0;});}
  function firstAlive(a){for(var i=0;i<a.length;i++)if(a[i]>0)return i;return -1;}
  while(any(fh)&&any(ph)&&guard<14){guard++;round++;ev.push({r:round});lines.push('R'+round);
    party.forEach(function(p,pi){if(ph[pi]<=0)return;var ti=firstAlive(fh);if(ti<0)return;var crit=Math.random()<0.15,dmg=p._atk+Math.floor(Math.random()*6)+(crit?6:0);fh[ti]=Math.max(0,fh[ti]-dmg);ev.push({a:'hero',by:p.id,tgt:ti,dmg:dmg,crit:crit,kill:fh[ti]<=0});lines.push((crit?'✦ ':'⚔️ ')+p.name+' 擊中 '+foes[ti].ico+foes[ti].nm+' −'+dmg+(fh[ti]<=0?' 💀':''));});
    foes.forEach(function(f,fi){if(fh[fi]<=0)return;var ti=firstAlive(ph);if(ti<0)return;if(Math.random()<0.25){ev.push({a:'foe',by:fi,tgt:party[ti].id,miss:true});lines.push('💨 '+f.ico+f.nm+' 撲空');return;}var dmg=4+floor+Math.floor(Math.random()*5);ph[ti]=Math.max(0,ph[ti]-dmg);ev.push({a:'foe',by:fi,tgt:party[ti].id,dmg:dmg,kill:ph[ti]<=0});lines.push('🩸 '+f.ico+f.nm+' 打中 '+party[ti].name+' −'+dmg+(ph[ti]<=0?' 💀 倒下':''));});
  }
  return {enemies:foes.map(function(f){return {nm:f.nm,ico:f.ico};}),killed:fh.filter(function(x){return x<=0;}).length,lines:lines,
    party:party.map(function(p){return {id:p.id,name:p.name,ico:p.ico,portrait:p.portrait,hp:p.maxhp,maxhp:p.maxhp};}),
    foes:foes.map(function(f){return {nm:f.nm,ico:f.ico,hp:f.maxhp,maxhp:f.maxhp};}),ev:ev};
}

  var foes=(enc.foes||[]).map(function(e){return {nm:e.nm,ico:e.ico,maxhp:e.maxhp,cur:e.hp};});
  var ev=(enc.ev||[]).slice(), pById={}; party.forEach(function(p,i){pById[p.id]=i;});
  function bcard(o,side,i){var av=(side==='pty'&&o.portrait)?'<img loading="lazy" src="'+pthumb(o.portrait,192)+'" onerror="this.onerror=null;this.outerHTML=&#39;'+o.ico+'&#39;">':o.ico;
    return '<div class="bc '+side+'" id="'+side+i+'"><div class="bpop" id="'+side+'pop'+i+'"></div><div class="bico">'+av+'</div><div class="bnm">'+(o.name||o.nm)+'</div><div class="bhp"><i id="'+side+'hp'+i+'" style="width:'+Math.round(o.cur/o.maxhp*100)+'%"></i></div></div>';}
  var h=topbar()+'<div class="pad btlscene" style="background:radial-gradient(120% 80% at 50% -10%,#3a1c26,transparent 55%)">';
  h+='<h1 style="font-size:20px">⚔️ 戰鬥</h1>';
  h+='<div class="btl-foes" id="btlfoes">'+foes.map(function(e,i){return bcard(e,'foe',i);}).join('')+'</div>';
  h+='<div class="btl-round" id="btlround">準備接戰…</div>';
  h+='<div class="btl-party" id="btlparty">'+party.map(function(p,i){return bcard(p,'pty',i);}).join('')+'</div>';
  h+='<div class="rowbtns" style="margin-top:14px"><button class="btn dim" id="btlskip">⏭️ 跳過</button><button class="btn gold" id="btldone" style="display:none">✅ 看結算</button></div>';
  h+='</div>';
  app.innerHTML=h;
  function sethp(side,i,o){var el=document.getElementById(side+'hp'+i);if(el)el.style.width=Math.max(0,Math.round(o.cur/o.maxhp*100))+'%';}
  function flash(side,i,cls){var c=document.getElementById(side+i);if(c){c.classList.add(cls);setTimeout(function(){c.classList.remove(cls);},400);}}
  function pop(side,i,txt,kind){var el=document.getElementById(side+'pop'+i);if(!el)return;el.textContent=txt;el.className='bpop '+(kind||'')+' show';setTimeout(function(){el.className='bpop '+(kind||'');},700);}
  function dead(side,i){var c=document.getElementById(side+i);if(c)c.classList.add('dead');}
  function banner(t){var el=document.getElementById('btlround');if(el)el.textContent=t;}
  function hitFoe(i,dmg,crit,kill){if(dmg==null){pop('foe',i,'MISS','');return;}foes[i].cur=Math.max(0,foes[i].cur-dmg);sethp('foe',i,foes[i]);flash('foe',i,'hit');pop('foe',i,'−'+dmg,crit?'crit':'');if(kill)setTimeout(function(){dead('foe',i);},250);}
  function hitPty(id,dmg,kill){var i=pById[id];if(i==null)return;if(dmg==null){pop('pty',i,'MISS','');return;}party[i].cur=Math.max(0,party[i].cur-dmg);sethp('pty',i,party[i]);flash('pty',i,'hit');pop('pty',i,'−'+dmg,'');if(kill)setTimeout(function(){dead('pty',i);},250);}
  var fast=false;
  function apply(e){
    if(e.r!=null)banner('— 第 '+e.r+' 回合 —');
    else if(e.a==='surprise')banner('🥷 偷襲先手！');
    else if(e.a==='hero')hitFoe(e.tgt,e.miss?null:e.dmg,e.crit,e.kill);
    else if(e.a==='foe')hitPty(e.tgt,e.miss?null:e.dmg,e.kill);
    else if(e.a==='skill'){banner((e.ico||'✨')+' '+e.nm+'！');if(e.hits)e.hits.forEach(function(hh){hitFoe(hh.tgt,hh.dmg,false,hh.kill);});if(e.heal&&e.allies)e.allies.forEach(function(al){var i=pById[al.id];if(i!=null){party[i].cur=al.hp;sethp('pty',i,party[i]);flash('pty',i,'healed');pop('pty',i,'♥','heal');var c=document.getElementById('pty'+i);if(c&&al.hp>0)c.classList.remove('dead');}});}
  }
  function finish(){var sk=document.getElementById('btlskip');if(sk)sk.style.display='none';var dn=document.getElementById('btldone');if(dn){dn.style.display='';dn.onclick=backFn;}banner('⚔️ 戰鬥結束');}
  var k=0,timer=null;
  function step(){if(k>=ev.length)return finish();var e=ev[k++];apply(e);var d=fast?0:(e.a==='skill'?680:(e.r!=null?520:400));timer=setTimeout(step,d);}
  document.getElementById('btlskip').onclick=function(){fast=true;this.style.display='none';if(timer)clearTimeout(timer);step();};
  if(!ev.length){banner('（這場沒有詳細戰鬥紀錄）');finish();}else timer=setTimeout(step,500);
}
// ⚓ 海戰／圍城戰畫面（船 vs 船・砲擊/接舷/HP條）
function renderNavalBattle(rep, backFn){
  var snap=rep.snap||{me:{ico:'⛵',hullMax:rep.hullMax||60},foe:{ico:(rep.enemy&&rep.enemy.ico)||'🏴‍☠️',nm:(rep.enemy&&rep.enemy.nm)||rep.garrison||rep.target||'敵船',hullMax:100}};
  var nev=(rep.nev||[]).slice();
  var me={max:snap.me.hullMax,cur:snap.me.hullMax}, foe={max:snap.foe.hullMax,cur:snap.foe.hullMax};
  var foeNm=snap.foe.nm||(rep.target?rep.target+' 的船':'敵船');
  var h=topbar()+'<div class="pad btlscene" style="background:radial-gradient(120% 80% at 50% -10%,#123249,transparent 55%)">';
  h+='<h1 style="font-size:20px">'+(rep.garrison?'⚔️ 圍城戰':'⚓ 海戰')+'</h1>';
  h+='<div class="btl-foes"><div class="bc foe" id="nfoe" style="width:110px"><div class="bpop" id="nfoepop"></div><div class="bico" style="font-size:40px;height:46px;line-height:46px">'+snap.foe.ico+'</div><div class="bnm">'+foeNm+'</div><div class="bhp"><i id="nfoehp" style="width:100%"></i></div></div></div>';
  h+='<div class="btl-round" id="nround">準備接戰…</div>';
  h+='<div class="btl-party"><div class="bc pty" id="nme" style="width:110px"><div class="bpop" id="nmepop"></div><div class="bico" style="font-size:40px;height:46px;line-height:46px">'+snap.me.ico+'</div><div class="bnm">我方旗艦</div><div class="bhp"><i id="nmehp" style="width:100%"></i></div></div></div>';
  h+='<div class="rowbtns" style="margin-top:14px"><button class="btn dim" id="nskip">⏭️ 跳過</button><button class="btn gold" id="ndone" style="display:none">✅ 看結算</button></div>';
  h+='</div>';
  app.innerHTML=h;
  function sh(id,cur,max){var el=document.getElementById(id);if(el)el.style.width=Math.max(0,Math.round(cur/max*100))+'%';}
  function fl(id){var c=document.getElementById(id);if(c){c.classList.add('hit');setTimeout(function(){c.classList.remove('hit');},400);}}
  function pop(id,txt,cls){var el=document.getElementById(id);if(!el)return;el.textContent=txt;el.className='bpop '+(cls||'')+' show';setTimeout(function(){el.className='bpop '+(cls||'');},700);}
  function ban(t){var el=document.getElementById('nround');if(el)el.textContent=t;}
  var fast=false;
  function apply(e){
    if(e.t==='start')ban({sink:'🎯 砲擊擊沉',board:'⚔️ 接舷俘虜',kite:'🏴‍☠️ 打帶跑'}[e.mode]||'開戰！');
    else if(e.t==='surprise'){foe.cur=e.foeHull;sh('nfoehp',foe.cur,foe.max);fl('nfoe');pop('nfoepop','奇襲 −'+e.dmg,'crit');ban('🎯 偵查奇襲！');}
    else if(e.t==='volley'){if(e.by==='me'){foe.cur=e.foeHull;sh('nfoehp',foe.cur,foe.max);fl('nfoe');pop('nfoepop',(e.boarding?'接舷 ':'')+'−'+e.dmg,e.boarding?'crit':'');ban(e.boarding?'⚔️ 接舷肉搏！':'💥 我方齊射');}else{me.cur=e.meHull;sh('nmehp',me.cur,me.max);fl('nme');pop('nmepop','−'+e.dmg,'');ban('🔥 敵船還擊');}}
    else if(e.t==='flee'){ban('🌬️ 脫離戰鬥！');}
    else if(e.t==='sink'){if(e.who==='foe'){var c=document.getElementById('nfoe');if(c)c.classList.add('dead');ban(e.capture?'⚓ 接舷俘虜成功！':'💥 擊沉敵船！');}else{var c2=document.getElementById('nme');if(c2)c2.classList.add('dead');ban('💀 我船被擊沉…');}}
  }
  function finish(){var sk=document.getElementById('nskip');if(sk)sk.style.display='none';var dn=document.getElementById('ndone');if(dn){dn.style.display='';dn.onclick=backFn;}}
  var k=0,timer=null;
  function step(){if(k>=nev.length)return finish();var e=nev[k++];apply(e);timer=setTimeout(step,fast?0:540);}
  document.getElementById('nskip').onclick=function(){fast=true;this.style.display='none';if(timer)clearTimeout(timer);step();};
  if(!nev.length){ban('（沒有海戰紀錄）');finish();}else timer=setTimeout(step,500);
}
function showNaval(rep){ if(rep.nev&&rep.nev.length>1) renderNavalBattle(rep,function(){renderNaval(rep);}); else renderNaval(rep); }
function showSiege(rep){ if(rep.nev&&rep.nev.length>1) renderNavalBattle(rep,function(){renderSiege(rep);}); else renderSiege(rep); }
function renderReport(rep){
  var head=rep.wiped?'💀 小隊全滅撤退':(rep.cleared?'🎉 探索成功！':'🏳️ 探索結束');
  var h=topbar()+'<div class="pad" style="background:radial-gradient(120% 80% at 50% -10%,#2a2140,transparent 55%)">';
  h+='<h1>'+head+'</h1><p class="lead">從第 '+(rep.start||1)+' 層探索 → 目標第 '+rep.target+' 層 ・ 實際抵達第 '+rep.reached+' 層</p>';
  h+='<div class="card"><b>結算</b><div class="note" style="text-align:left;margin-top:6px">'+
    '🪙 金幣 +'+rep.gold+'　⭐ 經驗 +'+rep.xp+'<br>⚔️ 擊敗 '+(rep.kills||0)+' 隻　🎁 掉落 '+(rep.loot.length||0)+' 件　🏛️ 探索 '+(rep.floors?rep.floors.length:0)+' 層</div>';
  if(rep.wiped)h+='<div class="note" style="text-align:left;color:var(--hp)">🚑 救援費：損失 '+(rep.rescueGoldLost||0)+'🪙'+(rep.rescueLootLost?' ＋ '+rep.rescueLootLost+' 件戰利品':'')+'（倒下的夥伴回旅館付費救治）</div>';
  if(rep.rankUp)h+='<div class="note" style="text-align:left;color:var(--gold);font-weight:800">🎖️ 晉升為「'+rep.rankUp.to+'」！ +'+rep.rankUp.reward+'🪙</div>';
  if(rep.questDone)h+='<div class="note" style="text-align:left;color:var(--good);font-weight:800">📜 委託完成【'+rep.questDone.name+'】 +'+rep.questDone.reward+'🪙</div>';
  if(rep.levelUps&&rep.levelUps.length){h+='<div class="note" style="text-align:left;color:var(--gold)">⬆️ '+rep.levelUps.map(function(u){return u.name+' → Lv'+u.level;}).join('、')+'</div>';}
  if(rep.uniqueGains&&rep.uniqueGains.length){h+='<div class="note" style="text-align:left;color:var(--gold);font-weight:800">🌟 首殺獎勵！獲得獨門神器：'+rep.uniqueGains.map(function(u){return u.ico+u.nm;}).join('、')+'</div>';}
  if(rep.traitGains&&rep.traitGains.length){h+='<div class="note" style="text-align:left">🏅 '+rep.traitGains.map(function(t){var ti=TRAITS_C[t.key]||{};return t.name+' 獲得<span style="color:'+(t.good?'var(--gold)':'var(--hp)')+'">「'+ti.ico+ti.nm+'」</span>';}).join('、')+'</div>';}
  if(rep.bondUps&&rep.bondUps.length){h+='<div class="note" style="text-align:left;color:#ff9ec7">💞 羈絆提升：'+rep.bondUps.map(function(bd){return bd.a+' × '+bd.b+' → '+bd.level;}).join('、')+'</div>';}
  if(rep.loot&&rep.loot.length){h+='<div class="note" style="text-align:left">戰利品：'+rep.loot.map(function(id){var g=gById(id);return g?g.ico+g.nm:id;}).join('、')+'</div>';}
  h+='</div>';
  var battleFloors=(rep.floors||[]).filter(function(f){return f.encounters&&f.encounters[0]&&f.encounters[0].ev&&f.encounters[0].ev.length;});
  var featured=battleFloors.filter(function(f){return f.boss;}).pop()||battleFloors[battleFloors.length-1];
  if(featured)h+='<button class="btn re" id="watchbtl" style="margin-top:10px">⚔️ 觀看戰鬥動畫'+(featured.boss?'（👑 第 '+featured.floor+' 層頭目）':'（第 '+featured.floor+' 層）')+'</button>';
  var story=[];
  if(rep.rankUp&&STORY.rank[rep.rankUp.ix])story.push(STORY.rank[rep.rankUp.ix]);
  (rep.newBosses||[]).forEach(function(bf){if(STORY.boss[bf])story.push(STORY.boss[bf]);});
  if(story.length)h+='<div class="card" style="border-color:var(--gold-d)"><b>📖 劇情</b>'+story.map(function(s){return '<div class="note" style="text-align:left;margin-top:6px;line-height:1.75;color:#f0d6ad;white-space:pre-line">'+s+'</div>';}).join('')+'</div>';
  h+='<details><summary>📋 展開逐層戰報（'+(rep.floors?rep.floors.length:0)+' 層）</summary><div style="margin-top:8px">';
  rep.floors.forEach(function(f,fi){
    var enc=f.encounters&&f.encounters[0];
    var enemies=(enc&&enc.enemies||[]).map(function(e){return e.ico;}).join('');
    h+='<div class="rep-floor"><div class="fh">'+(f.boss?'👑 ':'')+'第 '+f.floor+' 層 '+enemies+'</div><div class="fl">';
    if(f.skills&&f.skills.length)h+=f.skills.join('<br>')+'<br>';
    else if(f.event)h+=f.event+'<br>';
    if(f.wipe)h+='<b style="color:var(--hp)">小隊在此全滅…</b>';
    else h+='擊敗 '+((enc||{}).killed||0)+' 隻 ・ +'+f.gold+'🪙 ・ +'+f.xp+'⭐'+((f.loot&&f.loot.length)?' ・ 掉落 '+f.loot.map(function(g){return g.ico+g.nm;}).join(''):'');
    h+='</div>';
    if(enc&&enc.ev&&enc.ev.length)h+='<button class="btn dim sm" data-wbtl="'+fi+'" style="margin-top:4px">▶️ 觀看此層戰鬥</button>';
    if(enc&&enc.lines&&enc.lines.length){h+='<details style="margin-top:4px"><summary>📜 詳細戰記</summary><div class="fl" style="margin-top:4px">'+fmtLog(enc.lines)+'</div></details>';}
    h+='</div>';
  });
  h+='</div></details>';
  h+='<div class="card" style="margin-top:10px"><button class="btn re sm" id="aitale" style="width:auto">📜 生成 AI 戰記（免費）</button>'+
    '<div class="note" id="aitalebox" style="display:none;text-align:left;margin-top:8px;line-height:1.85;color:#f0d6ad;white-space:pre-line"></div></div>';
  h+='<button class="btn gold" id="back" style="margin-top:12px">🏰 回到城鎮</button></div>';
  app.innerHTML=h;
  document.getElementById('back').onclick=renderTown;
  var wb=document.getElementById('watchbtl');if(wb&&featured)wb.onclick=function(){renderBattle(featured.encounters[0],function(){renderReport(rep);});};
  Array.prototype.forEach.call(document.querySelectorAll('[data-wbtl]'),function(el){el.onclick=function(){var f=rep.floors[+el.dataset.wbtl];if(f&&f.encounters&&f.encounters[0])renderBattle(f.encounters[0],function(){renderReport(rep);});};});
  var at=document.getElementById('aitale');
  if(at)at.onclick=function(){at.disabled=true;at.textContent='✍️ 執筆中…';var box=document.getElementById('aitalebox');box.style.display='block';box.textContent='✨ 吟遊詩人正在編寫戰記…';
    genBattleTale(rep,function(t){box.textContent=t;if(at)at.remove();});};
}
// 免費 AI 戰記（Pollinations 文字，按需生成、超時用模板保底）
function genBattleTale(rep,cb){
  var names=(P.team.battle||[]).map(function(id){var c=byId(id);return c?c.name:null;}).filter(Boolean).join('、')||'一支傭兵小隊';
  var bosses=(rep.newBosses||[]).length?('，並擊破第 '+(rep.newBosses||[]).join('、')+' 層的頭目'):'';
  var ending=rep.wiped?'最後力竭全滅、被抬回城裡':(rep.cleared?'最終凱旋歸來':'見好就收、安全撤退');
  var prompt='用繁體中文寫一段 60~100 字、生動有畫面感的奇幻戰記，描述傭兵小隊這趟地下城的經歷。隊員：'+names+'。他們從第 '+(rep.start||1)+' 層打到第 '+rep.reached+' 層，擊敗約 '+(rep.kills||0)+' 隻魔物'+bosses+'，'+ending+'。只回傳戰記本文，不要標題、不要引號、不要多餘說明。';
  var done=false,timer=setTimeout(function(){if(!done){done=true;cb(taleTemplate(rep,names,ending));}},12000);
  fetch('https://text.pollinations.ai/'+encodeURIComponent(prompt)).then(function(r){return r.text();}).then(function(t){
    if(done)return;done=true;clearTimeout(timer);t=(t||'').trim().replace(/^["「『]+|["」』]+$/g,'').slice(0,320);
    cb(t&&!/error|unable|sorry/i.test(t)?t:taleTemplate(rep,names,ending));
  }).catch(function(){if(done)return;done=true;clearTimeout(timer);cb(taleTemplate(rep,names,ending));});
}
function taleTemplate(rep,names,ending){
  return names+' 深入幽暗的地下城，一路殺至第 '+rep.reached+' 層，'+(rep.kills||0)+' 隻魔物倒在他們腳下。'+((rep.newBosses||[]).length?'連盤踞的頭目也難逃一劫。':'')+ending+'。';
}

// ============ 啟動 ============
renderLogin();
